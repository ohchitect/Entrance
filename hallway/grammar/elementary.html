        grammarDesc: "<strong>Sequence:</strong> Ordering scientific processes.<br>首先 (sau2 sin1) = First, 跟住 (gan1 zyu6) = Then, 最後 (zeoi3 hau6) = Finally.",
        vocab: [
            {c: "水循環", j: "seoi2 ceon4 waan4", e: "Water cycle"}, {c: "首先", j: "sau2 sin1", e: "First"},

            {c: "落雨", j: "lok6 jyu5", e: "Rain"}, {c: "河流", j: "ho4 lau4", e: "River"}
        ],
        story: "地球上嘅水係會不斷循環嘅，呢個過程叫做水循環。<br>首先，太陽嘅熱力會令到河流同海洋嘅水蒸發，變成水蒸氣升上天。<br>跟住，水蒸氣喺天上遇冷就會變成小水滴，聚集埋一齊形成雲。<br>當雲入面嘅水滴越積越多，變到好重嗰陣，空氣托唔住佢哋。<br>最後，水滴就會變成雨或者雪落返落地面，流返入大海，重新開始。",
        jyutping: "Dei6 kau4 soeng6 ge3 seoi2 hai6 wui5 bat1 dyun6 ceon4 waan4 ge3, ni1 go3 gwo3 cing4 giu3 zou6 seoi2 ceon4 waan4.<br><span class='highlight'>Sau2 sin1</span>, taai3 joeng4 ge3 jit6 lik6 wui5 ling6 dou3 ho4 lau4 tung4 hoi2 joeng4 ge3 seoi2 zing1 faat3, bin3 sing4 seoi2 zing1 hei3 sing1 soeng5 tin1.<br><span class='highlight'>Gan1 zyu6</span>, seoi2 zing1 hei3 hai2 tin1 soeng6 jyu6 laang5 zau6 wui5 bin3 sing4 siu2 seoi2 dik6, zeoi6 zaap6 maai4 jat1 cai4 jing4 sing4 wan4.<br>Dong1 wan4 jap6 min6 ge3 seoi2 dik6 jyut6 zik1 jyut6 do1, bin3 dou3 hou2 cung5 go2 zan6, hung1 hei3 tok3 m4 zyu6 keoi5 dei6.<br><span class='highlight'>Zeoi3 hau6</span>, seoi2 dik6 zau6 wui5 bin3 sing4 jyu5 waak6 ze2 syut3 lok6 faan1 lok6 dei6 min6, lau4 faan1 jap6 daai6 hoi2, cung4 san1 hoi1 ci2.",
        english: "Water on Earth continuously circulates; this process is called the water cycle.<br>First, the sun's heat makes the water in rivers and oceans evaporate, turning into water vapor that rises into the sky.<br>Then, the water vapor meets cold air in the sky and turns into tiny water droplets, gathering together to form clouds.<br>When the water droplets inside the cloud accumulate and become very heavy, the air cannot hold them up.<br>Finally, the water droplets turn into rain or snow and fall back to the ground, flowing back into the ocean to start again.",

            { q: "「首先...跟住...最後」係用嚟表達咩？", e: "(What is 'First... Then... Finally' used to express?)", options: [{c: "事情發生嘅先後次序", e: "(The chronological order of events)", correct: true}, {c: "兩件相反嘅事情", e: "(Two opposite things)", correct: false}, {c: "問問題", e: "(Asking a question)", correct: false}] }

    {
        level: 2, title: "Recycling in Vancouver", topic: "Categorization (分類 - Sort/Categorize)",

        grammarDesc: "<strong>Categorization:</strong> Explaining how things are grouped.<br>分類 (fan1 leoi6) means 'to sort' or 'to categorize'.",
        vocab: [
            {c: "環保", j: "waan4 bou2", e: "Environmental protection"}, {c: "垃圾", j: "laap6 saap3", e: "Garbage / Trash"},

            {c: "回收箱", j: "wui4 sau1 soeng1", e: "Recycling bin"}, {c: "綠色", j: "luk6 sik1", e: "Green"},
            {c: "廚餘", j: "cyu4 jyu4", e: "Food waste"}, {c: "黑色", j: "hak1 sik1", e: "Black"},

        jyutping: "Hai2 Wan1 go1 waa4 saang1 wut6, mui5 go3 jan4 dou1 jiu3 hok6 sik1 dim2 joeng2 zoeng1 laap6 saap3 <span class='highlight'>fan1 leoi6</span>, bou2 wu6 waan4 ging2.<br>Ngo5 dei6 uk1 kei2 jau5 saam1 go3 m4 tung4 ngaan4 sik1 ge3 laap6 saap3 tung2.<br>Laam4 sik1 ge3 wui4 sau1 soeng1 hai6 jung6 lei4 zong1 fai3 zi2, bou3 zi2 tung4 maai4 gaau1 zeon1 ge3.<br>Luk6 sik1 ge3 tung2 zau6 jung6 lei4 diu6 cyu4 jyu4, liju4 sik6 zing6 ge3 faan6 sung3, gwo2 pei4 tung4 syu6 jip6.<br>Zeoi3 hau6, hak1 sik1 tung2 zau6 hai6 jung6 lei4 diu6 m4 ho2 ji5 wui4 sau1 ge3 pou2 tung1 laap6 saap3.<br>Zing3 kok3 fan1 leoi6 ho2 ji5 gaam2 siu2 deoi1 tin4 keoi1 ge3 fu6 daam1.",
        english: "Living in Vancouver, everyone must learn how to sort garbage to protect the environment.<br>Our home has three different colored garbage bins.<br>The blue recycling bin is used to hold waste paper, newspapers, and plastic bottles.<br>The green bin is used to throw away food waste, such as leftover food, fruit peels, and leaves.<br>Finally, the black bin is used to throw away regular garbage that cannot be recycled.<br>Correct sorting can reduce the burden on landfills.",
        quizzes: [
            { q: "溫哥華嘅居民需要做咩嚟保護環境？", e: "(What do Vancouver residents need to do to protect the environment?)", options: [{c: "將垃圾分類", e: "(Sort their garbage)", correct: true}, {c: "將垃圾掉落海", e: "(Throw garbage into the sea)", correct: false}, {c: "唔掉垃圾", e: "(Never throw away garbage)", correct: false}] },
            { q: "藍色回收箱用嚟裝咩？", e: "(What is the blue recycling bin used to hold?)", options: [{c: "廢紙同膠樽", e: "(Waste paper and plastic bottles)", correct: true}, {c: "食剩嘅飯餸", e: "(Leftover food)", correct: false}, {c: "普通垃圾", e: "(Regular garbage)", correct: false}] },

            { q: "正確垃圾分類有咩好處？", e: "(What is the benefit of correct garbage sorting?)", options: [{c: "減少堆填區嘅負擔", e: "(Reduces the burden on landfills)", correct: true}, {c: "可以賺好多錢", e: "(Can earn a lot of money)", correct: false}, {c: "令到天氣變好", e: "(Makes the weather better)", correct: false}] }
        ]
    },
    {
        level: 3, title: "The Solar System", topic: "Superlatives (最 - The most)",
        img: "https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4",
        grammarDesc: "<strong>Superlatives:</strong> Describing the extremes of facts.<br>最 (zeoi3) means 'the most'. 例如：最大 (the biggest).",
        vocab: [
            {c: "太陽系", j: "taai3 joeng4 hai6", e: "Solar system"}, {c: "行星", j: "haang4 sing1", e: "Planet"},

            {c: "近", j: "gan6", e: "Close / Near"}, {c: "圍繞", j: "wai4 jiu5", e: "Revolve around"}
        ],
        story: "我哋住喺地球上面，地球係太陽系嘅八大行星之一。<br>太陽系入面，所有行星都會圍繞住太陽轉。<br>喺八個行星之中，木星係最大嘅一顆行星。<br>而水星就係距離太陽最近嘅行星。<br>太陽係太陽系入面最光同最熱嘅恆星，畀我哋光同溫暖。",
        jyutping: "Ngo5 dei6 zyu6 hai2 dei6 kau4 soeng6 min6, dei6 kau4 hai6 taai3 joeng4 hai6 ge3 baat3 daai6 haang4 sing1 zi1 jat1.<br>Taai3 joeng4 hai6 jap6 min6, so2 jau5 haang4 sing1 dou1 wui5 wai4 jiu5 zyu6 taai3 joeng4 zyun3.<br>Hai2 baat3 go3 haang4 sing1 zi1 zung1, muk6 sing1 hai6 <span class='highlight'>zeoi3</span> daai6 ge3 jat1 fo2 haang4 sing1.<br>Ji4 seoi2 sing1 zau6 hai6 geoi5 lei4 taai3 joeng4 <span class='highlight'>zeoi3</span> gan6 ge3 haang4 sing1.<br>Taai3 joeng4 hai6 taai3 joeng4 hai6 jap6 min6 <span class='highlight'>zeoi3</span> gwong1 tung4 <span class='highlight'>zeoi3</span> jit6 ge3 hang4 sing1, bei2 ngo5 dei6 gwong1 tung4 wan1 nyun5.",

        quizzes: [

            { q: "太陽為地球帶嚟咩嘢？", e: "(What does the Sun bring to Earth?)", options: [{c: "光同溫暖", e: "(Light and warmth)", correct: true}, {c: "落雨同落雪", e: "(Rain and snow)", correct: false}, {c: "黑暗", e: "(Darkness)", correct: false}] }

        grammarDesc: "<strong>Conditions:</strong> Explaining what is necessary for something to happen.<br>需要 (seoi1 jiu3) ... 先可以 (sin1 ho2 ji5) means 'Needs [X] in order to [Y]'.",
        vocab: [

            {c: "需要", j: "seoi1 jiu3", e: "Need"}, {c: "先可以", j: "sin1 ho2 ji5", e: "Only then can / In order to"},
            {c: "陽光", j: "joeng4 gwong1", e: "Sunlight"}, {c: "水分", j: "seoi2 fan6", e: "Water / Moisture"},

        story: "一棵植物係點樣生長出嚟㗎呢？首先，我哋要將種子埋落泥土入面。<br>植物需要充足嘅陽光同埋水分，先可以慢慢發芽。<br>種子發芽之後，會向下生出根去吸收營養。<br>然後，佢會向上長出綠色嘅葉同埋莖。<br>好好照顧佢哋，最後仲會開出靚靚嘅花朵添。",
        jyutping: "Jat1 po1 zik6 mat6 hai6 dim2 joeng2 saang1 zoeng2 ceot1 lei4 gaa3 ne1? Sau2 sin1, ngo5 dei6 jiu3 zoeng1 zung2 zi2 maai4 lok6 nai4 tou2 jap6 min6.<br>Zik6 mat6 <span class='highlight'>seoi1 jiu3</span> cung1 zuk1 ge3 joeng4 gwong1 tung4 maai4 seoi2 fan6, <span class='highlight'>sin1 ho2 ji5</span> maan6 maan6 faat3 ngaa4.<br>Zung2 zi2 faat3 ngaa4 zi1 hau6, wui5 hoeng3 haa6 saang1 ceot1 gan1 heoi3 kap1 sau1 jing4 joeng5.<br>Jin4 hau6, keoi5 wui5 hoeng3 soeng6 zoeng2 ceot1 luk6 sik1 ge3 jip6 tung4 maai4 ging3.<br>Hou2 hou2 ziu3 gu3 keoi5 dei6, zeoi3 hau6 zung6 wui5 hoi1 ceot1 leng3 leng3 ge3 faa1 do2 tim1.",

        jyutping: "Gung1 gung6 tou4 syu1 gun2 hai6 jat1 go3 bei2 daai6 gaa1 jyut6 duk6 tung4 hok6 zaap6 ge3 dei6 fong1, so2 ji5 ngo5 dei6 jiu3 sau2 gwai1 geoi2.<br>Zi2 jiu3 nei5 jau5 tou4 syu1 zing3, zau6 <span class='highlight'>ho2 ji5</span> min5 fai3 ze3 syu1 faan1 uk1 kei2 tai2.<br>Hai2 tou4 syu1 gun2 jap6 min6, ngo5 dei6 jat1 ding6 jiu3 bou2 ci4 on1 zing6, <span class='highlight'>m4 ho2 ji5</span> daai6 seng1 gong2 je5 waak6 ze2 paau2 lei4 paau2 heoi3.<br>Wai6 zo2 bou2 ci4 dei6 fong1 cing1 git3, tou4 syu1 gun2 jap6 min6 jik6 dou1 <span class='highlight'>m4 ho2 ji5</span> jam2 sik6.<br>Ze3 zo2 ge3 syu1 jiu3 hai2 saam1 go3 sing1 kei4 ge3 kei4 haan6 noi6 gwai1 waan4, jyu4 gwo2 m4 hai6 zau6 wui5 bei6/bei2 fat6 fun2.",
        english: "The public library is a place for everyone to read and learn, so we must follow the rules.<br>As long as you have a library card, you can borrow books to read at home for free.<br>Inside the library, we must keep quiet, and cannot speak loudly or run around.<br>In order to keep the place clean, eating and drinking are also not allowed inside the library.<br>Borrowed books must be returned within the three-week deadline, otherwise you will be fined.",

        jyutping: "Wan1 go1 waa4 si5 zung1 sam1 pong4 bin1 <span class='highlight'>jau5</span> jat1 go3 hou2 daai6 ge3 gung1 jyun2, giu3 zou6 si2 daan1 lei6 gung1 jyun2.<br>Gung1 jyun2 jap6 min6 <span class='highlight'>jau5</span> mau6 mat6 ge3 sam1 lam4, zung6 <span class='highlight'>jau5</span> hou2 do1 gei2 baak3 nin4 lik6 si2 ge3 daai6 gu2 syu6.<br>Hoi2 bin1 <span class='highlight'>jau5</span> jat1 tiu4 hou2 coeng4 ge3 hoi2 pong4 bou6 dou6, hou2 do1 jan4 zung1 ji3 hai2 dou6 saan3 bou6 tung4 caai2 daan1 ce1.<br>Gung1 jyun2 dung1 min6 <span class='highlight'>jau5</span> gei2 tiu4 jyun4 zyu6 man4 diu1 hak1 ge3 coi2 sik1 tou4 tang4 cyu5, fei1 soeng4 zi1 dak6 bit6.<br>Ceoi4 ci2 zi1 ngoi6, gung1 jyun2 jap6 min6 zung6 <span class='highlight'>jau5</span> jat1 go3 Wan1 go1 waa4 seoi2 zuk6 gun2, ho2 ji5 tai2 dou2 hou2 do1 hoi2 joeng4 sang1 mat6.",
        english: "Beside downtown Vancouver, there is a very big park called Stanley Park.<br>Inside the park there is a dense forest, and also many large ancient trees with hundreds of years of history.<br>By the sea there is a very long seawall path; many people like to walk and ride bicycles there.<br>On the east side of the park there are several colorful totem poles carved by Indigenous peoples, which are very special.<br>Besides this, inside the park there is also the Vancouver Aquarium, where you can see many marine animals.",

        jyutping: "Wai6 zo2 bou2 ci4 san1 tai2 gin6 hong1, ngo5 dei6 <span class='highlight'>jing1 goi1</span> jiu3 zyu3 ji3 jam2 sik6 zaap6 gwaan3.<br>Mui5 jat6 ngo5 dei6 <span class='highlight'>jing1 goi1</span> sik6 do1 di1 so1 coi3 tung4 saang1 gwo2, jan1 wai6 keoi5 dei6 jau5 fung1 fu3 ge3 wai4 taa1 ming6 tung4 jing4 joeng5.<br>Siu2 pang4 jau5 <span class='highlight'>m4 jing1 goi1</span> sik6 taai3 do1 ling4 sik6 tung4 maai4 zyu1 gu1 lik1, jan1 wai6 sik6 taai3 do1 tong2 wui5 zyu3 ngaa4.<br>Hau2 hot3 go2 zan6, ngo5 dei6 <span class='highlight'>jing1 goi1</span> do1 jam2 cing1 seoi2.<br>Zeon6 loeng6 <span class='highlight'>m4 jing1 goi1</span> jam2 taai3 do1 tim4 ge3 hei3 seoi2, gam2 joeng2 san1 tai2 sin1 wui5 koeng4 zong3.",

        jyutping: "Jat1 nin4 jau5 sei3 go3 gwai3 zit3, hei3 hau6 wui5 bat1 dyun6 bin3 faa3.<br><span class='highlight'>Dou3 zo2</span> ceon1 tin1, tin1 hei3 hoi1 ci2 wui4 nyun5, gung1 jyun2 di1 faa1 <span class='highlight'>zau6</span> cyun4 bou6 hoi1 saai3.<br><span class='highlight'>Dou3 zo2</span> haa6 tin1, taai3 joeng4 hou2 maang5 lit6, tin1 hei3 <span class='highlight'>zau6</span> bin3 dak1 fei1 soeng4 zi1 jit6, daai6 gaa1 zung1 ji3 heoi3 jau4 seoi2.<br><span class='highlight'>Dou3 zo2</span> cau1 tin1, syu6 jip6 wui5 bin3 wong4 tung4 bin3 hung4, fung1 jat1 ceoi1 <span class='highlight'>zau6</span> wui5 jau5 lok6 jip6.<br>Zeoi3 hau6 <span class='highlight'>dou3 zo2</span> dung1 tin1, tin1 hei3 wui5 bin3 dak1 hou2 dung3, Wan1 go1 waa4 jau5 si4 hau6 zung6 wui5 lok6 syut3 tim1.",
        english: "A year has four seasons, and the climate changes continuously.<br>When Spring arrives, the weather starts to warm up, and the flowers in the park all bloom.<br>When Summer arrives, the sun is very fierce, the weather becomes extremely hot, and everyone likes to go swimming.<br>When Autumn arrives, leaves will turn yellow and red, and when the wind blows there will be falling leaves.<br>Finally, when Winter arrives, the weather will become very cold, and Vancouver will sometimes even have snow.",

        english: "Today I want to write a letter to a friend far away.<br>After writing, I need to put the letter into the envelope, and then seal the opening well.<br>Next, I write my friend's address clearly on the envelope and stick on a stamp.<br>Finally, I put the letter into the red mailbox at the street corner.<br>The mail carrier will regularly collect the mail, then deliver the letter to my friend's house, they will receive it very soon.",

            { q: "信封上面必須要有咩嘢？", e: "(What must be on the envelope?)", options: [{c: "地址同郵票", e: "(Address and stamp)", correct: true}, {c: "相片同貼紙", e: "(Photo and stickers)", correct: false}, {c: "銀紙", e: "(Money/Banknote)", correct: false}] },
            { q: "作者將寫好嘅信放去邊度？", e: "(Where did the author put the finished letter?)", options: [{c: "街口嘅郵筒", e: "(The mailbox at the street corner)", correct: true}, {c: "垃圾桶", e: "(Garbage bin)", correct: false}, {c: "書包入面", e: "(Inside the schoolbag)", correct: false}] },
            { q: "邊個負責將信件送到朋友屋企？", e: "(Who is responsible for delivering the letter to the friend's house?)", options: [{c: "郵差叔叔", e: "(The mail carrier)", correct: true}, {c: "警察叔叔", e: "(The police officer)", correct: false}, {c: "老師", e: "(The teacher)", correct: false}] },

            { q: "通常喺邊兩個時間刷牙最好？", e: "(Usually at which two times is it best to brush teeth?)", options: [{c: "朝早起身同夜晚臨瞓前", e: "(Morning after waking and night before sleeping)", correct: true}, {c: "食晏晝飯前後", e: "(Before and after eating lunch)", correct: false}, {c: "返學同放學嗰陣", e: "(Going to and leaving school)", correct: false}] },

        story: "喺溫哥華搭天車，我哋要遵守交通禮儀。<br>喺月台等車嗰陣要排隊，等車廂入面嘅人落車先好行入去。<br>如果車入面冇位坐，就要緊握扶手，小心跌低。<br>見到長者、大肚婆或者有需要嘅人，我哋應該主動讓座畀佢哋。<br>做個有禮貌嘅好乘客，大家都搭得開心安全。",
        jyutping: "Hai2 Wan1 go1 waa4 daap3 tin1 ce1, ngo5 dei6 jiu3 zeon1 sau2 gaau1 tung1 lai5 ji4.<br>Hai2 jyut6 toi4 dang2 ce1 go2 zan6 jiu3 paai4 deoi2, dang2 ce1 soeng1 jap6 min6 ge3 jan4 lok6 ce1 sin1 hou2 haang4 jap6 heoi3.<br>Jyu4 gwo2 ce1 jap6 min6 mou5 wai2 co5, zau6 jiu3 gan2 ak1 fu4 sau2, siu2 sam1 dit3 dai1.<br>Gin3 dou2 zoeng2 ze2, daai6 tou5 po4 waak6 ze2 jau5 seoi1 jiu3 ge3 jan4, ngo5 dei6 jing1 goi1 zyu2 dung6 <span class='highlight'>joeng6 zo6</span> bei2 keoi5 dei6.<br>Zou6 go3 jau5 lai5 maau6 ge3 hou2 sing4 haak3, daai6 gaa1 dou1 daap3 dak1 hoi1 sam1 on1 cyun4.",

        quizzes: [

            { q: "見到有需要嘅人上車應該點做？", e: "(What should be done seeing a person in need board the train?)", options: [{c: "主動讓座畀佢哋", e: "(Proactively give up the seat to them)", correct: true}, {c: "扮見唔到", e: "(Pretend not to see)", correct: false}, {c: "叫佢哋企遠啲", e: "(Tell them to stand further away)", correct: false}] },

            { q: "「讓座」係咩意思？", e: "(What does 'joeng zo' mean?)", options: [{c: "將自己個座位讓畀其他人坐", e: "(Giving one's own seat for another person to sit)", correct: true}, {c: "霸佔兩個座位", e: "(Taking up two seats)", correct: false}, {c: "喺座位度瞓覺", e: "(Sleeping in the seat)", correct: false}] }

let currentLevel = 0;

function playText(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-HK';
        const voices = window.speechSynthesis.getVoices();
        const hkVoice = voices.find(voice => voice.lang.includes('zh-HK') || voice.lang.includes('yue'));
        if (hkVoice) utterance.voice = hkVoice;
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    }
}

function checkAnswer(buttonElement, isCorrect) {
    const optionsContainer = buttonElement.closest('.options');
    const allButtons = optionsContainer.querySelectorAll('.option-btn');
    allButtons.forEach(btn => btn.style.pointerEvents = 'none');

    if (isCorrect) {
        buttonElement.classList.add('correct');
        buttonElement.innerHTML = buttonElement.innerHTML.replace('</span>', ' ✅ </span>');
    } else {
        buttonElement.classList.add('wrong');
        buttonElement.innerHTML = buttonElement.innerHTML.replace('</span>', ' ❌ </span>');
        allButtons.forEach(btn => {
            if (btn.dataset.correct === "true") btn.classList.add('correct');
        });
    }
}

function loadMission(index) {
    if(index < 0 || index >= missionsData.length) return;
    currentLevel = index;
    const m = missionsData[index];
    const app = document.getElementById('app');

    let vocabHtml = m.vocab.map((v, i) => `
        <button class="vocab-item" onclick="playText('${v.c}')">
            <span class="icon">🔊</span>
            <div><strong>${i+1}. ${v.c}</strong> (${v.j}) - ${v.e}</div>
        </button>
    `).join('');

    let quizHtml = m.quizzes.map((q, qIndex) => `
        <div class="quiz-question">
            <div class="question-text">
                ${qIndex + 1}. ${q.q}
                <button class="play-btn-small" onclick="playText('${q.q}')">🔊</button>
                <span class="eng-trans">${q.e}</span>
            </div>
            <div class="options">
                ${q.options.map((opt, oIndex) => `
                    <div class="option-row">
                        <button class="play-btn-option" onclick="playText('${opt.c}')">🔊</button>
                        <button class="option-btn" data-correct="${opt.correct}" onclick="checkAnswer(this, ${opt.correct})">
                            ${String.fromCharCode(65 + oIndex)}. ${opt.c} <span class="eng-trans">${opt.e}</span>
                        </button>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');

    app.innerHTML = `
        <div class="header">
            <h1>🎒 Elementary Mission ${m.level} / 15</h1>
            <p>${m.title} (${m.topic})</p>
        </div>

        <img src="${m.img}" class="news-image">

        <div class="prep-section">
            <h3>📚 Grammar & Vocabulary Prep</h3>
            <p>${m.grammarDesc}</p>
            <p><strong>10 Key Vocabulary Words:</strong></p>
            <div class="vocab-grid">${vocabHtml}</div>
        </div>

        <button class="action-btn" onclick="playText('${m.story.replace(/<[^>]*>?/gm, '')}')">
            🔊 Play Full Story Audio
        </button>

        <div class="script-box">
            <div class="cantonese-text">${m.story}</div>
            <div class="jyutping">${m.jyutping}</div>
        </div>

        <div class="quiz-section">
            <h3>📝 Knowledge Check</h3>
            ${quizHtml}
        </div>

        <div class="translation-box">
            <strong>English Translation:</strong><br>
            ${m.english}
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" ${currentLevel === 0 ? 'disabled' : ''} onclick="loadMission(currentLevel - 1)">⬅️ Previous</button>
            <button class="nav-btn" ${currentLevel === missionsData.length - 1 ? 'disabled' : ''} onclick="loadMission(currentLevel + 1)">Next ➡️</button>
        </div>
    `;
    window.scrollTo(0, 0);
}

// THIS IS THE MODIFIED SECTION
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

window.onload = () => {
    // Force voices to initialize
    window.speechSynthesis.getVoices();

    // 1. Get the level from the URL (e.g., beginner.html?level=2)
    const urlParams = new URLSearchParams(window.location.search);
    const levelParam = urlParams.get('level');
    
    // 2. Convert that to a number
    if (levelParam) {
        const targetMissionIndex = parseInt(levelParam) - 1; // Level 2 is Index 1
        
        // 3. Check if that mission exists in your missionsData array
        if (targetMissionIndex >= 0 && targetMissionIndex < missionsData.length) {
            loadMission(targetMissionIndex);
        } else {
            loadMission(0); // Default to first mission if number is wrong
        }
    } else {
        loadMission(0); // Default if no number is in URL
    }
};
