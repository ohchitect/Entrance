        story: "我哋喺溫哥華做建築，最麻煩就係申請入伙紙。<br>今日老闆 Alex 話，個地盤俾市政府查出有問題，所以要停工。<br>我哋而家要即刻聯絡市政府解釋，希望可以快啲解決。<br>如果唔係，個項目就會俾人罰錢，仲會影響進度。",

        jyutping: "Gwaan1 jyu1 Luxe daan1 wai2 ge3 sat1 noi6 cit3 gai3, haak3 jan4 Paul deoi3 muk6 gung1 ge3 jiu1 kau4 fei1 soeng4 zi1 gou1.<br>Keoi5 waa6 <span class='highlight'>zau6 syun3</span> gaa3 cin4 gwai3 di1, <span class='highlight'>dou1</span> jat1 ding6 jiu3 jung6 zeoi3 hou2 ge3 coi4 liu2.<br>Jan1 wai6 ni1 go3 daan1 wai2 ge3 tou4 zak1 bei2 gaau3 dak6 bit6, so2 ji5 ngo5 dei6 jiu3 cung4 san1 waak6 gwo3 di1 tou4.<br>Ting1 jat6 hoi1 wui2 ngo5 wui5 coeng4 sai3 gaai2 sik1 go3 cit3 gai3 lei5 nim6 bei2 keoi5 teng1.",

        vocab: [

        jyutping: "<span class='highlight'>Seoi1 jin4</span> baat3 jyut6 heoi3 Banff dou6 mat6 jyut6 hai6 zeoi3 hou2 ge3 gwai3 zit3, <span class='highlight'>daan6 hai6</span> zau2 dim3 zan1 hai6 fei1 soeng4 zi1 naan4 deng6.<br>Ngo5 dei6 tai2 zo2 hou2 do1 gaan1 zau2 dim3, faat3 jin6 daai6 bou6 fan6 leng3 ging2 ge3 fong4 gaan1 dou1 ji5 ging1 bei2 jan4 book saai3.<br>Zeoi3 hau6 ngo5 dei6 hou2 coi2 wan2 dou2 jat1 gaan1 hai2 saan1 goek3 ge3 man4 suk1.<br><span class='highlight'>Seoi1 jin4</span> lei4 si5 keoi1 jyun5 siu2 siu2, <span class='highlight'>daan6 hai6</span> fung1 ging2 jat1 lau4, zung6 ho2 ji5 mui5 jat6 zi6 gei2 zyu2 zou2 caan1.",
        english: "Although August is the best season to go to Banff for a honeymoon, hotels are really extremely hard to book.<br>We looked at many hotels and found that most rooms with a nice view were already fully booked by people.<br>Finally, we luckily found a B&B at the foot of the mountain.<br>Although it is a bit far from downtown, the scenery is first-class, and we can also cook breakfast ourselves every day.",

            { q: "佢哋最後訂咗咩類型嘅住宿？", e: "(What type of accommodation did they book in the end?)", options: [{c: "喺山腳嘅民宿", e: "(A B&B at the foot of the mountain)", correct: true}, {c: "市中心嘅五星級酒店", e: "(A 5-star hotel in downtown)", correct: false}, {c: "喺湖邊嘅帳篷", e: "(A tent by the lake)", correct: false}] },
            { q: "呢間民宿有咩缺點同優點？", e: "(What are the pros and cons of this B&B?)", options: [{c: "離市區遠，但風景一流", e: "(Far from downtown, but scenery is excellent)", correct: true}, {c: "好平，但係冇早餐食", e: "(Very cheap, but no breakfast available)", correct: false}, {c: "好近市區，但係風景好差", e: "(Very close to downtown, but terrible scenery)", correct: false}] },

        img: "https://images.unsplash.com/photo-1555421689-491a97ff2040",
        grammarDesc: "<strong>Purpose:</strong> Expressing intention.<br>為咗 (wai6 zo2) means 'In order to' or 'For the sake of'. It usually starts the sentence.",
        vocab: [

        story: "為咗令 Paul 同埋 Peter 清楚了解工程進度，我每個星期五都會整理一份詳細嘅報告。<br>今個星期嘅報告特別長，因為我要解釋點解冷氣系統會延遲送到。<br>我喺電郵入面強調，雖然有阻滯，但我哋已經加派人手趕工。<br>我哋保證一定可以如期交樓畀佢哋。",
        jyutping: "<span class='highlight'>Wai6 zo2</span> ling6 Paul tung4 maai4 Peter cing1 co2 liu5 gaai2 gung1 cing4 zeon3 dou6, ngo5 mui5 go3 sing1 kei4 ng5 dou1 wui5 zing2 lei5 jat1 fan6 coeng4 sai3 ge3 bou3 gou3.<br>Gam1 go3 sing1 kei4 ge3 bou3 gou3 dak6 bit6 coeng4, jan1 wai6 ngo5 jiu3 gaai2 sik1 dim2 gaai2 laang5 hei3 hai6 tung2 wui5 jin4 ci4 sung3 dou3.<br>Ngo5 hai2 din6 jau4 jap6 min6 koeng4 diu6, seoi1 jin4 jau5 zo2 zai6, daan6 ngo5 dei6 ji5 ging1 gaa1 paai3 jan4 sau2 gun2 gung1.<br>Ngo5 dei6 bou2 zing3 jat1 ding6 ho2 ji5 jyu4 kei4 gaau1 lau2 bei2 keoi5 dei6.",
        english: "In order to make Paul and Peter clearly understand the project progress, I compile a detailed report every Friday.<br>This week's report is particularly long because I have to explain why the air conditioning system will be delivered late.<br>I emphasized in the email that although there are obstacles, we have already deployed more staff to rush the work.<br>We guarantee that we can definitely hand over the unit to them on schedule.",
        quizzes: [

            { q: "今個星期發生咗咩問題？", e: "(What problem occurred this week?)", options: [{c: "冷氣系統會延遲送到", e: "(Air conditioning system will be delivered late)", correct: true}, {c: "木工師傅罷工", e: "(Millworkers went on strike)", correct: false}, {c: "圖則畫錯咗", e: "(The floor plans were drawn wrong)", correct: false}] },
            { q: "面對阻滯，作者團隊採取咗咩行動？", e: "(Facing obstacles, what action did the team take?)", options: [{c: "加派人手趕工", e: "(Deployed more staff to rush the work)", correct: true}, {c: "要求客人推遲交樓日期", e: "(Asked the client to delay handover date)", correct: false}, {c: "換咗另一個冷氣供應商", e: "(Changed to another AC supplier)", correct: false}] },
            { q: "「如期交樓」代表咩意思？", e: "(What does 'jyu kei gaau lau' represent?)", options: [{c: "按照原本計劃嘅時間完成", e: "(Complete according to originally planned time)", correct: true}, {c: "提早完成所有工程", e: "(Complete all work ahead of schedule)", correct: false}, {c: "無限期押後", e: "(Postpone indefinitely)", correct: false}] },
            { q: "電郵係寫畀邊個嘅？", e: "(Who is the email written to?)", options: [{c: "Paul 同埋 Peter", e: "(Paul and Peter)", correct: true}, {c: "Alex 同埋 Jordan", e: "(Alex and Jordan)", correct: false}, {c: "市政府", e: "(City government)", correct: false}] }

    {
        level: 7, title: "Tax Laws for Newcomers", topic: "Exception (除非... 如果唔係 - Unless... otherwise)",
        img: "https://images.unsplash.com/photo-1554224155-6726b3ff858f",
        grammarDesc: "<strong>Exception/Condition:</strong> Expressing that an action must happen unless a condition is met.<br>除非 (ceoi4 fei1) ... 如果唔係 (jyu4 gwo2 m4 hai6) means 'Unless... otherwise'.",
        vocab: [

            {c: "到埗", j: "dou3 bou6", e: "Arrive"}, {c: "新移民", j: "san1 ji4 man4", e: "New immigrant"},
            {c: "除非", j: "ceoi4 fei1", e: "Unless"}, {c: "證明", j: "zing3 ming4", e: "Prove / Evidence"},
            {c: "原居地", j: "jyun4 geoi1 dei6", e: "Place of origin"}, {c: "全球收入", j: "cyun4 kau4 sau1 jap6", e: "Global income"},
            {c: "稅局", j: "seoi3 guk2", e: "Tax bureau"}, {c: "先至", j: "sin1 zi3", e: "Only then / Finally"}
        ],
        story: "喺加拿大報稅嘅規矩好複雜，特別係對於我呢啲舊年十月先到埗嘅新移民。<br>會計師同我講，除非我能夠證明我喺原居地已經交咗稅，如果唔係我就要將全球收入都報畀稅局知。<br>呢個要求真係好麻煩，因為要搜集好多跨國文件。<br>我花咗成個週末先至整理好所有資料。",
        jyutping: "Hai2 Gaa1 naa4 daai6 bou3 seoi3 ge3 gwai1 geoi2 hou2 fuk1 zaap6, dak6 bit6 hai6 deoi3 jyu1 ngo5 ni1 di1 gau6 nin2 sap6 jyut6 sin1 dou3 bou6 ge3 san1 ji4 man4.<br>Wui6 gai3 si1 tung4 ngo5 gong2, <span class='highlight'>ceoi4 fei1</span> ngo5 nang4 gau3 zing3 ming4 ngo5 hai2 jyun4 geoi1 dei6 ji5 ging1 gaau1 zo2 seoi3, <span class='highlight'>jyu4 gwo2 m4 hai6</span> ngo5 zau6 jiu3 zoeng1 cyun4 kau4 sau1 jap6 dou1 bou3 bei2 seoi3 guk2 zi1.<br>Ni1 go3 jiu1 kau4 zan1 hai6 hou2 maa4 faan4, jan1 wai6 jiu3 sau2 zaap6 hou2 do1 kwaa1 gwok3 man4 gin2.<br>Ngo5 faa1 zo2 seng4 go3 zau1 mut6 sin1 zi3 zing2 lei5 hou2 so2 jau5 zi1 liu2.",
        english: "The tax filing rules in Canada are very complex, especially for new immigrants like me who only arrived last October.<br>The accountant told me that unless I can prove I have already paid taxes in my place of origin, otherwise I will have to report my global income to the tax bureau.<br>This requirement is really troublesome because it requires collecting many transnational documents.<br>I spent the whole weekend before I finally organized all the information.",
        quizzes: [
            { q: "新移民報稅有咩特別麻煩嘅地方？", e: "(What is particularly troublesome about tax filing for new immigrants?)", options: [{c: "如果無法證明已交稅，要報全球收入", e: "(If unable to prove taxes paid, must report global income)", correct: true}, {c: "稅率比本地人高好多", e: "(Tax rate is much higher than locals)", correct: false}, {c: "唔可以搵會計師幫手", e: "(Cannot find an accountant to help)", correct: false}] },
            { q: "點樣可以豁免申報全球收入？", e: "(How can one be exempted from reporting global income?)", options: [{c: "證明喺原居地已經交咗稅", e: "(Prove that taxes were already paid in the place of origin)", correct: true}, {c: "證明自己係臨時居民", e: "(Prove oneself is a temporary resident)", correct: false}, {c: "向市政府寫解釋信", e: "(Write an explanation letter to the city government)", correct: false}] },
            { q: "作者用咗幾耐時間整理文件？", e: "(How long did the author spend organizing documents?)", options: [{c: "成個週末", e: "(The whole weekend)", correct: true}, {c: "兩個星期", e: "(Two weeks)", correct: false}, {c: "半日", e: "(Half a day)", correct: false}] },
            { q: "「除非... 如果唔係」表達咗咩邏輯？", e: "(What logic does 'unless... otherwise' express?)", options: [{c: "唯一嘅例外情況，否則就會有特定後果", e: "(The only exception, otherwise a specific consequence occurs)", correct: true}, {c: "兩個都可以接受嘅選擇", e: "(Two acceptable choices)", correct: false}, {c: "發生時間嘅先後次序", e: "(Chronological order of occurrence)", correct: false}] },
            { q: "作者幾時到埗加拿大？", e: "(When did the author arrive in Canada?)", options: [{c: "舊年十月", e: "(Last year October)", correct: true}, {c: "今年一月", e: "(This year January)", correct: false}, {c: "八月", e: "(August)", correct: false}] }
        ]

        level: 8, title: "The Science of ASMR", topic: "Conditions (只要... 就 - As long as... then)",
        img: "https://images.unsplash.com/photo-1511379938547-c1f69419868d",

        story: "每日收工返到屋企我都覺得好攰，不過只要戴上耳機聽一陣 ASMR，我就會覺得成個人放鬆晒。<br>我特別鍾意聽啲木頭敲擊同埋落雨嘅聲音。<br>呢啲白噪音唔單止可以幫我減壓，仲可以令我夜晚瞓得更加好。<br>咁樣第二朝起身就會精神百倍，有活力應付新嘅挑戰。",
        jyutping: "Mui5 jat6 sau1 gung1 faan1 dou3 uk1 kei2 ngo5 dou1 gok3 dak1 hou2 gui6, bat1 gwo3 <span class='highlight'>zi2 jiu3</span> daai3 soeng5 ji5 gei1 teng1 jat1 zan6 ASMR, ngo5 <span class='highlight'>zau6</span> wui5 gok3 dak1 seng4 go3 jan4 fong3 sung1 saai3.<br>Ngo5 dak6 bit6 zung1 ji3 teng1 di1 muk6 tau4 haau1 gik1 tung4 maai4 lok6 jyu5 ge3 sing1 jam1.<br>Ni1 di1 baak6 cou3 jam1 m4 daan1 zi2 ho2 ji5 bong1 ngo5 gaam2 aat3, zung6 ho2 ji5 ling6 ngo5 je6 maan5 fan3 dak1 gang3 gaa1 hou2.<br>Gam2 joeng2 dai6 ji6 ziu1 hei2 san1 zau6 wui5 zing1 san4 baak3 pui5, jau5 wut6 lik6 jing3 fu3 san1 ge3 tiu1 zin3.",
        english: "Every day when I get home from work I feel very tired, but as long as I put on my headphones and listen to ASMR for a while, I will feel my whole body completely relaxed.<br>I particularly like listening to wood tapping and raining sounds.<br>These white noises not only help me relieve stress, but also make me sleep even better at night.<br>This way, when I wake up the next morning, I will be full of energy, with vitality to tackle new challenges.",
        quizzes: [
            { q: "作者放工返屋企之後覺得點？", e: "(How does the author feel after getting home from work?)", options: [{c: "覺得好攰", e: "(Feels very tired)", correct: true}, {c: "覺得好精神", e: "(Feels full of energy)", correct: false}, {c: "覺得好嬲", e: "(Feels very angry)", correct: false}] },
            { q: "咩方法可以令作者即刻放鬆？", e: "(What method can make the author relax immediately?)", options: [{c: "戴上耳機聽 ASMR", e: "(Put on headphones and listen to ASMR)", correct: true}, {c: "同朋友去食飯", e: "(Go out to eat with friends)", correct: false}, {c: "落街跑步", e: "(Go downstairs for a run)", correct: false}] },
            { q: "作者特別鍾意邊兩種聲音？", e: "(Which two sounds does the author particularly like?)", options: [{c: "木頭敲擊同落雨聲", e: "(Wood tapping and rain sounds)", correct: true}, {c: "車聲同地盤聲", e: "(Car sounds and construction sounds)", correct: false}, {c: "講嘢聲同音樂", e: "(Talking sounds and music)", correct: false}] },
            { q: "「只要... 就」強調咗咩？", e: "(What does 'as long as... then' emphasize?)", options: [{c: "滿足咗呢個條件，結果一定會發生", e: "(Once the condition is met, the result will definitely happen)", correct: true}, {c: "呢個係好困難先做到嘅事", e: "(This is a very difficult thing to achieve)", correct: false}, {c: "兩件事完全無關", e: "(The two events are completely unrelated)", correct: false}] },
            { q: "ASMR 對第二朝有咩好處？", e: "(What is the benefit of ASMR for the next morning?)", options: [{c: "令人精神百倍", e: "(Makes one full of energy)", correct: true}, {c: "令人好想賴床", e: "(Makes one want to stay in bed)", correct: false}, {c: "令人頭痛", e: "(Makes one have a headache)", correct: false}] }
        ]

        english: "I have waited a long time for the Mabinogi mobile version and the new Silent Hill release, but the developers announce delays time and time again.<br>Instead of wasting time waiting hopelessly here, I might as well play some other old games first.<br>Recently I discovered an indie horror game.<br>Its atmosphere is built extremely well, completely exceeding my expectations, making me temporarily forget the annoyance of the delays.",

            { q: "作者決定用咩方法應對延遲？", e: "(What method did the author decide to use to cope with the delay?)", options: [{c: "唔再死等，去玩其他遊戲先", e: "(Stop waiting hopelessly, go play other games first)", correct: true}, {c: "寫信去鬧開發商", e: "(Write a letter to scold the developers)", correct: false}, {c: "放棄打機，專心做嘢", e: "(Give up gaming, focus on work)", correct: false}] },
            { q: "新發現嘅遊戲有咩特點？", e: "(What are the characteristics of the newly discovered game?)", options: [{c: "係獨立製作，氣氛好，超出預期", e: "(Indie made, good atmosphere, exceeds expectations)", correct: true}, {c: "畫面好差，好沉悶", e: "(Terrible graphics, very boring)", correct: false}, {c: "係一款好出名嘅大作", e: "(It is a very famous AAA title)", correct: false}] },

        story: "自從舊年搬嚟溫哥華之後，我就深深體會到呢度冬天嘅威力。<br>連續幾個星期落雨，搞到成個城市都灰濛濛咁，令人心情好容易低落。<br>為咗對抗呢種天氣，我買咗對防水靴同一件好厚嘅雨褸。<br>而家就算出面橫風橫雨，我都可以照樣出街，唔會影響我嘅計劃。",

        english: "Ever since moving to Vancouver last year, I have deeply experienced the power of winter here.<br>Raining continuously for several weeks makes the whole city grey and gloomy, easily making people's mood down.<br>In order to fight against this weather, I bought a pair of waterproof boots and a very thick raincoat.<br>Now, even if there is driving wind and rain outside, I can still go out as usual, it won't affect my plans.",

            { q: "作者買咗咩嚟對抗天氣？", e: "(What did the author buy to fight the weather?)", options: [{c: "防水靴同厚雨褸", e: "(Waterproof boots and a thick raincoat)", correct: true}, {c: "一把好大嘅遮", e: "(A very big umbrella)", correct: false}, {c: "一部車", e: "(A car)", correct: false}] },
            { q: "「橫風橫雨」形容緊咩狀況？", e: "(What condition does 'waang fung waang jyu' describe?)", options: [{c: "風雨交加，天氣好惡劣", e: "(Wind and rain mixed together, very severe weather)", correct: true}, {c: "微風細雨", e: "(Breeze and drizzle)", correct: false}, {c: "打雷閃電", e: "(Thunder and lightning)", correct: false}] },

        story: "物理治療診所嘅裝修工程已經去到最後階段。<br>老闆 Alex 千叮萬囑，無論點樣都要確保無障礙通道嘅設計符合政府嘅標準。<br>因為如果唔達標，診所就攞唔到牌照。<br>我哋請咗專業嘅檢查員嚟做最後驗收，只要順利通過，下個星期診所就可以正式開張做生意。",
        jyutping: "Mat6 lei5 zi6 liu4 can2 so2 ge3 zong1 sau1 gung1 cing4 ji5 ging1 heoi3 dou3 zeoi3 hau6 gaai1 dyun6.<br>Lou5 baan2 Alex cin1 ding1 maan6 zuk1, <span class='highlight'>mou4 leon6</span> dim2 joeng2 <span class='highlight'>dou1</span> jiu3 kok3 bou2 mou4 zoeng3 ngoi6 tung1 dou6 ge3 cit3 gai3 fu4 hap6 zing3 fu2 ge3 biu1 zeon2.<br>Jan1 wai6 jyu4 gwo2 m4 daat6 biu1, can2 so2 zau6 lo2 m4 dou2 paai4 ziu3.<br>Ngo5 dei6 cing2 zo2 zyun1 jip6 ge3 gim2 caa4 jyun4 lei4 zou6 zeoi3 hau6 jim6 sau1, zi2 jiu3 seon6 lei6 tung1 gwo3, haa6 go3 sing1 kei4 can2 so2 zau6 ho2 ji5 zing3 sik1 hoi1 zoeng1 zou6 saang1 ji3.",
        english: "The renovation project for the physiotherapy clinic has reached its final stage.<br>Boss Alex exhorted repeatedly that no matter what, we must ensure the barrier-free access design complies with government standards.<br>Because if it doesn't meet the standard, the clinic cannot get its license.<br>We hired a professional inspector to do the final handover check; as long as it passes smoothly, the clinic can officially open for business next week.",

            { q: "「無論... 都」強調咗老闆嘅咩態度？", e: "(What attitude of the boss does 'no matter what' emphasize?)", options: [{c: "絕對唔可以妥協嘅堅定要求", e: "(A firm requirement with absolutely no compromise)", correct: true}, {c: "隨便點樣做都可以", e: "(Anything goes, do it however)", correct: false}, {c: "希望大家盡力而為", e: "(Hopes everyone tries their best)", correct: false}] },

            { q: "診所幾時可以開張？", e: "(When can the clinic open?)", options: [{c: "下個星期 (只要驗收順利)", e: "(Next week, provided inspection passes)", correct: true}, {c: "今日", e: "(Today)", correct: false}, {c: "出年", e: "(Next year)", correct: false}] }

            { q: "拍片方面有咩出色嘅地方？", e: "(What is outstanding about video shooting?)", options: [{c: "防震功能非常好", e: "(Anti-shake function is very good)", correct: true}, {c: "可以拍立體 3D", e: "(Can shoot 3D)", correct: false}, {c: "拍片唔使電", e: "(Shooting video doesn't need battery)", correct: false}] },

        story: "我一直以為學廣東話最難嘅係發音。<br>但係同 Jordan 傾多咗偈之後，先發覺原來啲地道俗語先至係最難搞。<br>有時候佢講完一個笑話，我要諗成分鐘先明白個笑點喺邊度。<br>不過佢好有耐性咁解釋畀我聽，令我學到好多書本上冇嘅知識。",
        jyutping: "Ngo5 jat1 zik6 ji5 wai4 hok6 gwong2 dung1 waa2 zeoi3 naan4 ge3 hai6 faat3 jam1.<br>Daan6 hai6 tung4 Jordan king1 do1 zo2 gai2 zi1 hau6, sin1 faat3 gok3 <span class='highlight'>jyun4 loi4</span> di1 dei6 dou6 zuk6 jyu5 sin1 zi3 hai6 zeoi3 naan4 gaau2.<br>Jau5 si4 hau6 keoi5 gong2 jyun4 jat1 go3 siu3 waa2, ngo5 jiu3 nam2 seng4 fan1 zung1 sin1 ming4 baak6 go3 siu3 dim2 hai2 bin1 dou6.<br>Bat1 gwo3 keoi5 hou2 jau5 noi6 sing3 gam2 gaai2 sik1 bei2 ngo5 teng1, ling6 ngo5 hok6 dou2 hou2 do1 syu1 bun2 soeng6 mou5 ge3 zi1 sik1.",

            { q: "後來作者發覺咩先係最難搞？", e: "(Later, what did the author realize is actually the hardest?)", options: [{c: "地道俗語", e: "(Authentic local slang)", correct: true}, {c: "聲調", e: "(Tones)", correct: false}, {c: "拼音", e: "(Jyutping/Pinyin)", correct: false}] },

let currentLevel = 0;

function playText(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-HK';
        const voices = window.speechSynthesis.getVoices();
        const hkVoice = voices.find(voice => voice.lang.includes('zh-HK') || voice.lang.includes('yue'));
        if (hkVoice) utterance.voice = hkVoice;
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    }
}

function checkAnswer(buttonElement, isCorrect) {
    const optionsContainer = buttonElement.closest('.options');
    const allButtons = optionsContainer.querySelectorAll('.option-btn');
    allButtons.forEach(btn => btn.style.pointerEvents = 'none');

    if (isCorrect) {
        buttonElement.classList.add('correct');
        buttonElement.innerHTML = buttonElement.innerHTML.replace('</span>', ' ✅ </span>');
    } else {
        buttonElement.classList.add('wrong');
        buttonElement.innerHTML = buttonElement.innerHTML.replace('</span>', ' ❌ </span>');
        allButtons.forEach(btn => {
            if (btn.dataset.correct === "true") btn.classList.add('correct');
        });
    }
}

function loadMission(index) {
    if(index < 0 || index >= missionsData.length) return;
    currentLevel = index;
    const m = missionsData[index];
    const app = document.getElementById('app');

    let vocabHtml = m.vocab.map((v, i) => `
        <button class="vocab-item" onclick="playText('${v.c}')">
            <span class="icon">🔊</span>
            <div><strong>${i+1}. ${v.c}</strong> (${v.j}) - ${v.e}</div>
        </button>
    `).join('');

    let quizHtml = m.quizzes.map((q, qIndex) => `
        <div class="quiz-question">
            <div class="question-text">
                ${qIndex + 1}. ${q.q}
                <button class="play-btn-small" onclick="playText('${q.q}')">🔊</button>
                <span class="eng-trans">${q.e}</span>
            </div>
            <div class="options">
                ${q.options.map((opt, oIndex) => `
                    <div class="option-row">
                        <button class="play-btn-option" onclick="playText('${opt.c}')">🔊</button>
                        <button class="option-btn" data-correct="${opt.correct}" onclick="checkAnswer(this, ${opt.correct})">
                            ${String.fromCharCode(65 + oIndex)}. ${opt.c} <span class="eng-trans">${opt.e}</span>
                        </button>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');

    app.innerHTML = `
        <div class="header">
            <h1>☕ Hard Mission ${m.level} / 15</h1>
            <p>${m.title} (${m.topic})</p>
        </div>

        <img src="${m.img}" class="news-image">

        <div class="prep-section">
            <h3>📚 Grammar & Vocabulary Prep</h3>
            <p>${m.grammarDesc}</p>
            <p><strong>10 Key Vocabulary Words:</strong></p>
            <div class="vocab-grid">${vocabHtml}</div>
        </div>

        <button class="action-btn" onclick="playText('${m.story.replace(/<[^>]*>?/gm, '')}')">
            🔊 Play Full Story Audio
        </button>

        <div class="script-box">
            <div class="cantonese-text">${m.story}</div>
            <div class="jyutping">${m.jyutping}</div>
        </div>

        <div class="quiz-section">
            <h3>📝 Knowledge Check</h3>
            ${quizHtml}
        </div>

        <div class="translation-box">
            <strong>English Translation:</strong><br>
            ${m.english}
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" ${currentLevel === 0 ? 'disabled' : ''} onclick="loadMission(currentLevel - 1)">⬅️ Previous</button>
            <button class="nav-btn" ${currentLevel === missionsData.length - 1 ? 'disabled' : ''} onclick="loadMission(currentLevel + 1)">Next ➡️</button>
        </div>
    `;
    window.scrollTo(0, 0);
}


// THIS IS THE MODIFIED SECTION
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

window.onload = () => {
    // Force voices to initialize
    window.speechSynthesis.getVoices();

    // 1. Get the level from the URL (e.g., beginner.html?level=2)
    const urlParams = new URLSearchParams(window.location.search);
    const levelParam = urlParams.get('level');
    
    // 2. Convert that to a number
    if (levelParam) {
        const targetMissionIndex = parseInt(levelParam) - 1; // Level 2 is Index 1
        
        // 3. Check if that mission exists in your missionsData array
        if (targetMissionIndex >= 0 && targetMissionIndex < missionsData.length) {
            loadMission(targetMissionIndex);
        } else {
            loadMission(0); // Default to first mission if number is wrong
        }
    } else {
        loadMission(0); // Default if no number is in URL
    }
};
