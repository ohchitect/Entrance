        level: 7, title: "Networking & Introductions", topic: "Pleasantries (久仰大名 - I've heard a lot about you)",
        img: "https://images.unsplash.com/photo-1515169067868-5387ec356754",
        grammarDesc: "<strong>Business Etiquette:</strong> Formal greetings when meeting someone important.<br>久仰大名 (gau2 joeng5 daai6 ming4) is a formal idiom meaning 'I've heard great things about you for a long time'.",
        vocab: [
            {c: "應酬", j: "jing3 cau4", e: "Socialize / Entertain (business)"}, {c: "商會", j: "soeng1 wui2", e: "Chamber of Commerce"},
            {c: "久仰大名", j: "gau2 joeng5 daai6 ming4", e: "I've heard a lot about you"}, {c: "幸會", j: "hang6 wui6", e: "Pleasure to meet you"},
            {c: "名片", j: "ming4 pin2", e: "Business card"}, {c: "潛在客戶", j: "cim4 zoi6 haak3 wu6", e: "Potential client"},
            {c: "承建商", j: "sing4 gin3 soeng1", e: "Contractor"}, {c: "合作空間", j: "hap6 zok3 hung1 gaan1", e: "Room for cooperation"},
            {c: "跟進", j: "gan1 zeon3", e: "Follow up"}, {c: "互惠互利", j: "wu6 wai6 wu6 lei6", e: "Mutually beneficial"}
        ],
        story: "尋晚我代表 Contour Projects 去參加溫哥華華人建築商會嘅年度晚宴。<br>呢啲商務應酬係拓展人脈同埋接觸潛在客戶嘅大好機會。<br>喺酒會期間，老闆 Alex 介紹我認識一位本地好出名嘅大型發展商總監。<br>我雙手遞上名片，好客氣咁講：「陳總，幸會幸會，久仰大名！我哋公司一直都有留意你哋喺列治文最新嗰個商場項目，設計真係非常出色。」<br>陳總接過名片，笑住話多謝，仲問起我哋近期做緊咩工程。<br>我簡單介紹咗我哋團隊喺高端寫字樓 tenant improvement (租戶裝修) 方面嘅豐富經驗。<br>大家傾得好投契，發現雙方喺未來嘅項目度有極大嘅合作空間。<br>臨走前，我哋互相加咗 LinkedIn，我話：「希望遲啲有機會可以約陳總飲杯咖啡，詳細傾下點樣達致互惠互利。」<br>今朝一返到公司，我已經即刻發咗封 follow-up email 畀佢，打鐵趁熱。",
        jyutping: "Cam4 maan5 ngo5 doi6 biu2 Contour Projects heoi3 caam1 gaa1 Wan1 go1 waa4 waa4 jan4 gin3 zuk1 soeng1 wui2 ge3 nin4 dou6 maan5 jin3.<br>Ni1 di1 soeng1 mou6 jing3 cau4 hai6 tok3 zin2 jan4 mak6 tung4 maai4 zip3 zuk1 cim4 zoi6 haak3 wu6 ge3 daai6 hou2 gei1 wui6.<br>Hai2 zau2 wui2 gei4 gaan1, lou5 baan2 Alex gaai3 siu6 ngo5 jing6 sik1 jat1 wai2 bun2 dei6 hou2 ceot1 meng2 ge3 daai6 jing4 faat3 zin2 soeng1 zung2 gaam1.<br>Ngo5 soeng1 sau2 dai6 soeng5 ming4 pin2, hou2 haak3 hei3 gam2 gong2: 「Can4 zung2, hang6 wui6 hang6 wui6, <span class='highlight'>gau2 joeng5 daai6 ming4</span>! Ngo5 dei6 gung1 si1 jat1 zik6 dou1 jau5 lau4 ji3 nei5 dei6 hai2 Lit6 zi6 mun4 zeoi3 san1 go2 go3 soeng1 coeng4 hong6 muk6, cit3 gai3 zan1 hai6 fei1 soeng4 ceot1 sik1.」<br>Can4 zung2 zip3 gwo3 ming4 pin2, siu3 zyu6 waa6 do1 ze6, zung6 man6 hei2 ngo5 dei6 zeoi3 gan6 zou6 gan2 me1 gung1 cing4.<br>Ngo5 gaan2 daan1 gaai3 siu6 zo2 ngo5 dei6 tyun4 deoi2 hai2 gou1 dyun1 se2 zi6 lau4 tenant improvement (zou1 wu6 zong1 sau1) fong1 min6 ge3 fung1 fu3 ging1 jim6.<br>Daai6 gaa1 king1 dak1 hou2 tau4 kai3, faat3 jin6 soeng1 fong1 hai2 mei6 loi4 ge3 hong6 muk6 dou6 jau5 gik6 daai6 ge3 hap6 zok3 hung1 gaan1.<br>Lam4 zau2 cin4, ngo5 dei6 wu6 soeng1 gaa1 zo2 LinkedIn, ngo5 waa6: 「Hei1 mong6 ci4 di1 jau5 gei1 wui6 ho2 ji5 joek3 Can4 zung2 jam2 bui1 gaa3 fe1, coeng4 sai3 king1 haa5 dim2 joeng2 daat6 zi3 wu6 wai6 wu6 lei6.」<br>Gam1 ziu1 jat1 faan1 dou3 gung1 si1, ngo5 ji5 ging1 zik1 hak1 faat3 zo2 fung1 follow-up email bei2 keoi5, daa2 tit3 can3 jit6.",
        english: "Last night I represented Contour Projects to attend the annual dinner of the Vancouver Chinese Construction Association.<br>These business networking events are great opportunities to expand connections and contact potential clients.<br>During the cocktail reception, my boss Alex introduced me to a very famous local large-scale developer director.<br>I handed over my business card with both hands and politely said: 'Director Chan, a pleasure to meet you, I have heard a lot about you for a long time! Our company has always been paying attention to your newest mall project in Richmond, the design is truly outstanding.'<br>Director Chan accepted the card, smiled and said thanks, and also asked what projects we are currently doing.<br>I briefly introduced our team's rich experience in high-end office tenant improvements.<br>We hit it off very well in conversation, discovering that both sides have enormous room for cooperation in future projects.<br>Before leaving, we added each other on LinkedIn, and I said: 'I hope later we have the chance to invite Director Chan for a cup of coffee, to discuss in detail how to achieve mutual benefit.'<br>This morning as soon as I returned to the office, I immediately sent a follow-up email to him, striking while the iron is hot.",
        quizzes: [
            { q: "作者去參加商會晚宴嘅主要目的係咩？", e: "(What is the main purpose of the author attending the Chamber of Commerce dinner?)", options: [{c: "拓展人脈同埋接觸潛在客戶", e: "(To expand connections and contact potential clients)", correct: true}, {c: "去食免費嘅豪華晚餐", e: "(To eat a free luxurious dinner)", correct: false}, {c: "去投訴其他承建商", e: "(To complain about other contractors)", correct: false}] },
            { q: "同陳總打招呼嗰陣，作者用咗咩說話嚟讚美對方？", e: "(When greeting Director Chan, what words did the author use to praise him?)", options: [{c: "話一直有留意佢哋喺列治文嘅商場項目，讚設計出色", e: "(Said they've been paying attention to his Richmond mall project, praised the design)", correct: true}, {c: "讚佢件西裝好靚", e: "(Praised his suit being very nice)", correct: false}, {c: "讚佢公司嘅股票升咗好多", e: "(Praised his company's stock going up a lot)", correct: false}] },
            { q: "作者點樣介紹自己公司嘅專長？", e: "(How did the author introduce their own company's specialty?)", options: [{c: "介紹團隊喺高端寫字樓 tenant improvement 嘅豐富經驗", e: "(Introduced the team's rich experience in high-end office TI)", correct: true}, {c: "話公司專門起木屋", e: "(Said the company specializes in building wooden houses)", correct: false}, {c: "話公司係溫哥華最平嘅承建商", e: "(Said the company is the cheapest contractor in Vancouver)", correct: false}] },
            { q: "第二朝返到公司，作者即刻做咗咩行動？", e: "(The next morning returning to the office, what action did the author take immediately?)", options: [{c: "發咗封 follow-up email 畀陳總，打鐵趁熱", e: "(Sent a follow-up email to Director Chan, striking while the iron is hot)", correct: true}, {c: "即刻打電話去簽約", e: "(Immediately called to sign a contract)", correct: false}, {c: "忘記晒尋晚發生嘅事", e: "(Forgot everything that happened last night)", correct: false}] },
            { q: "「久仰大名」喺商業交際中代表咩意思？", e: "(What does 'gau joeng daai ming' mean in business networking?)", options: [{c: "客氣話，表示早就聽過對方嘅名氣同成就，表達尊重", e: "(Polite phrase meaning you've long heard of their fame and achievements, expressing respect)", correct: true}, {c: "表示對方個名好難讀", e: "(Means the person's name is hard to pronounce)", correct: false}, {c: "問對方叫咩名", e: "(Asking what the person's name is)", correct: false}] }
        ]
    },
    {
        level: 8, title: "Proposing a Design Solution", topic: "Targeted Action (針對 - Aimed at / Addressing)",
        img: "https://images.unsplash.com/photo-1503387762-592deb58ef4e",
        grammarDesc: "<strong>Targeting Issues:</strong> Explaining solutions directly addressing a problem.<br>針對 (zam1 deoi3) means 'Aimed at' or 'In response to (a specific issue)'.",
        vocab: [
            {c: "針對", j: "zam1 deoi3", e: "Aimed at / Addressing"}, {c: "痛點", j: "tung3 dim2", e: "Pain point"},
            {c: "方案", j: "fong1 on3", e: "Solution / Proposal"}, {c: "空間感", j: "hung1 gaan1 gam2", e: "Sense of space"},
            {c: "局促", j: "guk6 cuk1", e: "Cramped / Confined"}, {c: "開放式", j: "hoi1 fong3 sik1", e: "Open-plan"},
            {c: "採光", j: "coi2 gwong1", e: "Lighting / Daylighting"}, {c: "隔音", j: "gaak3 jam1", e: "Sound insulation"},
            {c: "落地玻璃", j: "lok6 dei6 bo1 lei1", e: "Floor-to-ceiling glass"}, {c: "拍板", j: "paak3 baan2", e: "Approve / Decide"}
        ],
        story: "喺尋日同客戶嘅會議上，業主反映佢哋對目前辦公室嘅 layout 唔係好滿意。<br>佢哋覺得原先嘅設計太多間隔牆，令到成個工作環境好局促，員工之間溝通亦都唔方便。<br>針對客戶提出嘅呢啲痛點，我哋設計部連夜趕工，度咗一個全新嘅方案出嚟。<br>針對空間感不足嘅問題，我哋建議將中間嘅實體牆全部拆除，改為開放式 (Open-plan) 嘅工作區。<br>針對會議室採光同隔音嘅需求，我哋會採用雙層隔音嘅落地玻璃做間隔。<br>咁樣做既可以將自然光引入辦公室嘅每一個角落，又保證咗開會時嘅私隱度。<br>我仲特別安排咗 3D 渲染圖 (3D rendering)，等客戶可以直觀咁睇到裝修後嘅效果。<br>業主睇完新方案之後非常滿意，覺得完全解決咗佢哋嘅擔憂。<br>佢哋當場就拍板同意加錢做呢個升級改動，下個星期就可以正式訂料。",
        jyutping: "Hai2 cam4 jat6 tung4 haak3 wu6 ge3 wui6 ji5 soeng6, jip6 zyu2 faan2 jing2 keoi5 dei6 deoi3 muk6 cin4 baan6 gung1 sat1 ge3 layout m4 hai6 hou2 mun5 ji3.<br>Keoi5 dei6 gok3 dak1 jyun4 sin1 ge3 cit3 gai3 taai3 do1 gaan3 gaak3 coeng4, ling6 dou3 seng4 go3 gung1 zok3 waan4 ging2 hou2 guk6 cuk1, jyun4 gung1 zi1 gaan1 gau1 tung1 jik6 dou1 m4 fong1 bin6.<br><span class='highlight'>Zam1 deoi3</span> haak3 wu6 tai4 ceot1 ge3 ni1 di1 tung3 dim2, ngo5 dei6 cit3 gai3 bou6 lin4 je6 gon2 gung1, dok6 zo2 jat1 go3 cyun4 san1 ge3 fong1 on3 ceot1 lei4.<br><span class='highlight'>Zam1 deoi3</span> hung1 gaan1 gam2 bat1 zuk1 ge3 man6 tai4, ngo5 dei6 gin3 ji5 zoeng1 zung1 gaan1 ge3 sat6 tai2 coeng4 cyun4 bou6 caak3 ceoi4, goi2 wai4 hoi1 fong3 sik1 (Open-plan) ge3 gung1 zok3 keoi1.<br><span class='highlight'>Zam1 deoi3</span> wui6 ji5 sat1 coi2 gwong1 tung4 gaak3 jam1 ge3 seoi1 kau4, ngo5 dei6 wui5 coi2 jung6 soeng1 cang4 gaak3 jam1 ge3 lok6 dei6 bo1 lei1 zou6 gaan3 gaak3.<br>Gam2 joeng2 zou6 gei3 ho2 ji5 zoeng1 zi6 jin4 gwong1 jan5 jap6 baan6 gung1 sat1 ge3 mui5 jat1 go3 gok3 lok6, jau6 bou2 zing3 zo2 hoi1 wui2 si4 ge3 si1 jan2 dou6.<br>Ngo5 zung6 dak6 bit6 on1 paai4 zo2 3D syun2 jin5 tou4 (3D rendering), dang2 haak3 wu6 ho2 ji5 zik6 gun1 gam2 tai2 dou2 zong1 sau1 hau6 ge3 haau6 gwo2.<br>Jip6 zyu2 tai2 jyun4 san1 fong1 on3 zi1 hau6 fei1 soeng4 mun5 ji3, gok3 dak1 jyun4 cyun4 gaai2 kyut3 zo2 keoi5 dei6 ge3 daam1 jau1.<br>Keoi5 dei6 dong1 coeng4 zau6 paak3 baan2 tung4 ji3 gaa1 cin2 zou6 ni1 go3 sing1 kap1 goi2 dung6, haa6 go3 sing1 kei4 zau6 ho2 ji5 zing3 sik1 deng6 liu2.",
        english: "In yesterday's meeting with the client, the owners reflected that they were not very satisfied with the current office layout.<br>They felt the original design had too many partition walls, making the whole work environment very cramped, and communication between employees inconvenient.<br>Addressing these pain points raised by the client, our design department worked through the night and figured out a brand new solution.<br>Addressing the problem of insufficient sense of space, we suggest demolishing all the solid walls in the middle and changing to an Open-plan workspace.<br>Addressing the meeting room's needs for daylighting and sound insulation, we will adopt double-glazed floor-to-ceiling glass as partitions.<br>Doing it this way can both introduce natural light into every corner of the office, and guarantee privacy during meetings.<br>I also specially arranged for a 3D rendering, so the client can intuitively see the effect after renovation.<br>After seeing the new solution, the owners were very satisfied, feeling it completely solved their worries.<br>They approved it on the spot, agreeing to pay extra for this upgrade modification, and we can officially order materials next week.",
        quizzes: [
            { q: "客戶對原本嘅辦公室設計有咩唔滿意？", e: "(What was the client dissatisfied with regarding the original office design?)", options: [{c: "間隔牆太多，環境局促，溝通唔方便", e: "(Too many partition walls, cramped environment, inconvenient communication)", correct: true}, {c: "冷氣唔夠凍", e: "(The AC was not cold enough)", correct: false}, {c: "辦公室面積太細", e: "(The office area was too small)", correct: false}] },
            { q: "針對空間感不足嘅問題，作者提出咗咩解決方案？", e: "(Addressing the lack of space, what solution did the author propose?)", options: [{c: "拆除實體牆，改為開放式工作區", e: "(Demolish solid walls, change to open-plan workspace)", correct: true}, {c: "將個天花板拆咗", e: "(Demolish the ceiling)", correct: false}, {c: "叫一半員工喺屋企做嘢", e: "(Tell half the employees to work from home)", correct: false}] },
            { q: "點解會議室要用雙層隔音落地玻璃做間隔？", e: "(Why use double-glazed floor-to-ceiling glass for the meeting room partitions?)", options: [{c: "因為可以引入自然光，同時保證開會私隱度", e: "(Because it brings in natural light while guaranteeing meeting privacy)", correct: true}, {c: "因為玻璃最平", e: "(Because glass is the cheapest)", correct: false}, {c: "因為老闆鍾意睇出面", e: "(Because the boss likes looking outside)", correct: false}] },
            { q: "作者用咩工具幫客戶更加直觀咁明白個設計？", e: "(What tool did the author use to help the client understand the design more intuitively?)", options: [{c: "準備咗 3D 渲染圖 (3D rendering)", e: "(Prepared a 3D rendering)", correct: true}, {c: "用紙皮砌咗個模型出嚟", e: "(Built a cardboard model)", correct: false}, {c: "帶佢哋去睇其他公司", e: "(Took them to see other companies)", correct: false}] },
            { q: "「針對」喺商業提案中通常帶出咩邏輯？", e: "(What logic does 'Addressing / In response to' usually bring out in a business proposal?)", options: [{c: "直接回應客戶嘅具體痛點，提出度身訂造嘅解決辦法", e: "(Directly responding to the client's specific pain points, proposing tailored solutions)", correct: true}, {c: "批評客戶嘅要求唔合理", e: "(Criticizing the client's requests as unreasonable)", correct: false}, {c: "推卸責任畀其他部門", e: "(Shirking responsibility to other departments)", correct: false}] }
        ]
    },
    {
        level: 9, title: "Structuring a Presentation", topic: "Structuring Points (首先... 其次... 最後 - First... Second... Finally)",
        img: "https://images.unsplash.com/photo-1542744173-05336fcc7ad4",
        grammarDesc: "<strong>Presenting Clearly:</strong> Organizing ideas logically.<br>首先 (sau2 sin1), 其次 (kei4 ci3), 最後 (zeoi3 hau6) creates a professional 3-point structure.",
        vocab: [
            {c: "簡報", j: "gaan2 bou3", e: "Presentation / Briefing"}, {c: "首先", j: "sau2 sin1", e: "First of all"},
            {c: "其次", j: "kei4 ci3", e: "Secondly"}, {c: "最後", j: "zeoi3 hau6", e: "Finally"},
            {c: "招標", j: "ziu1 biu1", e: "Tender / Bidding"}, {c: "核心優勢", j: "hat6 sam1 jau1 sai3", e: "Core advantage"},
            {c: "往績", j: "wong5 zik1", e: "Track record"}, {c: "風險管理", j: "fung1 him2 gun2 lei5", e: "Risk management"},
            {c: "中標", j: "zung3 biu1", e: "Win a bid"}, {c: "說服力", j: "syut3 fuk6 lik6", e: "Persuasiveness"}
        ],
        story: "各位董事局成員，下晝好。今日我代表 Contour Projects 團隊，向大家進行呢次醫療中心擴建項目嘅投標簡報。<br>為咗令大家清楚明白我哋嘅方案，我會將內容分為三部分。<br>首先，我會分析我哋公司喺呢個項目上嘅核心優勢。<br>我哋擁有超過十年嘅醫療級別裝修經驗，往績良好，完全熟悉政府對診所排污同通風嘅嚴格法例要求。<br>其次，我會詳細講解我哋嘅工程時間表同埋預算控制策略。<br>我哋承諾採用分階段施工嘅模式，確保醫院喺裝修期間仍然可以維持基本嘅日常運作，將對病人嘅影響減到最低。<br>最後，我會重點講述我哋嘅風險管理機制。<br>針對近期建材短缺嘅危機，我哋已經同三家後備供應商簽訂咗預留協議，保證材料供應唔會斷鏈。<br>總括嚟講，我哋唔單止提供最具競爭力嘅價錢，仲提供最可靠嘅工程質素。<br>希望呢份充滿說服力嘅計劃書，可以贏得大家嘅信任，令我哋順利中標。",
        jyutping: "Gok3 wai2 dung2 si6 guk6 sing4 jyun4, haa6 zau3 hou2. Gam1 jat6 ngo5 doi6 biu2 Contour Projects tyun4 deoi2, hoeng3 daai6 gaa1 zeon3 haang4 ni1 ci3 ji1 liu4 zung1 sam1 kwong3 gin3 hong6 muk6 ge3 tau4 biu1 gaan2 bou3.<br>Wai6 zo2 ling6 daai6 gaa1 cing1 co2 ming4 baak6 ngo5 dei6 ge3 fong1 on3, ngo5 wui5 zoeng1 noi6 jung4 fan1 wai4 saam1 bou6 fan6.<br><span class='highlight'>Sau2 sin1</span>, ngo5 wui5 fan1 sik1 ngo5 dei6 gung1 si1 hai2 ni1 go3 hong6 muk6 soeng6 ge3 hat6 sam1 jau1 sai3.<br>Ngo5 dei6 jung2 jau5 ciu1 gwo3 sap6 nin4 ge3 ji1 liu4 kap1 bit6 zong1 sau1 ging1 jim6, wong5 zik1 loeng4 hou2, jyun4 cyun4 suk6 sik1 zing3 fu2 deoi3 can2 so2 paai4 wu1 tung4 tung1 fung1 ge3 jim4 gaak3 faat3 lai6 jiu1 kau4.<br><span class='highlight'>Kei4 ci3</span>, ngo5 wui5 coeng4 sai3 gong2 gaai2 ngo5 dei6 ge3 gung1 cing4 si4 gaan3 biu2 tung4 maai4 jyu6 syun3 hung3 zai3 caak3 loek6.<br>Ngo5 dei6 sing4 nok6 coi2 jung6 fan1 gaai1 dyun6 si1 gung1 ge3 mou4 sik1, kok3 bou2 ji1 jyun2 hai2 zong1 sau1 gei4 gaan1 jing4 jin4 ho2 ji5 wai4 ci4 gei1 bun2 ge3 jat6 soeng4 wan6 zok3, zoeng1 deoi3 beng6 jan4 ge3 jing2 hoeng2 gaam2 dou3 zeoi3 dai1.<br><span class='highlight'>Zeoi3 hau6</span>, ngo5 wui5 zung6 dim2 gong2 seot6 ngo5 dei6 ge3 fung1 him2 gun2 lei5 gei1 zai3.<br>Zam1 deoi3 zeoi3 gan6 gin3 coi4 dyun2 kyut3 ge3 ngai4 gei1, ngo5 dei6 ji5 ging1 tung4 saam1 gaa1 hau6 bei6 gung1 jing3 soeng1 cim1 ding6 zo2 jyu6 lau4 hip3 ji5, bou2 zing3 coi4 liu2 gung1 jing3 m4 wui5 dyun6 lin2.<br>Zung2 kut3 lei4 gong2, ngo5 dei6 m4 daan1 zi2 ti4 gung1 zeoi3 geoi6 ging6 zang1 lik6 ge3 gaa3 cin4, zung6 ti4 gung1 zeoi3 ho2 kaau3 ge3 gung1 cing4 zat1 sou3.<br>Hei1 mong6 ni1 fan6 cung1 mun5 syut3 fuk6 lik6 ge3 gai3 waak6 syu1, ho2 ji5 jeng4 dak1 daai6 gaa1 ge3 seon3 jam6, ling6 ngo5 dei6 seon6 lei6 zung3 biu1.",
        english: "Good afternoon, Board of Directors. Today I represent the Contour Projects team to deliver the bidding presentation for this medical center expansion project to everyone.<br>To make our proposal clearly understood by everyone, I will divide the content into three parts.<br>First of all, I will analyze our company's core advantages on this project.<br>We possess over 10 years of medical-grade renovation experience, a good track record, and are completely familiar with the government's strict legal requirements for clinic drainage and ventilation.<br>Secondly, I will explain in detail our construction schedule and budget control strategy.<br>We commit to adopting a phased construction model, ensuring the hospital can still maintain basic daily operations during the renovation, minimizing the impact on patients.<br>Finally, I will focus on describing our risk management mechanism.<br>Addressing the recent crisis of construction material shortages, we have already signed reservation agreements with three backup suppliers, guaranteeing the material supply chain won't break.<br>To sum up, we not only provide the most competitive price, but also provide the most reliable construction quality.<br>I hope this highly persuasive proposal can win everyone's trust and let us successfully win the bid.",
        quizzes: [
            { q: "作者做呢次簡報嘅主要目的係咩？", e: "(What is the main purpose of the author giving this presentation?)", options: [{c: "為醫療中心擴建項目進行投標，希望中標", e: "(To bid for the medical center expansion project, hoping to win)", correct: true}, {c: "匯報公司上個月嘅虧損", e: "(To report the company's losses last month)", correct: false}, {c: "介紹新入職嘅員工", e: "(To introduce newly hired employees)", correct: false}] },
            { q: "簡報嘅第一部分（首先）講咗公司嘅咩優勢？", e: "(What company advantage was talked about in the first part (First of all)?)", options: [{c: "擁有超過十年醫療級別裝修經驗同熟悉法例", e: "(Possesses over 10 years medical-grade renovation experience and familiarity with laws)", correct: true}, {c: "公司嘅辦公室最大", e: "(The company's office is the biggest)", correct: false}, {c: "員工全部都識講法文", e: "(All employees know how to speak French)", correct: false}] },
            { q: "為咗減低對病人嘅影響，工程會採用咩模式？（其次）", e: "(To reduce impact on patients, what model will the project use? (Secondly))", options: [{c: "分階段施工模式", e: "(Phased construction model)", correct: true}, {c: "半夜偷偷地施工", e: "(Secretly constructing in the middle of the night)", correct: false}, {c: "要求所有病人出院", e: "(Requiring all patients to be discharged)", correct: false}] },
            { q: "針對建材短缺危機，公司有咩風險管理措施？（最後）", e: "(Addressing the material shortage crisis, what risk management measure does the company have? (Finally))", options: [{c: "同三家後備供應商簽訂預留協議", e: "(Signed reservation agreements with three backup suppliers)", correct: true}, {c: "自己開一間工廠整材料", e: "(Open their own factory to make materials)", correct: false}, {c: "用假材料頂住先", e: "(Use fake materials to hold over for now)", correct: false}] },
            { q: "「首先... 其次... 最後」呢個結構對簡報有咩幫助？", e: "(What help does the 'First... Second... Finally' structure provide for a presentation?)", options: [{c: "令說話有邏輯層次，幫助聽眾清晰吸收資訊", e: "(Gives the speech logical layers, helps the audience absorb info clearly)", correct: true}, {c: "純粹為咗拖長講嘢嘅時間", e: "(Purely to drag out the speaking time)", correct: false}, {c: "令到氣氛變得好搞笑", e: "(Makes the atmosphere become very funny)", correct: false}] }
        ]
    },
    {
        level: 10, title: "Delegating Tasks", topic: "Polite Directives (麻煩你跟進 - Please follow up on)",
        img: "https://images.unsplash.com/photo-1542744173-8e7e53415bb0",
        grammarDesc: "<strong>Delegating Professionally:</strong> Assigning tasks without sounding too bossy.<br>麻煩你跟進 (maa4 faan4 nei5 gan1 zeon3) means 'Please trouble you to follow up on...'",
        vocab: [
            {c: "委派", j: "wai2 paai3", e: "Delegate / Assign"}, {c: "跟進", j: "gan1 zeon3", e: "Follow up"},
            {c: "麻煩你", j: "maa4 faan4 nei5", e: "Please (trouble you)"}, {c: "清單", j: "cing1 daan1", e: "List"},
            {c: "地盤", j: "dei6 pun4", e: "Construction site"}, {c: "安全審查", j: "on1 cyun4 sam2 caa4", e: "Safety audit"},
            {c: "判頭", j: "pun3 tau4", e: "Subcontractor"}, {c: "協調", j: "hip3 tiu4", e: "Coordinate"},
            {c: "死線", j: "sei2 sin3", e: "Deadline"}, {c: "隨時匯報", j: "ceoi4 si4 wui6 bou3", e: "Report back anytime"}
        ],
        story: "早晨團隊。由於下個禮拜初政府嘅安全督察會嚟突擊巡查，我哋手頭上嘅工作非常緊迫。<br>為咗確保一切順利，我需要將幾項緊急任務委派畀大家。<br>Peter，麻煩你跟進地盤嘅安全審查清單。你今日之內要確保所有滅火筒同埋急救箱都冇過期，並且擺喺當眼處。<br>Mary，麻煩你跟進同機電判頭嘅協調工作。<br>我見到佢哋嘅電線仲未拉好，你催促佢哋一定要喺星期五嘅死線前完工，如果唔係會阻礙封天花嘅工序。<br>至於文件方面，我會親自負責核對所有建築圖則同埋保險證明，確保冇任何遺漏。<br>今次嘅任務好重要，大家分工合作，各司其職。<br>執行過程中如果遇到任何樽頸或者阻滯，唔好自己死頂，隨時匯報畀我聽。<br>我哋今晚臨收工前再開一個十分鐘嘅 stand-up meeting 對一對進度。<br>辛苦大家喇，Action！",
        jyutping: "Zou2 san4 tyun4 deoi2. Jau4 jyu1 haa6 go3 lai5 baai3 co1 zing3 fu2 ge3 on1 cyun4 duk1 caat3 wui5 lei4 dat6 gik1 ceon4 caa4, ngo5 dei6 sau2 tau4 soeng6 ge3 gung1 zok3 fei1 soeng4 gan2 bik1.<br>Wai6 zo2 kok3 bou2 jat1 cai3 seon6 lei6, ngo5 seoi1 jiu3 zoeng1 gei2 hong6 gan2 gap1 jam6 mou6 wai2 paai3 bei2 daai6 gaa1.<br>Peter, <span class='highlight'>maa4 faan4 nei5 gan1 zeon3</span> dei6 pun4 ge3 on1 cyun4 sam2 caa4 cing1 daan1. Nei5 gam1 jat6 zi1 noi6 jiu3 kok3 bou2 so2 jau5 mit6 fo2 tung2 tung4 maai4 gap1 gau3 soeng1 dou1 mou5 gwo3 kei4, bing6 ce2 baai2 hai2 dong1 ngaan5 cyu3.<br>Mary, <span class='highlight'>maa4 faan4 nei5 gan1 zeon3</span> tung4 gei1 din6 pun3 tau4 ge3 hip3 tiu4 gung1 zok3.<br>Ngo5 gin3 dou2 keoi5 dei6 ge3 din6 sin3 zung6 mei6 laai1 hou2, nei5 ceoi1 cuk1 keoi5 dei6 jat1 ding6 jiu3 hai2 sing1 kei4 ng5 ge3 sei2 sin3 cin4 jyun4 gung1, jyu4 gwo2 m4 hai6 wui5 zo2 ngoi6 fung1 tin1 faa1 ge3 gung1 zeoi6.<br>Zi3 jyu1 man4 gin2 fong1 min6, ngo5 wui5 can1 zi6 fu6 zaak3 hat6 deoi3 so2 jau5 gin3 zuk1 tou4 zak1 tung4 maai4 bou2 him2 zing3 ming4, kok3 bou2 mou5 jam6 ho4 wai4 lau6.<br>Gam1 ci3 ge3 jam6 mou6 hou2 zung6 jiu3, daai6 gaa1 fan1 gung1 hap6 zok3, gok3 si1 kei4 zik1.<br>Zap1 hang4 gwo3 cing4 zung1 jyu4 gwo2 jyu6 dou2 jam6 ho4 zeon1 geng2 waak6 ze2 zo2 zai6, m4 hou2 zi6 gei2 sei2 deng2, ceoi4 si4 wui6 bou3 bei2 ngo5 teng1.<br>Ngo5 dei6 gam1 maan5 lam4 sau1 gung1 cin4 zoi3 hoi1 jat1 go3 sap6 fan1 zung1 ge3 stand-up meeting deoi3 jat1 deoi3 zeon3 dou6.<br>San1 fu2 daai6 gaa1 laa3, Action!",
        english: "Morning team. Due to the government safety inspector coming for a surprise inspection early next week, our tasks on hand are very pressing.<br>To ensure everything goes smoothly, I need to delegate several urgent tasks to everyone.<br>Peter, please trouble you to follow up on the site's safety audit checklist. Within today, you must ensure all fire extinguishers and first aid kits are not expired and are placed in conspicuous spots.<br>Mary, please trouble you to follow up on the coordination work with the MEP subcontractor.<br>I see their electrical wires are still not pulled; you urge them that they must finish before Friday's deadline, otherwise it will obstruct the ceiling sealing process.<br>As for documents, I will personally be in charge of verifying all architectural drawings and insurance certificates, ensuring no omissions.<br>This mission is very important; everyone divide the work and cooperate, each doing their duty.<br>If you encounter any bottlenecks or obstacles during execution, don't just tough it out yourself, report back to me anytime.<br>We will have a 10-minute stand-up meeting again before getting off work tonight to sync up on progress.<br>Thanks for your hard work everyone, Action!",
        quizzes: [
            { q: "點解團隊手頭上嘅工作突然變得非常緊迫？", e: "(Why did the team's tasks suddenly become very pressing?)", options: [{c: "因為下星期初政府安全督察會嚟突擊巡查", e: "(Because gov safety inspector is coming for surprise inspection early next week)", correct: true}, {c: "因為老細聽日要視察", e: "(Because the boss is inspecting tomorrow)", correct: false}, {c: "因為要放長假", e: "(Because a long holiday is coming up)", correct: false}] },
            { q: "Peter 被委派咗咩任務？", e: "(What task was Peter delegated?)", options: [{c: "跟進安全審查清單，檢查滅火筒同急救箱", e: "(Follow up on safety audit checklist, check fire extinguishers and first aid kits)", correct: true}, {c: "去買咖啡畀全組人", e: "(Go buy coffee for the whole team)", correct: false}, {c: "核對建築圖則", e: "(Verify architectural drawings)", correct: false}] },
            { q: "如果 Mary 唔催促機電判頭星期五前完工，會有咩後果？", e: "(If Mary doesn't urge the MEP sub to finish by Friday, what is the consequence?)", options: [{c: "會阻礙封天花嘅工序", e: "(It will obstruct the ceiling sealing process)", correct: true}, {c: "會被罰款一萬蚊", e: "(Will be fined 10,000 dollars)", correct: false}, {c: "成棟樓會冧", e: "(The whole building will collapse)", correct: false}] },
            { q: "作者（主管）自己會負責處理咩工作？", e: "(What work will the author (supervisor) personally handle?)", options: [{c: "親自核對所有建築圖則同保險證明", e: "(Personally verify all architectural drawings and insurance certificates)", correct: true}, {c: "落手落腳去拉電線", e: "(Get hands dirty and pull electrical wires)", correct: false}, {c: "喺辦公室負責打機", e: "(Responsible for playing games in the office)", correct: false}] },
            { q: "「麻煩你跟進」喺職場上有咩溝通好處？", e: "(What communication benefit does 'maa faan nei gan zeon' have in the workplace?)", options: [{c: "語氣客氣而不失專業，有效委派工作", e: "(Tone is polite yet professional, effectively delegating work)", correct: true}, {c: "聽落去好惡，令員工驚", e: "(Sounds very fierce, making employees scared)", correct: false}, {c: "表示主管自己唔識做", e: "(Indicates the supervisor doesn't know how to do it)", correct: false}] }
        ]
    },
    {
        level: 11, title: "Requesting Leave for Honeymoon", topic: "Given That (鑒於 - In light of / Given that)",
        img: "https://images.unsplash.com/photo-1549887552-cb127140e69b",
        grammarDesc: "<strong>Formal Justification:</strong> Providing a solid reason for a request.<br>鑒於 (gaam3 jyu1) means 'In light of' or 'Given that'.",
        vocab: [
            {c: "鑒於", j: "gaam3 jyu1", e: "In light of / Given that"}, {c: "年假", j: "nin4 gaa3", e: "Annual leave"},
            {c: "審批", j: "sam2 pai1", e: "Approve"}, {c: "度蜜月", j: "dou6 mat6 jyut6", e: "Honeymoon"},
            {c: "交接", j: "gaau1 zip3", e: "Handover"}, {c: "代理人", j: "doi6 lei5 jan4", e: "Back-up / Proxy"},
            {c: "妥當", j: "to5 dong3", e: "Proper / Sound"}, {c: "淡季", j: "daam6 gwai3", e: "Off-season / Slow season"},
            {c: "緊急聯絡", j: "gan2 gap1 lyun4 lok3", e: "Emergency contact"}, {c: "體諒", j: "tai2 loeng6", e: "Understand / Be considerate"}
        ],
        story: "Alex，我想同你傾下關於我下年申請年假嘅事。<br>鑒於我同 Jamie 計劃喺 2026 年 8 月中結婚，我想申請由 8 月 17 號至 21 號，一共五日嘅大假。<br>我哋預訂咗去 Banff 度蜜月，機票同酒店都已經準備好。<br>我知道 8 月通常係地盤開工嘅旺季，所以為咗將對公司運作嘅影響減到最低，我已經做咗詳細嘅交接計劃。<br>喺我放假期間，Peter 會做我嘅職務代理人 (Backup)。<br>所有進行中嘅文件、合約同埋供應商聯絡表，我都會喺放假前一個禮拜整理妥當，並且同 Peter 做一次徹底嘅 handover。<br>鑒於我過去一年都未放過長假，而且手頭上最大嘅 Luxe 裝修項目喺 7 月底就會完工交樓，8 月中相對係我工作上嘅小淡季。<br>如果遇到極度緊急嘅突發情況，Peter 可以透過 WhatsApp 緊急聯絡我。<br>希望公司可以體諒我嘅人生大事，盡早審批呢次年假申請，等我可以安心籌備婚禮。<br>多謝老細。",
        jyutping: "Alex, ngo5 soeng2 tung4 nei5 king1 haa5 gwaan1 jyu1 ngo5 haa6 nin4 san1 cing2 nin4 gaa3 ge3 si6.<br><span class='highlight'>Gaam3 jyu1</span> ngo5 tung4 Jamie gai3 waak6 hai2 2026 nin4 8 jyut6 zung1 git3 fan1, ngo5 soeng2 san1 cing2 jau4 8 jyut6 17 hou6 zi3 21 hou6, jat1 gung6 ng5 jat6 ge3 daai6 gaa3.<br>Ngo5 dei6 jyu6 deng6 zo2 heoi3 Banff dou6 mat6 jyut6, gei1 piu3 tung4 zau2 dim3 dou1 ji5 ging1 zeon2 bei6 hou2.<br>Ngo5 zi1 dou3 8 jyut6 tung1 soeng4 hai6 dei6 pun4 hoi1 gung1 ge3 wong6 gwai3, so2 ji5 wai6 zo2 zoeng1 deoi3 gung1 si1 wan6 zok3 ge3 jing2 hoeng2 gaam2 dou3 zeoi3 dai1, ngo5 ji5 ging1 zou6 zo2 coeng4 sai3 ge3 gaau1 zip3 gai3 waak6.<br>Hai2 ngo5 fong3 gaa3 gei4 gaan1, Peter wui5 zou6 ngo5 ge3 zik1 mou6 doi6 lei5 jan4 (Backup).<br>So2 jau5 zeon3 haang4 zung1 ge3 man4 gin2, hap6 joek3 tung4 maai4 gung1 jing3 soeng1 lyun4 lok3 biu2, ngo5 dou1 wui5 hai2 fong3 gaa3 cin4 jat1 go3 lai5 baai3 zing2 lei5 to5 dong3, bing6 ce2 tung4 Peter zou6 jat1 ci3 cit3 dai2 ge3 handover.<br><span class='highlight'>Gaam3 jyu1</span> ngo5 gwo3 heoi3 jat1 nin4 dou1 mei6 fong3 gwo3 coeng4 gaa3, ji4 ce2 sau2 tau4 soeng6 zeoi3 daai6 ge3 Luxe zong1 sau1 hong6 muk6 hai2 7 jyut6 dai2 zau6 wui5 jyun4 gung1 gaau1 lau2, 8 jyut6 zung1 soeng1 deoi3 hai6 ngo5 gung1 zok3 soeng6 ge3 siu2 daam6 gwai3.<br>Jyu4 gwo2 jyu6 dou2 gik6 dou6 gan2 gap1 ge3 dat6 faat3 cing4 fong3, Peter ho2 ji5 tau3 gwo3 WhatsApp gan2 gap1 lyun4 lok3 ngo5.<br>Hei1 mong6 gung1 si1 ho2 ji5 tai2 loeng6 ngo5 ge3 jan4 sang1 daai6 si6, zeon6 zou2 sam2 pai1 ni1 ci3 nin4 gaa3 san1 cing2, dang2 ngo5 ho2 ji5 on1 sam1 cau4 bei6 fan1 lai5.<br>Do1 ze6 lou5 sai3.",
        english: "Alex, I want to talk to you about applying for my annual leave next year.<br>In light of the fact that Jamie and I plan to get married in mid-August 2026, I want to apply for a total of 5 days of vacation from August 17th to the 21st.<br>We have booked to go to Banff for our honeymoon; flights and hotels are already prepared.<br>I know August is usually the peak season for construction sites starting work, so in order to minimize the impact on company operations, I have already made a detailed handover plan.<br>During my vacation, Peter will act as my proxy (Backup).<br>All ongoing documents, contracts, and supplier contact lists, I will properly organize one week before my leave, and do a thorough handover with Peter.<br>Given that I haven't taken a long vacation in the past year, and the biggest Luxe renovation project currently on hand will be completed and handed over at the end of July, mid-August is relatively a mini off-season for my work.<br>If extreme emergency situations arise, Peter can reach me for emergency contact via WhatsApp.<br>I hope the company can be considerate of my major life event, and approve this annual leave application as early as possible so I can plan the wedding with peace of mind.<br>Thanks boss.",
        quizzes: [
            { q: "作者申請 2026 年 8 月放假嘅主要原因係咩？", e: "(What is the main reason for the author applying for leave in August 2026?)", options: [{c: "準備結婚同埋去 Banff 度蜜月", e: "(Preparing to get married and go to Banff for honeymoon)", correct: true}, {c: "因為生病需要做手術", e: "(Because they are sick and need surgery)", correct: false}, {c: "打算辭職轉行", e: "(Planning to resign and change careers)", correct: false}] },
            { q: "為咗減少對公司嘅影響，作者安排咗邊個做 Backup？", e: "(To reduce impact on the company, who did the author arrange as Backup?)", options: [{c: "Peter", e: "(Peter)", correct: true}, {c: "Jamie", e: "(Jamie)", correct: false}, {c: "Alex", e: "(Alex)", correct: false}] },
            { q: "作者喺放假前一個禮拜會做咩重要工作？", e: "(What important work will the author do one week before leaving?)", options: [{c: "整理好文件同聯絡表，同 Backup 做徹底嘅交接 (Handover)", e: "(Organize docs/contacts, do a thorough handover with Backup)", correct: true}, {c: "清空自己張辦公枱", e: "(Empty out their own office desk)", correct: false}, {c: "將所有未做完嘅嘢掉晒", e: "(Throw away everything unfinished)", correct: false}] },
            { q: "點解作者認為 8 月中去旅行喺工作安排上係合理嘅？", e: "(Why does the author think traveling in mid-August is reasonable work-wise?)", options: [{c: "因為最大嘅 Luxe 項目 7 月底交樓，8 月中相對係工作淡季", e: "(Because the biggest Luxe project hands over in late July; mid-August is relatively an off-season)", correct: true}, {c: "因為 8 月公司冇生意", e: "(Because the company has no business in August)", correct: false}, {c: "因為老細 8 月都唔喺度", e: "(Because the boss is also not around in August)", correct: false}] },
            { q: "「鑒於」喺正式商業語境入面有咩作用？", e: "(What is the function of 'gaam jyu' in a formal business context?)", options: [{c: "引出一個重要嘅客觀事實，作為提出請求或決定嘅合理依據", e: "(Introduces an important objective fact as a reasonable basis for a request or decision)", correct: true}, {c: "用嚟表達極度憤怒", e: "(Used to express extreme anger)", correct: false}, {c: "純粹係講拜拜嘅用語", e: "(Purely a phrase to say goodbye)", correct: false}] }
        ]
    },
    {
        level: 12, title: "Urging Permit Processing", topic: "Assertive Tone (催促 - Urge / Hasten)",
        img: "https://images.unsplash.com/photo-1541888087588-926c45731671",
        grammarDesc: "<strong>Following Up Firmly:</strong> Pushing for action without being rude.<br>催促 (ceoi1 cuk1) means 'to urge' or 'hasten'. Useful when dealing with bureaucracy.",
        vocab: [
            {c: "催促", j: "ceoi1 cuk1", e: "Urge / Hasten"}, {c: "建築許可證", j: "gin3 zuk1 heoi2 ho2 zing3", e: "Building permit"},
            {c: "審批", j: "sam2 pai1", e: "Approve / Process"}, {c: "進展", j: "zeon3 zin2", e: "Progress / Update"},
            {c: "卡住", j: "kaat1 zyu6", e: "Stuck / Held up"}, {c: "拖延", j: "to1 jin4", e: "Delay / Procrastinate"},
            {c: "檔期", j: "dong3 kei4", e: "Schedule / Slot"}, {c: "補交", j: "bou2 gaau1", e: "Submit late / Make up for"},
            {c: "部門", j: "bou6 mun4", e: "Department"}, {c: "通融", j: "tung1 jung4", e: "Accommodate / Bend the rules slightly"}
        ],
        story: "今日下晝我打咗個電話去溫哥華市政府嘅牌照部 (Permit Office)。<br>因為我哋上個月提交嘅一個辦公室 Tenant Improvement (TI) 建築許可證，到而家都仲未有任何進展。<br>我同負責審批嘅 Officer 講：「你好，我打嚟係想催促一下關於檔案編號 TI-202509 嘅審批進度。<br>我哋已經補交齊晒所有結構工程師要求嘅文件，但個系統狀態一直卡住喺『審核中』。<br>業主嗰邊非常心急，因為承建商嘅檔期已經排好晒，如果牌照再拖延落去，成個開工 schedule 就會亂晒大坑。<br>我知道你哋部門最近處理緊好多申請，工作量好大。<br>但係可唔可以麻煩你通融一下，幫我查清楚究竟仲欠缺咩資料，或者預計幾時可以批出嚟？<br>如果有任何技術問題，我哋嘅設計團隊可以即刻派人上嚟 City Hall 面談解決。」<br>對方聽完我嘅解釋，態度軟化咗，答應今日收工前會幫我將份 file 推上俾 Manager 簽名。<br>做 Construction Admin，有時真係要面皮厚啲，適當嘅催促絕對係推動進度嘅關鍵。",
        jyutping: "Gam1 jat6 haa6 zau3 ngo5 daa2 zo2 go3 din6 waa2 heoi3 Wan1 go1 waa4 si5 zing3 fu2 ge3 paai4 ziu3 bou6 (Permit Office).<br>Jan1 wai6 ngo5 dei6 soeng6 go3 jyut6 tai4 gaau1 ge3 jat1 go3 baan6 gung1 sat1 Tenant Improvement (TI) gin3 zuk1 heoi2 ho2 zing3, dou3 ji4 gaa1 dou1 zung6 mei6 jau5 jam6 ho4 zeon3 zin2.<br>Ngo5 tung4 fu6 zaak3 sam2 pai1 ge3 Officer gong2: 「Nei5 hou2, ngo5 daa2 lei4 hai6 soeng2 <span class='highlight'>ceoi1 cuk1</span> jat1 haa5 gwaan1 jyu1 dong3 on3 pin1 hou6 TI-202509 ge3 sam2 pai1 zeon3 dou6.<br>Ngo5 dei6 ji5 ging1 bou2 gaau1 cai4 saai3 so2 jau5 git3 gau3 gung1 cing4 si1 jiu1 kau4 ge3 man4 gin2, daan6 go3 hai6 tung2 zong6 taai3 jat1 zik6 kaat1 zyu6 hai2 『sam2 hat6 zung1』.<br>Jip6 zyu2 go2 bin1 fei1 soeng4 sam1 gap1, jan1 wai6 sing4 gin3 soeng1 ge3 dong3 kei4 ji5 ging1 paai4 hou2 saai3, jyu4 gwo2 paai4 ziu3 zoi3 to1 jin4 lok6 heoi3, seng4 go3 hoi1 gung1 schedule zau6 wui5 lyun6 saai3 daai6 haang1.<br>Ngo5 zi1 dou3 nei5 dei6 bou6 mun4 zeoi3 gan6 cyu2 lei5 gan2 hou2 do1 san1 cing2, gung1 zok3 loeng6 hou2 daai6.<br>Daan6 hai6 ho2 m4 ho2 ji5 maa4 faan4 nei5 tung1 jung4 jat1 haa5, bong1 ngo5 caa4 cing1 co2 gau3 ging2 zung6 kim3 kyut3 me1 zi1 liu2, waak6 ze2 jyu6 gai3 gei2 si4 ho2 ji5 pai1 ceot1 lei4?<br>Jyu4 gwo2 jau5 jam6 ho4 gei6 seot6 man6 tai4, ngo5 dei6 ge3 cit3 gai3 tyun4 deoi2 ho2 ji5 zik1 hak1 paai3 jan4 soeng5 lei4 City Hall min6 taam4 gaai2 kyut3.」<br>Deoi3 fong1 teng1 jyun4 ngo5 ge3 gaai2 sik1, taai3 dou6 jyun5 faa3 zo2, daap3 jing3 gam1 jat6 sau1 gung1 cin4 wui5 bong1 ngo5 zoeng1 fan6 file teoi1 soeng5 bei2 Manager cim1 meng2.<br>Zou6 Construction Admin, jau5 si4 zan1 hai6 jiu3 min6 pei4 hau5 di1, sik1 dong3 ge3 ceoi1 cuk1 zyut6 deoi3 hai6 teoi1 dung6 zeon3 dou6 ge3 gwaan1 gin6.",
        english: "This afternoon I made a phone call to the City of Vancouver's Permit Office.<br>Because an office Tenant Improvement (TI) building permit we submitted last month still hasn't had any progress until now.<br>I told the processing Officer: 'Hello, I'm calling because I want to urge the approval progress regarding file number TI-202509.<br>We have already submitted all the documents required by the structural engineer, but the system status has been stuck at 'Under Review'.<br>The client is very anxious, because the contractor's schedule is already fully booked; if the permit is delayed any further, the whole construction schedule will be in total chaos.<br>I know your department is currently processing many applications recently, and the workload is very heavy.<br>But could I please trouble you to be accommodating, help me find out exactly what information is still missing, or when it is estimated to be approved out?<br>If there are any technical issues, our design team can immediately send someone up to City Hall for a face-to-face meeting to resolve them.'<br>After hearing my explanation, the other party's attitude softened, and promised to help me push the file up to the Manager for signature before getting off work today.<br>Being a Construction Admin, sometimes you really have to be thick-skinned; appropriate urging is absolutely the key to driving progress.",
        quizzes: [
            { q: "作者打電話去市政府牌照部嘅目的係咩？", e: "(What was the author's purpose in calling the City Permit Office?)", options: [{c: "催促一個辦公室 TI 建築許可證嘅審批進度", e: "(To urge the approval progress of an office TI building permit)", correct: true}, {c: "投訴市政府嘅收費太貴", e: "(To complain the city's fees are too expensive)", correct: false}, {c: "約牌照部嘅人出去食飯", e: "(To invite the permit office staff out for a meal)", correct: false}] },
            { q: "目前個牌照申請遇到咩問題？", e: "(What problem is the permit application currently encountering?)", options: [{c: "補交齊文件後，狀態依然卡住喺「審核中」", e: "(After submitting all docs, the status is still stuck in 'Under Review')", correct: true}, {c: "圖則畫得太差被拒絕咗", e: "(The floor plans were drawn too poorly and got rejected)", correct: false}, {c: "唔見咗成份檔案", e: "(The entire file got lost)", correct: false}] },
            { q: "如果牌照繼續拖延，會導致咩嚴重後果？", e: "(If the permit continues to be delayed, what serious consequence will it lead to?)", options: [{c: "承建商檔期亂晒，影響成個開工 schedule", e: "(Contractor's schedule will be ruined, affecting the whole start date)", correct: true}, {c: "市政府會被拆除", e: "(City Hall will be demolished)", correct: false}, {c: "業主會被警察拉", e: "(The client will be arrested by the police)", correct: false}] },
            { q: "作者提出咩方案去解決潛在嘅技術問題？", e: "(What solution did the author propose to resolve potential technical issues?)", options: [{c: "設計團隊可以即刻派人上 City Hall 面談解決", e: "(Design team can send someone to City Hall immediately for a face-to-face meeting)", correct: true}, {c: "放棄個項目", e: "(Give up the project)", correct: false}, {c: "叫市政府自己幫手畫圖", e: "(Tell the city to draw the plans themselves)", correct: false}] },
            { q: "「通融」喺商業對話入面代表咩意思？", e: "(What does 'tung jung' represent in business dialogue?)", options: [{c: "請求對方喺規則許可範圍內給予方便或彈性處理", e: "(Requesting the other party to provide convenience or flexibility within the rules)", correct: true}, {c: "強逼對方借錢畀你", e: "(Forcing the other party to lend you money)", correct: false}, {c: "威脅要告上法庭", e: "(Threatening to sue in court)", correct: false}] }
        ]
    },
    {
        level: 13, title: "Reviewing Contracts", topic: "Stipulations (條款 - Terms and conditions)",
        img: "https://images.unsplash.com/photo-1555421689-491a97ff2040",
        grammarDesc: "<strong>Legal Jargon:</strong> Discussing rules inside a formal agreement.<br>條款 (tiu4 fun2) refers to the specific clauses, terms, and conditions of a contract.",
        vocab: [
            {c: "合約", j: "hap6 joek3", e: "Contract"}, {c: "條款", j: "tiu4 fun2", e: "Terms / Clauses"},
            {c: "細節", j: "sai3 zit3", e: "Details"}, {c: "判頭", j: "pun3 tau4", e: "Subcontractor"},
            {c: "違約金", j: "wai4 joek3 gam1", e: "Penalty for breach of contract / Liquidated damages"}, {c: "保養期", j: "bou2 joeng5 kei4", e: "Warranty period"},
            {c: "保障", j: "bou2 zoeng3", e: "Guarantee / Protect"}, {c: "魔鬼在細節", j: "mo1 gwai2 zoi6 sai3 zit3", e: "The devil is in the details"},
            {c: "修改", j: "sau1 goi2", e: "Amend / Revise"}, {c: "雙方", j: "soeng1 fong1", e: "Both parties"}
        ],
        story: "今日上晝，我用咗兩個鐘頭去審核公司準備同冷氣判頭簽嗰份工程合約。<br>做 Construction Admin，審核合約絕對唔可以求其，因為魔鬼往往就藏喺細節入面。<br>我發現合約入面有幾項條款對我哋公司唔係好公平，必須要作出修改。<br>第一，關於工程延誤嘅違約金 (Liquidated Damages) 寫得太過含糊。<br>我要求加入具體數字，寫明如果判頭遲過死線交貨，每日需要賠償一千蚊加幣。<br>第二，合約原本只係提供一年嘅免費維修保養期 (Defect Liability Period)。<br>考慮到呢批新冷氣系統嘅價值，我要求將保養條款延長至兩年，以保障業主嘅長遠利益。<br>我將修改好嘅 draft 用紅筆 highlight 咗，發返畀判頭嘅法律代表睇。<br>只有喺雙方對所有細節條款都完全同意嘅情況下，我哋先會安排老細正式簽名。<br>合約就係我哋嘅護身符，寫得越清晰，將來發生爭拗嘅機會就越細。",
        jyutping: "Gam1 ziu1 soeng6 zau3, ngo5 jung6 zo2 loeng5 go3 zung1 tau4 heoi3 sam2 hat6 gung1 si1 zeon2 bei6 tung4 laang5 hei3 pun3 tau4 cim1 go2 fan6 gung1 cing4 hap6 joek3.<br>Zou6 Construction Admin, sam2 hat6 hap6 joek3 zyut6 deoi3 m4 ho2 ji5 kau4 kei4, jan1 wai6 mo1 gwai2 wong5 wong5 zau6 cong4 hai2 sai3 zit3 jap6 min6.<br>Ngo5 faat3 jin6 hap6 joek3 jap6 min6 jau5 gei2 hong6 <span class='highlight'>tiu4 fun2</span> deoi3 ngo5 dei6 gung1 si1 m4 hai6 hou2 gung1 ping4, bit1 seoi1 jiu3 zok3 ceot1 sau1 goi2.<br>Dai6 jat1, gwaan1 jyu1 gung1 cing4 jin4 ng6 ge3 wai4 joek3 gam1 (Liquidated Damages) se2 dak1 taai3 gwo3 ham4 wu4.<br>Ngo5 jiu1 kau4 gaa1 jap6 geoi6 tai2 sou3 zi6, se2 ming4 jyu4 gwo2 pun3 tau4 ci4 gwo3 sei2 sin3 gaau1 fo3, mui5 jat6 seoi1 jiu3 pui4 soeng4 jat1 cin1 man1 Gaa1 bai6.<br>Dai6 ji6, hap6 joek3 jyun4 bun2 zi2 hai6 ti4 gung1 jat1 nin4 ge3 min5 fai3 wai4 sau1 bou2 joeng5 kei4 (Defect Liability Period).<br>Haau2 leoi6 dou3 ni1 pai1 san1 laang5 hei3 hai6 tung2 ge3 gaa3 zik6, ngo5 jiu1 kau4 zoeng1 bou2 joeng5 <span class='highlight'>tiu4 fun2</span> jin4 coeng4 zi3 loeng5 nin4, ji5 bou2 zoeng3 jip6 zyu2 ge3 coeng4 jyun5 lei6 jik1.<br>Ngo5 zoeng1 sau1 goi2 hou2 ge3 draft jung6 hung4 bat1 highlight zo2, faat3 faan1 bei2 pun3 tau4 ge3 faat3 leot6 doi6 biu2 tai2.<br>Zi2 jau5 hai2 soeng1 fong1 deoi3 soeng1 jau5 sai3 zit3 <span class='highlight'>tiu4 fun2</span> dou1 jyun4 cyun4 tung4 ji3 ge3 cing4 fong3 haa6, ngo5 dei6 sin1 wui5 on1 paai4 lou5 sai3 zing3 sik1 cim1 meng2.<br>Hap6 joek3 zau6 hai6 ngo5 dei6 ge3 wu6 san1 fu4, se2 dak1 jyut6 cing1 sik1, zoeng1 loi4 faat3 sang1 zaang1 aau3 ge3 gei1 wui6 zau6 jyut6 sai3.",
        english: "This morning, I spent two hours reviewing the construction contract the company is preparing to sign with the AC subcontractor.<br>Being a Construction Admin, reviewing contracts absolutely cannot be done sloppily, because the devil is often hidden in the details.<br>I found that several clauses in the contract were not very fair to our company and must be amended.<br>First, the penalty for project delay (Liquidated Damages) was written too vaguely.<br>I requested adding a concrete number, explicitly stating that if the sub delivers past the deadline, they must compensate 1,000 CAD per day.<br>Second, the contract originally only provided a one-year free maintenance and warranty period (Defect Liability Period).<br>Considering the value of this new batch of AC systems, I requested extending the warranty clause to two years to protect the client's long-term interests.<br>I highlighted the amended draft with a red pen and sent it back to the sub's legal representative to review.<br>Only under the circumstance that both parties completely agree to all detail clauses, will we arrange for the boss to officially sign.<br>The contract is our protective amulet; the clearer it is written, the smaller the chance of disputes occurring in the future.",
        quizzes: [
            { q: "作者用咗兩個鐘頭做咩工作？", e: "(What did the author spend two hours doing?)", options: [{c: "審核準備同冷氣判頭簽嘅工程合約", e: "(Reviewing the construction contract prepared to be signed with the AC sub)", correct: true}, {c: "修理公司嘅冷氣機", e: "(Fixing the company's air conditioner)", correct: false}, {c: "同老闆傾加人工", e: "(Talking with the boss about a raise)", correct: false}] },
            { q: "第一項被要求修改嘅「條款」係關於咩？", e: "(What was the first 'clause' requested to be amended about?)", options: [{c: "工程延誤嘅違約金寫得太含糊", e: "(The penalty for project delay was written too vaguely)", correct: true}, {c: "冷氣機嘅牌子唔啱", e: "(The brand of the AC was wrong)", correct: false}, {c: "工人嘅午餐補貼太少", e: "(The workers' lunch subsidy was too little)", correct: false}] },
            { q: "為咗保障業主利益，作者要求保養期有咩改動？", e: "(To protect client interests, what change did the author request for the warranty period?)", options: [{c: "將一年嘅保養期延長至兩年", e: "(Extend the 1-year warranty period to 2 years)", correct: true}, {c: "完全取消保養期以減低成本", e: "(Cancel the warranty period completely to lower costs)", correct: false}, {c: "改為終身免費保養", e: "(Change to lifetime free maintenance)", correct: false}] },
            { q: "喺咩情況下，作者先會安排老細正式簽名？", e: "(Under what circumstance will the author arrange for the boss to officially sign?)", options: [{c: "雙方對所有細節條款都完全同意", e: "(Both parties completely agree to all detail clauses)", correct: true}, {c: "老細心情好嗰陣", e: "(When the boss is in a good mood)", correct: false}, {c: "只要判頭肯減價", e: "(As long as the sub is willing to lower the price)", correct: false}] },
            { q: "俗語「魔鬼在細節」喺商業審核上係咩意思？", e: "(What does the idiom 'the devil is in the details' mean in business auditing?)", options: [{c: "微小嘅字眼或條款容易被忽略，但往往會造成巨大嘅損失", e: "(Tiny wording or clauses are easily ignored, but often cause huge losses)", correct: true}, {c: "合約入面畫咗魔鬼嘅圖案", e: "(Pictures of devils are drawn in the contract)", correct: false}, {c: "判頭係一個好壞嘅人", e: "(The subcontractor is a very bad person)", correct: false}] }
        ]
    },
    {
        level: 14, title: "Closing the Deal", topic: "Consensus (達成共識 - Reach a consensus)",
        img: "https://images.unsplash.com/photo-1556761175-5973dc0f32b7",
        grammarDesc: "<strong>Finalizing Agreements:</strong> Confirming a mutual agreement.<br>達成共識 (daat6 sing4 gung6 sik1) means 'To reach a consensus' or mutual agreement.",
        vocab: [
            {c: "談判", j: "taam4 pun3", e: "Negotiation"}, {c: "達成共識", j: "daat6 sing4 gung6 sik1", e: "Reach a consensus"},
            {c: "讓步", j: "joeng6 bou6", e: "Concession / Yield"}, {c: "雙贏", j: "soeng1 jing4", e: "Win-win"},
            {c: "合約", j: "hap6 joek3", e: "Contract"}, {c: "細節", j: "sai3 zit3", e: "Details"},
            {c: "簽約", j: "cim1 joek3", e: "Sign a contract"}, {c: "里程碑", j: "lei5 cing4 bui1", e: "Milestone"},
            {c: "慶祝", j: "hing3 zuk1", e: "Celebrate"}, {c: "合作愉快", j: "hap6 zok3 jyu6 faai3", e: "Pleasant cooperation"}
        ],
        story: "經過長達一個月嘅拉鋸同埋三次馬拉松式嘅會議，我哋終於同溫哥華最大嘅木材供應商完成咗談判。<br>喺最後一輪磋商入面，雙方都作出咗一定程度嘅讓步。<br>我哋答應增加首期嘅訂金比例，而佢哋就同意喺旺季期間優先處理我哋公司嘅訂單，並且提供九折嘅大客優惠。<br>雙方喺價錢同埋交貨期上順利達成共識，創造出一個完美嘅雙贏 (Win-win) 局面。<br>今日下晝，供應商嘅代表親自嚟到我哋 Contour Projects 嘅辦公室舉行簽約儀式。<br>當老闆 Alex 同對方交換簽好嘅合約嗰一刻，成個會議室都響起咗掌聲。<br>呢個係我哋公司今年拿下嘅最大一份建材合約，絕對係一個重要嘅里程碑。<br>為咗慶祝呢個難得嘅合作，Alex 決定今晚請成個項目團隊去市中心食海鮮大餐。<br>「合作愉快！」大家都舉起酒杯，為未來幾年嘅工程順利乾杯。<br>搞掂呢單大 project，今個週末終於可以放低公事，好好休息一下。",
        jyutping: "Ging1 gwo3 coeng4 daat6 jat1 go3 jyut6 ge3 laai1 geoi3 tung4 maai4 saam1 ci3 maa5 laai1 cung4 sik1 ge3 wui6 ji5, ngo5 dei6 zung1 jyu1 tung4 Wan1 go1 waa4 zeoi3 daai6 ge3 muk6 coi4 gung1 jing3 soeng1 jyun4 sing4 zo2 taam4 pun3.<br>Hai2 zeoi3 hau6 jat1 leon4 co1 soeng1 jap6 min6, soeng1 fong1 dou1 zok3 ceot1 zo2 jat1 ding6 cing4 dou6 ge3 joeng6 bou6.<br>Ngo5 dei6 daap3 jing3 zang1 gaa1 sau2 kei4 ge3 deng6 gam1 bei2 lai6, ji4 keoi5 dei6 zau6 tung4 ji3 hai2 wong6 gwai3 gei4 gaan1 jau1 sin1 cyu2 lei5 ngo5 dei6 gung1 si1 ge3 deng6 daan1, bing6 ce2 ti4 gung1 gau2 zit3 ge3 daai6 haak3 jau1 wai6.<br>Soeng1 fong1 hai2 gaa3 cin4 tung4 maai4 gaau1 fo3 kei4 soeng6 seon6 lei6 <span class='highlight'>daat6 sing4 gung6 sik1</span>, cong3 zou6 ceot1 jat1 go3 jyun4 mei5 ge3 soeng1 jing4 (Win-win) guk6 min6.<br>Gam1 jat6 haa6 zau3, gung1 jing3 soeng1 ge3 doi6 biu2 can1 zi6 lei4 dou3 ngo5 dei6 Contour Projects ge3 baan6 gung1 sat1 geoi2 haang4 cim1 joek3 ji4 sik1.<br>Dong1 lou5 baan2 Alex tung4 deoi3 fong1 gaau1 wun6 cim1 hou2 ge3 hap6 joek3 go2 jat1 hak1, seng4 go3 wui6 ji5 sat1 dou1 hoeng2 hei2 zo2 zoeng2 sing1.<br>Ni1 go3 hai6 ngo5 dei6 gung1 si1 gam1 nin4 naa4 haa6 ge3 zeoi3 daai6 jat1 fan6 gin3 coi4 hap6 joek3, zyut6 deoi3 hai6 jat1 go3 zung6 jiu3 ge3 lei5 cing4 bui1.<br>Wai6 zo2 hing3 zuk1 ni1 go3 naan4 dak1 ge3 hap6 zok3, Alex kyut3 ding6 gam1 maan5 ceng2 seng4 go3 hong6 muk6 tyun4 deoi2 heoi3 si5 zung1 sam1 sik6 hoi2 sin1 daai6 caan1.<br>「Hap6 zok3 jyu6 faai3!」 Daai6 gaa1 dou1 geoi2 hei2 zau2 bui1, wai6 mei6 loi4 gei2 nin4 ge3 gung1 cing4 seon6 lei6 gon1 bui1.<br>Gaau2 dim6 ni1 daan1 daai6 project, gam1 go3 zau1 mut6 zung1 jyu1 ho2 ji5 fong3 dai1 gung1 si6, hou2 hou2 jau1 sik1 jat1 haa5.",
        english: "After a month-long tug-of-war and three marathon-style meetings, we finally completed negotiations with Vancouver's largest lumber supplier.<br>In the final round of talks, both sides made a certain degree of concession.<br>We promised to increase the deposit percentage for the initial payment, while they agreed to prioritize processing our company's orders during the peak season, and provide a 10% off major client discount.<br>Both sides smoothly reached a consensus on price and delivery time, creating a perfect win-win situation.<br>This afternoon, the supplier's representative personally came to our Contour Projects office to hold the contract signing ceremony.<br>The moment boss Alex and the other party exchanged the signed contracts, applause rang out in the entire meeting room.<br>This is the largest construction material contract our company has landed this year, absolutely an important milestone.<br>To celebrate this hard-won cooperation, Alex decided to treat the whole project team to a big seafood dinner downtown tonight.<br>'Pleasant cooperation!' Everyone raised their wine glasses, toasting to the smooth construction in the coming years.<br>Getting this big project done, this weekend I can finally put down business matters and have a good rest.",
        quizzes: [
            { q: "呢次談判總共經歷咗幾耐時間？", e: "(How long did this negotiation take in total?)", options: [{c: "長達一個月嘅拉鋸同三次馬拉松會議", e: "(A month-long tug-of-war and 3 marathon meetings)", correct: true}, {c: "一個下晝就搞掂", e: "(Finished in one afternoon)", correct: false}, {c: "傾咗成個星期", e: "(Talked for a whole week)", correct: false}] },
            { q: "為咗達成雙贏，雙方分別作出咗咩讓步？", e: "(To achieve a win-win, what concessions did both sides make respectively?)", options: [{c: "增加首期訂金，換取優先處理訂單同九折優惠", e: "(Increased initial deposit, in exchange for priority processing and 10% discount)", correct: true}, {c: "減人工去換取免費木材", e: "(Reduced wages to exchange for free lumber)", correct: false}, {c: "取消合約去換取現金", e: "(Cancelled the contract to exchange for cash)", correct: false}] },
            { q: "「達成共識」代表雙方喺談判中去到咩階段？", e: "(What stage in the negotiation does 'reaching a consensus' represent both sides have reached?)", options: [{c: "大家喺價錢同交貨期等細節上取得一致同意", e: "(Everyone reached an agreement on details like price and delivery time)", correct: true}, {c: "談判破裂，大家反面", e: "(Negotiation broke down, falling out with each other)", correct: false}, {c: "啱啱開始互相介紹", e: "(Just starting to introduce each other)", correct: false}] },
            { q: "為咗慶祝簽約成功，老闆 Alex 有咩安排？", e: "(To celebrate the successful signing, what arrangement did boss Alex make?)", options: [{c: "請成個項目團隊去市中心食海鮮大餐", e: "(Treat the whole project team to a big seafood dinner downtown)", correct: true}, {c: "放全公司一個月大假", e: "(Give the whole company a one-month long holiday)", correct: false}, {c: "每人派一部新手機", e: "(Give everyone a new smartphone)", correct: false}] },
            { q: "「合作愉快」通常喺咩場合會講？", e: "(In what situation is 'hap zok jyu faai / pleasant cooperation' usually said?)", options: [{c: "成功簽約或者達成交易後，祝願未來工作順利時", e: "(After successfully signing a contract or closing a deal, wishing future work goes smoothly)", correct: true}, {c: "第一次見面打招呼嗰陣", e: "(When greeting someone for the very first time)", correct: false}, {c: "鬧緊交，想投訴對方嗰陣", e: "(When arguing, wanting to complain about the other party)", correct: false}] }
        ]
    }
];

let currentLevel = 0;

function playText(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-HK';
        const voices = window.speechSynthesis.getVoices();
        const hkVoice = voices.find(voice => voice.lang.includes('zh-HK') || voice.lang.includes('yue'));
        if (hkVoice) utterance.voice = hkVoice;
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    }
}

function checkAnswer(buttonElement, isCorrect) {
    const optionsContainer = buttonElement.closest('.options');
    const allButtons = optionsContainer.querySelectorAll('.option-btn');
    allButtons.forEach(btn => btn.style.pointerEvents = 'none');

    if (isCorrect) {
        buttonElement.classList.add('correct');
        buttonElement.innerHTML = buttonElement.innerHTML.replace('</span>', ' ✅ </span>');
    } else {
        buttonElement.classList.add('wrong');
        buttonElement.innerHTML = buttonElement.innerHTML.replace('</span>', ' ❌ </span>');
        allButtons.forEach(btn => {
            if (btn.dataset.correct === "true") btn.classList.add('correct');
        });
    }
}

function loadMission(index) {
    if(index < 0 || index >= missionsData.length) return;
    currentLevel = index;
    const m = missionsData[index];
    const app = document.getElementById('app');

    let vocabHtml = m.vocab.map((v, i) => `
        <button class="vocab-item" onclick="playText('${v.c}')">
            <span class="icon">🔊</span>
            <div><strong>${i+1}. ${v.c}</strong> (${v.j}) - ${v.e}</div>
        </button>
    `).join('');

    let quizHtml = m.quizzes.map((q, qIndex) => `
        <div class="quiz-question">
            <div class="question-text">
                ${qIndex + 1}. ${q.q}
                <button class="play-btn-small" onclick="playText('${q.q}')">🔊</button>
                <span class="eng-trans">${q.e}</span>
            </div>
            <div class="options">
                ${[...q.options].sort(() => Math.random() - 0.5).map((opt, oIndex) => `
                    <div class="option-row">
                        <button class="play-btn-option" onclick="playText('${opt.c}')">🔊</button>
                        <button class="option-btn" data-correct="${opt.correct}" onclick="checkAnswer(this, ${opt.correct})">
                            ${String.fromCharCode(65 + oIndex)}. ${opt.c} <span class="eng-trans">${opt.e}</span>
                        </button>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');

    app.innerHTML = `
        <div class="header">
            <h1>💼 Business Mission ${m.level} / 15</h1>
            <p>${m.title} (${m.topic})</p>
        </div>

        <img src="${m.img}" class="news-image">

        <div class="prep-section">
            <h3>📚 Business Grammar & Vocabulary</h3>
            <p>${m.grammarDesc}</p>
            <p><strong>10 Key Corporate Vocabulary Words:</strong></p>
            <div class="vocab-grid">${vocabHtml}</div>
        </div>

        <button class="action-btn" onclick="playText('${m.story.replace(/<[^>]*>?/gm, '')}')">
            🔊 Play Full Business Scenario Audio
        </button>

        <div class="script-box">
            <div class="cantonese-text">${m.story}</div>
            <div class="jyutping">${m.jyutping}</div>
        </div>

        <div class="quiz-section">
            <h3>📝 Professional Knowledge Check</h3>
            ${quizHtml}
        </div>

        <div class="translation-box">
            <strong>English Translation:</strong><br>
            ${m.english}
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" ${currentLevel === 0 ? 'disabled' : ''} onclick="loadMission(currentLevel - 1)">⬅️ Previous</button>
             <button class="nav-btn" onclick="window.location.href='grammar.html'">Home</button>
            <button class="nav-btn" ${currentLevel === missionsData.length - 1 ? 'disabled' : ''} onclick="loadMission(currentLevel + 1)">Next ➡️</button>
        </div>
    `;
    window.scrollTo(0, 0);
}


// THIS IS THE MODIFIED SECTION
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

window.onload = () => {
    // Force voices to initialize
    window.speechSynthesis.getVoices();

    // 1. Get the level from the URL (e.g., beginner.html?level=2)
    const urlParams = new URLSearchParams(window.location.search);
    const levelParam = urlParams.get('level');
    
    // 2. Convert that to a number
    if (levelParam) {
        const targetMissionIndex = parseInt(levelParam) - 1; // Level 2 is Index 1
        
        // 3. Check if that mission exists in your missionsData array
        if (targetMissionIndex >= 0 && targetMissionIndex < missionsData.length) {
            loadMission(targetMissionIndex);
        } else {
            loadMission(0); // Default to first mission if number is wrong
        }
    } else {
        loadMission(0); // Default if no number is in URL
    }
};
</script>
