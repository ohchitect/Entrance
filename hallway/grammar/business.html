<script>
const missionsData = [
    {
        level: 1, title: "Project Kick-off Meeting", topic: "Regarding (關於 - Concerning/Regarding)",
        img: "https://images.unsplash.com/photo-1542744173-8e7e53415bb0",
        grammarDesc: "<strong>Setting the Agenda:</strong> Introducing a topic in a formal setting.<br>關於 (gwaan1 jyu1) means 'Regarding' or 'Concerning'.",
        vocab: [
            {c: "項目", j: "hong6 muk6", e: "Project"}, {c: "進度", j: "zeon3 dou6", e: "Progress / Schedule"},
            {c: "建築牌照", j: "gin3 zuk1 paai4 ziu3", e: "Building permit"}, {c: "市政府", j: "si5 zing3 fu2", e: "City Hall / City Government"},
            {c: "審批", j: "sam2 pai1", e: "Approval"}, {c: "報價", j: "bou3 gaa3", e: "Quote / Quotation"},
            {c: "供應商", j: "gung1 jing3 soeng1", e: "Supplier"}, {c: "交貨期", j: "gaau1 fo3 kei4", e: "Delivery lead time"},
            {c: "動工", j: "dung6 gung1", e: "Commence construction"}, {c: "關於", j: "gwaan1 jyu1", e: "Regarding"}
        ],
        story: "各位同事，早晨。今日我哋開呢個大會，主要係為咗討論溫哥華市中心新寫字樓嘅項目。<br>關於前期嘅準備工作，我哋已經完成咗大部分嘅圖則設計。<br>不過，喺申請建築牌照方面，市政府嗰邊嘅審批進度比預期慢咗少少。<br>我已經派咗專人去跟進，希望下個星期會有確實嘅回覆。<br>與此同時，工程部需要提前聯絡供應商，確定建築材料嘅報價同埋交貨期。<br>特別係木工同埋鋼材，據講最近嘅運輸時間拉長咗。<br>我哋嘅目標係下個月初可以正式動工。<br>如果大家對個時間表有任何疑問，可以而家提出嚟。<br>冇問題嘅話，我哋就按照呢個計劃去執行。",
        jyutping: "Gok3 wai2 tung4 sik6, zou2 san4. Gam1 jat6 ngo5 dei6 hoi1 ni1 go3 daai6 wui2, zyu2 jiu3 hai6 wai6 zo2 tou2 leon6 Wan1 go1 waa4 si5 zung1 sam1 san1 se2 zi6 lau4 ge3 hong6 muk6.<br><span class='highlight'>Gwaan1 jyu1</span> cin4 kei4 ge3 zeon2 bei6 gung1 zok3, ngo5 dei6 ji5 ging1 jyun4 sing4 zo2 daai6 bou6 fan6 ge3 tou4 zak1 cit3 gai3.<br>Bat1 gwo3, hai2 san1 cing2 gin3 zuk1 paai4 ziu3 fong1 min6, si5 zing3 fu2 go2 bin1 ge3 sam2 pai1 zeon3 dou6 bei2 jyu6 kei4 maan6 zo2 siu2 siu2.<br>Ngo5 ji5 ging1 paai3 zo2 zyun1 jan4 heoi3 gan1 zeon3, hei1 mong6 haa6 go3 sing1 kei4 wui5 jau5 kok3 sat6 ge3 wui4 fuk1.<br>Jyu5 ci2 tung4 si4, gung1 cing4 bou6 seoi1 jiu3 tai4 cin4 lyun4 lok3 gung1 jing3 soeng1, kok3 ding6 gin3 zuk1 coi4 liu2 ge3 bou3 gaa3 tung4 maai4 gaau1 fo3 kei4.<br>Dak6 bit6 hai6 muk6 gung1 tung4 maai4 gong3 coi4, geoi3 gong2 zeoi3 gan6 ge3 wan6 syu1 si4 gaan3 laai1 coeng4 zo2.<br>Ngo5 dei6 ge3 muk6 biu1 hai6 haa6 go3 jyut6 co1 ho2 ji5 zing3 sik1 dung6 gung1.<br>Jyu4 gwo2 daai6 gaa1 deoi3 go3 si4 gaan3 biu2 jau5 jam6 ho4 ji4 man6, ho2 ji5 ji4 gaa1 tai4 ceot1 lei4.<br>Mou5 man6 tai4 ge3 waa2, ngo5 dei6 zau6 on3 zaau3 ni1 go3 gai3 waak6 heoi3 zap1 hang4.",
        english: "Good morning, colleagues. We are holding this general meeting today mainly to discuss the new office building project in downtown Vancouver.<br>Regarding the preliminary preparation work, we have already completed most of the floor plan designs.<br>However, in terms of applying for the building permit, City Hall's approval progress is a bit slower than expected.<br>I have already dispatched dedicated staff to follow up, hoping to have a definitive reply by next week.<br>At the same time, the engineering department needs to contact suppliers in advance to confirm the quotes and delivery lead times for construction materials.<br>Especially for millwork and steel, it is said that transportation times have lengthened recently.<br>Our target is to officially commence construction early next month.<br>If everyone has any doubts about the timeline, you can raise them now.<br>If there are no problems, we will execute according to this plan.",
        quizzes: [
            { q: "今日開會主要係討論咩嘢？", e: "(What is the main discussion of today's meeting?)", options: [{c: "溫哥華市中心新寫字樓嘅項目", e: "(The new office building project in downtown Vancouver)", correct: true}, {c: "公司嘅週年晚宴安排", e: "(The company's annual dinner arrangement)", correct: false}, {c: "員工嘅薪酬調整", e: "(Employees' salary adjustments)", correct: false}] },
            { q: "關於前期準備工作，目前完成咗咩？", e: "(Regarding preliminary prep work, what is currently completed?)", options: [{c: "已經完成咗大部分嘅圖則設計", e: "(Already completed most of the floor plan designs)", correct: true}, {c: "已經起好咗成棟樓", e: "(Already built the entire building)", correct: false}, {c: "已經買晒所有傢俬", e: "(Already bought all the furniture)", correct: false}] },
            { q: "邊方面嘅進度比預期慢咗？", e: "(Which aspect's progress is slower than expected?)", options: [{c: "市政府審批建築牌照嘅進度", e: "(City Hall's approval progress for the building permit)", correct: true}, {c: "畫圖則嘅進度", e: "(The progress of drawing floor plans)", correct: false}, {c: "招聘工人嘅進度", e: "(The progress of hiring workers)", correct: false}] },
            { q: "工程部需要提前聯絡供應商確定咩嘢？", e: "(What does the engineering dept need to contact suppliers in advance to confirm?)", options: [{c: "建築材料嘅報價同埋交貨期", e: "(Quotes and delivery lead times for construction materials)", correct: true}, {c: "供應商老闆嘅行程", e: "(The supplier boss's schedule)", correct: false}, {c: "地盤嘅午餐飯盒菜單", e: "(The lunch box menu for the site)", correct: false}] },
            { q: "「動工」係咩意思？", e: "(What does 'dung gung' mean?)", options: [{c: "正式開始進行建築工程", e: "(Officially commence construction work)", correct: true}, {c: "停止所有工作", e: "(Stop all work)", correct: false}, {c: "開會傾偈", e: "(Have a meeting to chat)", correct: false}] }
        ]
    },
    {
        level: 2, title: "Client Email: Quote Follow-Up", topic: "Polite Requests (煩請 - Please trouble you to)",
        img: "https://images.unsplash.com/photo-1557200134-90327ee9fafa",
        grammarDesc: "<strong>Formal Correspondence:</strong> Making a polite but firm request.<br>煩請 (faan4 cing2) is a professional way to say 'Please be troubled to / Kindly...'",
        vocab: [
            {c: "煩請", j: "faan4 cing2", e: "Kindly / Please"}, {c: "過目", j: "gwo3 muk6", e: "Look over / Review"},
            {c: "附件", j: "fu6 gin2", e: "Attachment"}, {c: "針對", j: "zam1 deoi3", e: "Aimed at / In response to"},
            {c: "木工", j: "muk6 gung1", e: "Millwork"}, {c: "扣除", j: "kau3 ceoi4", e: "Deduct"},
            {c: "尾數", j: "mei5 sou3", e: "Balance / Remaining amount"}, {c: "發票", j: "faat3 piu3", e: "Invoice"},
            {c: "耽誤", j: "daam1 ng6", e: "Delay / Hold up"}, {c: "簽名作實", j: "cim1 meng2 zok3 sat6", e: "Sign to confirm"}
        ],
        story: "Paul，你好。煩請你過目附件入面嘅最新報價單。<br>針對你上次提出關於 Luxe 單位木工設計嘅修改要求，我哋嘅團隊已經重新調整咗預算。<br>扣除咗之前已經支付嘅首期訂金，尾數嘅金額已經清楚列明喺發票嘅最底。<br>據我所知，部分特別訂製嘅歐洲材料需要較長嘅運輸時間。<br>供應商話大約要等四至六個星期先會送到溫哥華。<br>所以，為咗唔好耽誤成個裝修工程嘅進度，我哋強烈建議盡快落實呢份報價。<br>如果你對各項條款冇異議，煩請你簽名作實，並且安排支付第二期嘅款項。<br>一收到你嘅確認，我哋就會即刻安排師傅度尺同埋落訂買料。<br>有任何疑問歡迎隨時聯絡我，多謝合作。",
        jyutping: "Paul, nei5 hou2. <span class='highlight'>Faan4 cing2</span> nei5 gwo3 muk6 fu6 gin2 jap6 min6 ge3 zeoi3 san1 bou3 gaa3 daan1.<br>Zam1 deoi3 nei5 soeng6 ci3 tai4 ceot1 gwaan1 jyu1 Luxe daan1 wai2 muk6 gung1 cit3 gai3 ge3 sau1 goi2 jiu1 kau4, ngo5 dei6 ge3 tyun4 deoi2 ji5 ging1 cung4 san1 tiu4 zing2 zo2 jyu6 syun3.<br>Kau3 ceoi4 zo2 zi1 cin4 ji5 ging1 zi1 fu6 ge3 sau2 kei4 deng6 gam1, mei5 sou3 ge3 gam1 ngaak2 ji5 ging1 cing1 co2 lit6 ming4 hai2 faat3 piu3 ge3 zeoi3 dai2.<br>Geoi3 ngo5 so2 zi1, bou6 fan6 dak6 bit6 deng6 zai3 ge3 au1 zau1 coi4 liu2 seoi1 jiu3 gaau3 coeng4 ge3 wan6 syu1 si4 gaan3.<br>Gung1 jing3 soeng1 waa6 daai6 joek3 jiu3 dang2 sei3 zi3 luk6 go3 sing1 kei4 sin1 wui5 sung3 dou3 Wan1 go1 waa4.<br>So2 ji5, wai6 zo2 m4 hou2 daam1 ng6 seng4 go3 zong1 sau1 gung1 cing4 ge3 zeon3 dou6, ngo5 dei6 koeng4 lit6 gin3 ji5 zeon6 faai3 lok6 sat6 ni1 fan6 bou3 gaa3.<br>Jyu4 gwo2 nei5 deoi3 gok3 hong6 tiu4 fun2 mou5 ji6 ji5, <span class='highlight'>faan4 cing2</span> nei5 cim1 meng2 zok3 sat6, bing6 ce2 on1 paai4 zi1 fu6 dai6 ji6 kei4 ge3 fun2 hong6.<br>Jat1 sau1 dou2 nei5 ge3 kok3 jing6, ngo5 dei6 zau6 wui5 zik1 hak1 on1 paai4 si1 fu2 dou6 cek3 tung4 maai4 lok6 deng3 maai5 liu2.<br>Jau5 jam6 ho4 ji4 man6 fun1 jing4 ceoi4 si4 lyun4 lok3 ngo5, do1 ze6 hap6 zok3.",
        english: "Hello Paul. Kindly review the latest quotation in the attachment.<br>In response to the modification requests you brought up last time regarding the millwork design for the Luxe unit, our team has readjusted the budget.<br>Deducting the initial deposit that was already paid, the remaining balance amount has been clearly listed at the very bottom of the invoice.<br>As far as I know, some specially custom-ordered European materials require a longer transportation time.<br>The supplier said it will take about 4 to 6 weeks to be delivered to Vancouver.<br>Therefore, in order not to delay the progress of the whole renovation project, we strongly suggest finalizing this quote as soon as possible.<br>If you have no objections to the various terms, kindly sign to confirm, and arrange payment for the second installment.<br>Once we receive your confirmation, we will immediately arrange the master tradesmen to take measurements and place orders to buy materials.<br>If you have any doubts, welcome to contact me anytime. Thank you for your cooperation.",
        quizzes: [
            { q: "電郵嘅附件入面有咩文件？", e: "(What document is in the email's attachment?)", options: [{c: "最新嘅報價單同發票", e: "(The latest quotation and invoice)", correct: true}, {c: "公司嘅宣傳單張", e: "(The company's promotional flyer)", correct: false}, {c: "員工嘅履歷表", e: "(Employee's resume)", correct: false}] },
            { q: "點解預算要重新調整？", e: "(Why did the budget have to be readjusted?)", options: [{c: "因為客人對木工設計提出咗修改要求", e: "(Because the client requested modifications to the millwork design)", correct: true}, {c: "因為加咗好多行政費", e: "(Because a lot of admin fees were added)", correct: false}, {c: "因為計錯咗數", e: "(Because the calculation was wrong)", correct: false}] },
            { q: "尾數金額係點樣計算出嚟嘅？", e: "(How is the balance amount calculated?)", options: [{c: "總數扣除咗之前已經支付嘅首期訂金", e: "(Total minus the initial deposit already paid)", correct: true}, {c: "加上咗全部嘅利息", e: "(Adding all the interest)", correct: false}, {c: "隨便估算一個數", e: "(Randomly estimating a number)", correct: false}] },
            { q: "點解作者強烈建議盡快落實報價？", e: "(Why does the author strongly suggest finalizing the quote ASAP?)", options: [{c: "因為特別材料運輸時間長，唔想耽誤工程進度", e: "(Because special materials take long to ship, don't want to delay progress)", correct: true}, {c: "因為公司等錢用", e: "(Because the company is desperate for money)", correct: false}, {c: "因為報價聽日就會過期", e: "(Because the quote expires tomorrow)", correct: false}] },
            { q: "「煩請」喺商業書信入面表達咩語氣？", e: "(What tone does 'faan cing' express in business correspondence?)", options: [{c: "客氣且專業地請求對方做某件事", e: "(Politely and professionally requesting the other party to do something)", correct: true}, {c: "極度憤怒嘅命令", e: "(An extremely angry command)", correct: false}, {c: "隨意嘅問候", e: "(A casual greeting)", correct: false}] }
        ]
    },
    {
        level: 3, title: "Reporting Progress to Supervisor", topic: "Knowledge/Fact (據我所知 - As far as I know)",
        img: "https://images.unsplash.com/photo-1573164713988-8665fc963095",
        grammarDesc: "<strong>Information Reporting:</strong> Stating facts based on your current understanding.<br>據我所知 (geoi3 ngo5 so2 zi1) means 'As far as I know / Based on what I know'.",
        vocab: [
            {c: "匯報", j: "wui6 bou3", e: "Report"}, {c: "據我所知", j: "geoi3 ngo5 so2 zi1", e: "As far as I know"},
            {c: "安裝", j: "on1 zong1", e: "Install"}, {c: "濕度", j: "sap1 dou6", e: "Humidity"},
            {c: "滲水", j: "sam3 seoi2", e: "Water leakage / Seepage"}, {c: "抽濕機", j: "cau1 sap1 gei1", e: "Dehumidifier"},
            {c: "工序", j: "gung1 zeoi6", e: "Process / Procedure"}, {c: "地磚", j: "dei6 zyun1", e: "Floor tiles"},
            {c: "密切留意", j: "mat6 cit3 lau4 ji3", e: "Monitor closely"}, {c: "延遲", j: "jin4 ci4", e: "Delay"}
        ],
        story: "Alex，我想同你匯報一下物理治療診所裝修嘅最新狀況。<br>現場嘅冷氣系統同埋水喉已經安裝完畢，通過咗初步測試。<br>但係油漆判頭今朝打畀我，話牆身嘅濕度太高，暫時未可以開工髹油。<br>據我所知，呢個係因為大廈嘅中央冷氣喉管早幾日有輕微滲水。<br>雖然管理處已經派人整好咗個漏水點，但係啲石膏板同牆身需要時間徹底乾透。<br>我已經安排咗三部大型抽濕機喺現場日夜運作，盡量加快個進度。<br>不過，為咗確保油漆嘅質量唔會起泡，我估計油漆工程需要延遲三日先可以正式開始。<br>至於其他不受濕度影響嘅工序，例如鋪地磚同埋裝走廊燈，我哋會安排師傅提早入場做住先，避免工人停工。<br>我會密切留意住現場個濕度讀數，一有最新消息或者需要改 schedule，會即刻話你知。",
        jyutping: "Alex, ngo5 soeng2 tung4 nei5 wui6 bou3 jat1 haa5 mat6 lei5 zi6 liu4 can2 so2 zong1 sau1 ge3 zeoi3 san1 zong6 fong3.<br>Jin6 coeng4 ge3 laang5 hei3 hai6 tung2 tung4 maai4 seoi2 hau4 ji5 ging1 on1 zong1 jyun4 bat1, tung1 gwo3 zo2 co1 bou6 cak1 si3.<br>Daan6 hai6 jau4 cat1 pun3 tau4 gam1 ziu1 daa2 bei2 ngo5, waa6 coeng4 san1 ge3 sap1 dou6 taai3 gou1, zaam6 si4 mei6 ho2 ji5 hoi1 gung1 jau4 jau2.<br><span class='highlight'>Geoi3 ngo5 so2 zi1</span>, ni1 go3 hai6 jan1 wai6 daai6 haa6 ge3 zung1 joeng1 laang5 hei3 hau4 gun2 zou2 gei2 jat6 jau5 hing1 mei4 sam3 seoi2.<br>Seoi1 jin4 gun2 lei5 cyu3 ji5 ging1 paai3 jan4 zing2 hou2 zo2 go3 lau6 seoi2 dim2, daan6 hai6 di1 sek6 gou1 baan2 tung4 coeng4 san1 seoi1 jiu3 si4 gaan3 cit3 dai2 gon1 tau3.<br>Ngo5 ji5 ging1 on1 paai4 zo2 saam1 bou6 daai6 jing4 cau1 sap1 gei1 hai2 jin6 coeng4 jat6 je6 wan6 zok3, zeon6 loeng6 gaa1 faai3 go3 zeon3 dou6.<br>Bat1 gwo3, wai6 zo2 kok3 bou2 jau4 cat1 ge3 zat1 loeng6 m4 wui5 hei2 pou5, ngo5 gu2 gai3 jau4 cat1 gung1 cing4 seoi1 jiu3 jin4 ci4 saam1 jat6 sin1 ho2 ji5 zing3 sik1 hoi1 ci2.<br>Zi3 jyu1 kei4 taa1 bat1 sau6 sap1 dou6 jing2 hoeng2 ge3 gung1 zeoi6, lai6 jyu4 pou1 dei6 zyun1 tung4 maai4 zong1 zau2 long2 dang1, ngo5 dei6 wui5 on1 paai4 si1 fu2 tai4 zou2 jap6 coeng4 zou6 zyu6 sin1, bei6 min5 gung1 jan4 ting4 gung1.<br>Ngo5 wui5 mat6 cit3 lau4 ji3 zyu6 jin6 coeng4 go3 sap1 dou6 duk6 sou3, jat1 jau5 zeoi3 san1 siu1 sik1 waak6 ze2 seoi1 jiu3 goi2 schedule, wui5 zik1 hak1 waa6 nei5 zi1.",
        english: "Alex, I want to report to you the latest status of the physiotherapy clinic renovation.<br>The AC system and plumbing on-site have been installed and passed preliminary testing.<br>However, the painting contractor called me this morning, saying the wall humidity is too high, so they temporarily cannot start painting.<br>As far as I know, this is because the building's central AC pipes had a slight seepage a few days ago.<br>Although management has already sent someone to fix the leak, the drywall and walls need time to dry thoroughly.<br>I have already arranged for three large dehumidifiers to operate day and night on-site to speed up the progress as much as possible.<br>However, to ensure the paint quality won't bubble, I estimate the painting work needs to be delayed by 3 days before officially starting.<br>As for other processes not affected by humidity, like laying floor tiles and installing hallway lights, we will arrange the tradesmen to enter early and work on those first, avoiding work stoppage.<br>I will closely monitor the humidity readings on-site; as soon as there is news or a need to change the schedule, I will let you know immediately.",
        quizzes: [
            { q: "點解油漆工人暫時未可以開工？", e: "(Why can't the painters start work temporarily?)", options: [{c: "因為牆身濕度太高", e: "(Because the wall humidity is too high)", correct: true}, {c: "因為未買到油漆", e: "(Because they haven't bought the paint yet)", correct: false}, {c: "因為未出糧", e: "(Because they haven't been paid)", correct: false}] },
            { q: "導致牆身濕度高嘅根本原因係咩？", e: "(What is the root cause leading to high wall humidity?)", options: [{c: "大廈中央喉管早幾日有輕微滲水", e: "(The building's central pipes had a slight seepage a few days ago)", correct: true}, {c: "琴日落大雨", e: "(It rained heavily yesterday)", correct: false}, {c: "工人倒瀉水", e: "(Workers spilled water)", correct: false}] },
            { q: "作者採取咗咩措施去加快進度？", e: "(What measure did the author take to speed up progress?)", options: [{c: "安排大型抽濕機喺現場日夜運作", e: "(Arranged large dehumidifiers to operate day and night on-site)", correct: true}, {c: "叫工人用風筒吹乾塊牆", e: "(Told workers to use hair dryers to dry the wall)", correct: false}, {c: "直接油上去算數", e: "(Just painted over it and called it a day)", correct: false}] },
            { q: "為咗避免工人停工，作者有咩安排？", e: "(To avoid work stoppage, what arrangement did the author make?)", options: [{c: "安排做唔受濕度影響嘅工序，例如鋪地磚", e: "(Arranged processes not affected by humidity, like laying floor tiles)", correct: true}, {c: "叫所有工人放假三日", e: "(Told all workers to take a 3-day holiday)", correct: false}, {c: "叫油漆工人去幫手做冷氣", e: "(Told painters to help with AC work)", correct: false}] },
            { q: "「據我所知」通常用嚟表達咩語氣？", e: "(What tone does 'geoi ngo so zi' usually express?)", options: [{c: "根據自己目前掌握嘅資訊去陳述事實，保留客觀性", e: "(Stating facts based on currently held info, maintaining objectivity)", correct: true}, {c: "百分之百肯定，絕對冇錯", e: "(100% certain, absolutely no mistakes)", correct: false}, {c: "純粹係自己亂咁估", e: "(Purely random guessing by oneself)", correct: false}] }
        ]
    },
    {
        level: 4, title: "Handling Supplier Delays", topic: "Alternative Solution (既然... 就不如 - Since... might as well)",
        img: "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158",
        grammarDesc: "<strong>Problem Solving:</strong> Proposing a pivot when faced with a roadblock.<br>既然 (gei3 jin4) [A]... 就不如 (zau6 bat1 jyu4) [B] means 'Since [A is a problem], we might as well [do B instead]'.",
        vocab: [
            {c: "物流", j: "mat6 lau4", e: "Logistics"}, {c: "缺貨", j: "kyut3 fo3", e: "Out of stock"},
            {c: "既然", j: "gei3 jin4", e: "Since / Given that"}, {c: "就不如", j: "zau6 bat1 jyu4", e: "Might as well"},
            {c: "替代方案", j: "tai3 doi6 fong1 on3", e: "Alternative solution"}, {c: "成本", j: "sing4 bun2", e: "Cost"},
            {c: "差價", j: "caa1 gaa3", e: "Price difference"}, {c: "妥協", j: "to5 hip3", e: "Compromise"},
            {c: "客房", j: "haak3 fong4", e: "Guest room / Client's room"}, {c: "拍板", j: "paak3 baan2", e: "Make a final decision / Give the green light"}
        ],
        story: "今日收到物流公司嘅電郵，話我哋為酒店大堂訂嗰批意大利大理石遇到清關延誤。<br>原本預計下個禮拜到溫哥華，而家起碼要等多半個月，供應商嗰邊亦都出現缺貨情況。<br>我同設計團隊開咗個緊急會議，評估過工程進度。<br>既然原定嘅材料一定趕唔切交貨，我哋就不如啟動替代方案 (Plan B)。<br>我哋喺本地搵到一款顏色同紋理都非常接近嘅花崗岩。<br>雖然成本比原來嘅預算貴咗 15%，但係可以即刻安排送貨，保證大堂嘅裝修可以如期完工。<br>為咗表示誠意，我哋會同供應商談判，要求佢哋承擔部分差價。<br>喺質量方面我哋絕對唔會妥協，呢款本地石材嘅耐用度其實仲好過原先嗰款。<br>我已經將兩塊辦 (samples) 放咗喺客房，等老細今晏親自睇過拍板。<br>做 project 管理，遇到突發事最緊要轉數快，唔好死咕咕等運到。",
        jyutping: "Gam1 jat6 sau1 dou2 mat6 lau4 gung1 si1 ge3 din6 jau4, waa6 ngo5 dei6 wai6 zau2 dim3 daai6 tong4 deng6 go2 pai1 ji3 daai6 lei6 daai6 lei5 sek6 jyu6 dou2 cing1 gwaan1 jin4 ng6.<br>Jyun4 bun2 jyu6 gai3 haa6 go3 lai5 baai3 dou3 Wan1 go1 waa4, ji4 gaa1 hei2 maa5 jiu3 dang2 do1 bun3 go3 jyut6, gung1 jing3 soeng1 go2 bin1 jik6 dou1 ceot1 jin6 kyut3 fo3 cing4 fong3.<br>Ngo5 tung4 cit3 gai3 tyun4 deoi2 hoi1 zo2 go3 gan2 gap1 wui6 ji5, ping4 gu2 gwo3 gung1 cing4 zeon3 dou6.<br><span class='highlight'>Gei3 jin4</span> jyun4 ding6 ge3 coi4 liu2 jat1 ding6 gon2 m4 cit3 gaau1 fo3, ngo5 dei6 <span class='highlight'>zau6 bat1 jyu4</span> kai2 dung6 tai3 doi6 fong1 on3 (Plan B).<br>Ngo5 dei6 hai2 bun2 dei6 wan2 dou2 jat1 fun2 ngaan4 sik1 tung4 man4 lei5 dou1 fei1 soeng4 zip3 gan6 ge3 faa1 gong1 ngaam4.<br>Seoi1 jin4 sing4 bun2 bei2 jyun4 loi4 ge3 jyu6 syun3 gwai3 zo2 15%, daan6 hai6 ho2 ji5 zik1 hak1 on1 paai4 sung3 fo3, bou2 zing3 daai6 tong4 ge3 zong1 sau1 ho2 ji5 jyu4 kei4 jyun4 gung1.<br>Wai6 zo2 biu2 si6 sing4 ji3, ngo5 dei6 wui5 tung4 gung1 jing3 soeng1 taam4 pun3, jiu1 kau4 keoi5 dei6 sing4 daam1 bou6 fan6 caa1 gaa3.<br>Hai2 zat1 loeng6 fong1 min6 ngo5 dei6 zyut6 deoi3 m4 wui5 to5 hip3, ni1 fun2 bun2 dei6 sek6 coi4 ge3 noi6 jung6 dou6 kei4 sat6 zung6 hou2 gwo3 jyun4 sin1 go2 fun2.<br>Ngo5 ji5 ging1 zoeng1 loeng5 faai3 baan2 (samples) fong3 zo2 hai2 haak3 fong4, dang2 lou5 sai3 gam1 aan3 can1 zi6 tai2 gwo3 paak3 baan2.<br>Zou6 project gun2 lei5, jyu6 dou2 dat6 faat3 si6 zeoi3 gan2 jiu3 zyun3 sou3 faai3, m4 hou2 sei2 gu1 gu1 dang2 wan6 dou3.",
        english: "Today I received an email from the logistics company saying the batch of Italian marble we ordered for the hotel lobby encountered customs clearance delays.<br>It was originally expected to arrive in Vancouver next week, now it will take at least half a month more, and the supplier is also experiencing out-of-stock situations.<br>I held an emergency meeting with the design team to evaluate the project progress.<br>Since the originally scheduled materials definitely cannot be delivered in time, we might as well activate the alternative solution (Plan B).<br>We found a local granite with a color and texture very close to the original.<br>Although the cost is 15% more expensive than the original budget, it can be delivered immediately, guaranteeing the lobby renovation can be finished on schedule.<br>To show sincerity, we will negotiate with the supplier to require them to bear part of the price difference.<br>In terms of quality we will absolutely not compromise; the durability of this local stone is actually even better than the original one.<br>I have already placed two samples in the guest room, waiting for the boss to personally review and make the final decision this afternoon.<br>Doing project management, when encountering sudden events the most important thing is to think fast on your feet, don't just stubbornly wait for luck to arrive.",
        quizzes: [
            { q: "原本訂購嘅大理石遇到咩問題？", e: "(What problem did the originally ordered marble encounter?)", options: [{c: "清關延誤同埋供應商缺貨", e: "(Customs clearance delays and supplier out-of-stock)", correct: true}, {c: "送到嚟全部爛晒", e: "(Arrived completely broken)", correct: false}, {c: "顏色完全唔啱", e: "(The color was completely wrong)", correct: false}] },
            { q: "作者提出嘅替代方案係咩？", e: "(What is the alternative solution proposed by the author?)", options: [{c: "用本地搵到嘅花崗岩代替", e: "(Use locally found granite as a substitute)", correct: true}, {c: "鋪木地板算數", e: "(Just lay wood flooring and be done with it)", correct: false}, {c: "等大理石送到先開工", e: "(Wait for the marble to arrive before starting work)", correct: false}] },
            { q: "新方案對成本同進度有咩影響？", e: "(What impact does the new plan have on cost and schedule?)", options: [{c: "成本貴咗 15%，但保證可以如期完工", e: "(Cost is 15% higher, but guarantees finishing on schedule)", correct: true}, {c: "成本平咗，但會嚴重延遲", e: "(Cost is cheaper, but will severely delay)", correct: false}, {c: "完全冇影響", e: "(Absolutely no impact)", correct: false}] },
            { q: "作者打算點樣處理超出嘅差價？", e: "(How does the author plan to handle the excess price difference?)", options: [{c: "同供應商談判，要求佢哋承擔部分差價", e: "(Negotiate with supplier, ask them to bear part of the difference)", correct: true}, {c: "叫業主自己畀", e: "(Tell the client to pay for it themselves)", correct: false}, {c: "喺工人嘅人工入面扣", e: "(Deduct it from the workers' wages)", correct: false}] },
            { q: "「既然... 就不如」喺解決問題時發揮咩作用？", e: "(What role does 'Since... might as well' play in problem-solving?)", options: [{c: "接受已發生嘅阻礙，果斷轉換方向採取另一種行動", e: "(Accept the occurred obstacle, decisively pivot and take another action)", correct: true}, {c: "表示無能為力，放棄解決", e: "(Express helplessness, give up on solving it)", correct: false}, {c: "要求別人道歉", e: "(Demand someone to apologize)", correct: false}] }
        ]

    {
        level: 5, title: "Reviewing Budgets", topic: "Analysis (比起... 其實 - Compared to... actually)",
        img: "https://images.unsplash.com/photo-1554224155-6726b3ff858f",
        grammarDesc: "<strong>Financial Analysis:</strong> Re-evaluating cost perspectives.<br>比起 (bei2 hei2) [A]... 其實 (kei4 sat6) [B] means 'Compared to [A]... actually [B is the true situation]'.",
        vocab: [
            {c: "預算", j: "jyu6 syun3", e: "Budget"}, {c: "超支", j: "ciu1 zi1", e: "Over budget / Overspend"},
            {c: "比起", j: "bei2 hei2", e: "Compared to"}, {c: "其實", j: "kei4 sat6", e: "Actually"},
            {c: "長遠嚟講", j: "coeng4 jyun5 lei4 gong2", e: "In the long run"}, {c: "投資", j: "tau4 zi1", e: "Investment"},
            {c: "維修費", j: "wai4 sau1 fai3", e: "Maintenance fee"}, {c: "壽命", j: "sau6 ming6", e: "Lifespan"},
            {c: "性價比", j: "sing3 gaa3 bei2", e: "Cost-effectiveness / Value for money"}, {c: "審批", j: "sam2 pai1", e: "Approval / Audit"}
        ],
        story: "老闆，我哋琴日收到電機工程顧問交過嚟嘅最終預算案。<br>初初睇份 report，個總數確實比我哋原本嘅估算高咗大約 8%。<br>但係當我詳細 breakdown 每一個 cost code 之後，發現主要嘅增幅係嚟自升級咗嘅智能冷氣同通風系統。<br>比起用舊款嘅平價機，其實呢套新系統嘅能源效率高好多。<br>雖然前期嘅設備採購同埋安裝費貴咗，但長遠嚟講，佢每個月可以幫大廈慳返起碼 20% 嘅電費。<br>而且新機嘅保養期長達十年，變相慳咗一大筆未來嘅維修費。<br>所以我認為，呢個唔係超支，而係一項回報率極高嘅長線投資。<br>綜合考慮佢嘅使用壽命同埋節能效果，呢個選項嘅性價比絕對係最高嘅。<br>我已經將詳細嘅 ROI (投資回報率) 計算表附上，希望你可以喺今個星期內審批，等我哋可以盡快落單。",
        jyutping: "Lou5 sai3, ngo5 dei6 kam4 jat6 sau1 dou2 din6 gei1 gung1 cing4 gu3 man6 gaau1 gwo3 lei4 ge3 zeoi3 zung1 jyu6 syun3 on3.<br>Co1 co1 tai2 fan6 report, go3 zung2 sou3 kok3 sat6 bei2 ngo5 dei6 jyun4 bun2 ge3 gu2 syun3 gou1 zo2 daai6 joek3 8%.<br>Daan6 hai6 dong1 ngo5 coeng4 sai3 breakdown mui5 jat1 go3 cost code zi1 hau6, faat3 jin6 zyu2 jiu3 ge3 zang1 fuk1 hai6 lei4 zi6 sing1 kap1 zo2 ge3 zi3 nang4 laang5 hei3 tung4 tung1 fung1 hai6 tung2.<br><span class='highlight'>Bei2 hei2</span> jung6 gau6 fun2 ge3 peng4 gaa3 gei1, <span class='highlight'>kei4 sat6</span> ni1 tou3 san1 hai6 tung2 ge3 nang4 jyun4 haau6 leot2 gou1 hou2 do1.<br>Seoi1 jin4 cin4 kei4 ge3 cit3 bei6 coi2 gau3 tung4 maai4 on1 zong1 fai3 gwai3 zo2, daan6 coeng4 jyun5 lei4 gong2, keoi5 mui5 go3 jyut6 ho2 ji5 bong1 daai6 haa6 haan1 faan1 hei2 maa5 20% ge3 din6 fai3.<br>Ji4 ce2 san1 gei1 ge3 bou2 joeng5 kei4 coeng4 daat6 sap6 nin4, bin3 soeng3 haan1 zo2 jat1 daai6 bat1 mei6 loi4 ge3 wai4 sau1 fai3.<br>So2 ji5 ngo5 jing6 wai4, ni1 go3 m4 hai6 ciu1 zi1, ji4 hai6 jat1 hong6 wui4 bou3 leot2 gik6 gou1 ge3 coeng4 sin3 tau4 zi1.<br>Zung3 hap6 haau2 leoi6 keoi5 ge3 si2 jung6 sau6 ming6 tung4 maai4 zit3 nang4 haau6 gwo2, ni1 go3 syun2 hong6 ge3 sing3 gaa3 bei2 zyut6 deoi3 hai6 zeoi3 gou1 ge3.<br>Ngo5 ji5 ging1 zoeng1 coeng4 sai3 ge3 ROI (tau4 zi1 wui4 bou3 leot2) gai3 syun3 biu2 fu6 soeng5, hei1 mong6 nei5 ho2 ji5 hai2 gam1 go3 sing1 kei4 noi6 sam2 pai1, dang2 ngo5 dei6 ho2 ji5 zeon6 faai3 lok6 daan1.",
        english: "Boss, yesterday we received the final budget proposal submitted by the MEP (Mechanical, Electrical, Plumbing) engineering consultant.<br>Looking at the report initially, the total number is indeed about 8% higher than our original estimate.<br>But when I detailed the breakdown of every cost code, I found the main increase comes from the upgraded smart AC and ventilation system.<br>Compared to using older cheap machines, actually this new system's energy efficiency is much higher.<br>Although the upfront equipment procurement and installation fees are more expensive, in the long run, it can help the building save at least 20% on electricity bills every month.<br>Moreover, the new machine's warranty period is as long as 10 years, which effectively saves a large sum of future maintenance fees.<br>Therefore I think, this is not an overspend, but a long-term investment with an extremely high rate of return.<br>Comprehensively considering its lifespan and energy-saving effects, this option's cost-effectiveness is absolutely the highest.<br>I have already attached the detailed ROI (Return on Investment) calculation spreadsheet, hoping you can approve it within this week so we can place the order ASAP.",
        quizzes: [
            { q: "預算案嘅總數比原先估計高咗幾多？", e: "(How much higher was the budget total than originally estimated?)", options: [{c: "大約 8%", e: "(About 8%)", correct: true}, {c: "大約 20%", e: "(About 20%)", correct: false}, {c: "大約 50%", e: "(About 50%)", correct: false}] },
            { q: "預算增加嘅主要原因係咩？", e: "(What is the main reason for the budget increase?)", options: [{c: "升級咗智能冷氣同通風系統", e: "(Upgraded smart AC and ventilation system)", correct: true}, {c: "買咗好多新電腦畀員工", e: "(Bought a lot of new computers for staff)", correct: false}, {c: "因為要賠錢畀客人", e: "(Because of having to compensate the client)", correct: false}] },
            { q: "新系統喺長遠嚟講有咩好處？", e: "(What is the benefit of the new system in the long run?)", options: [{c: "每個月慳 20% 電費，仲有十年保養慳維修費", e: "(Saves 20% electricity monthly, 10-yr warranty saves maintenance fees)", correct: true}, {c: "完全唔需要用電", e: "(Absolutely does not need to use electricity)", correct: false}, {c: "外觀顏色非常靚", e: "(The exterior color is very pretty)", correct: false}] },
            { q: "作者點樣定性呢筆表面上嘅「超支」？", e: "(How does the author characterize this superficial 'overspend'?)", options: [{c: "認為係一項回報率極高嘅長線投資", e: "(Considers it a long-term investment with an extremely high rate of return)", correct: true}, {c: "認為係顧問呃錢嘅手段", e: "(Considers it a scam by the consultant to get money)", correct: false}, {c: "認為係無可避免嘅浪費", e: "(Considers it an unavoidable waste)", correct: false}] },
            { q: "「比起... 其實...」用嚟表達咩邏輯分析？", e: "(What logical analysis does 'Compared to... actually...' express?)", options: [{c: "對比表面劣勢與實際深層優勢，糾正直覺盲點", e: "(Contrasting superficial flaws with actual deep advantages, correcting intuitive blind spots)", correct: true}, {c: "表示兩樣嘢都買唔起", e: "(Expressing inability to afford either thing)", correct: false}, {c: "要求老闆加人工", e: "(Demanding a salary raise from the boss)", correct: false}] }
        ]

    {

        img: "https://images.unsplash.com/photo-1542744094-3a31f272c490",
        grammarDesc: "<strong>Self-Evaluation:</strong> Drawing attention to key successes.<br>值得一提嘅係 (zik6 dak1 jat1 tai4 ge3 hai6) means 'It is worth mentioning that...'",
        vocab: [

            {c: "優化", j: "jau1 faa3", e: "Optimize"}, {c: "升職", j: "sing1 zik1", e: "Promotion"}
        ],
        story: "喺年度工作表現評估 (Annual Performance Review) 會議上，我向主管匯報過去一年嘅工作成果。<br>今年我負責跟進三個大型建築項目，全部都能夠喺預算之內如期交付。<br>值得一提嘅係，喺 QKD Construction 嗰個項目入面，前期遇到嚴重嘅跨部門協調問題。<br>設計部同工程部之間嘅溝通出現咗樽頸，導致圖則審批不斷延誤。<br>我見到個情況，就主動介入，每個星期設立一個聯合進度會議，拉齊雙方嘅期望。<br>我仲幫公司優化咗內部嘅文件審批流程，將平均等待時間縮短咗三十個百分比。<br>呢個改變唔單止提高咗成個團隊嘅工作效率，仲大大減少咗出錯嘅機會。<br>基於呢啲具體嘅貢獻同埋數據支持，我希望公司可以考慮我下年度升職做 Senior Coordinator 嘅申請。<br>我相信自己具備帶領更大團隊同承擔更多責任嘅能力。",
        jyutping: "Hai2 nin4 dou6 gung1 zok3 biu2 jin6 ping4 gu2 (Annual Performance Review) wui6 ji5 soeng6, ngo5 hoeng3 zyu2 gun2 wui6 bou3 gwo3 heoi3 jat1 nin4 ge3 gung1 zok3 sing4 gwo2.<br>Gam1 nin4 ngo5 fu6 zaak3 gan1 zeon3 saam1 go3 daai6 jing4 gin3 zuk1 hong6 muk6, cyun4 bou6 dou1 nang4 gau3 hai2 jyu6 syun3 zi1 noi6 jyu4 kei4 gaau1 fu6.<br><span class='highlight'>Zik6 dak1 jat1 tai4 ge3 hai6</span>, hai2 QKD Construction go2 go3 hong6 muk6 jap6 min6, cin4 kei4 jyu6 dou2 jim4 zung6 ge3 kwaa1 bou6 mun4 hip3 tiu4 man6 tai4.<br>Cit3 gai3 bou6 tung4 gung1 cing4 bou6 zi1 gaan1 ge3 gau1 tung1 ceot1 jin6 zo2 zeon1 geng2, dou6 zi3 tou4 zak1 sam2 pai1 bat1 dyun6 jin4 ng6.<br>Ngo5 gin3 dou2 go3 cing4 fong3, zau6 zyu2 dung6 gaai3 jap6, mui5 go3 sing1 kei4 cit3 laap6 jat1 go3 lyun4 hap6 zeon3 dou6 wui6 ji5, laai1 cai4 soeng1 fong1 ge3 kei4 mong6.<br>Ngo5 zung6 bong1 gung1 si1 jau1 faa3 zo2 noi6 bou6 ge3 man4 gin2 sam2 pai1 lau4 cing4, zoeng1 ping4 gwan1 dang2 doi6 si4 gaan3 suk1 dyun2 zo2 saam1 sap6 go3 baak3 fan6 bei2.<br>Ni1 go3 goi2 bin3 m4 daan1 zi2 tai4 gou1 zo2 seng4 go3 tyun4 deoi2 ge3 gung1 zok3 haau6 leot2, zung6 daai6 daai6 gaam2 siu2 zo2 ceot1 co3 ge3 gei1 wui6.<br>Gei1 jyu1 ni1 di1 geoi6 tai2 ge3 gung3 hin3 tung4 maai4 sou3 geoi3 zi1 ci4, ngo5 hei1 mong6 gung1 si1 ho2 ji5 haau2 leoi6 ngo5 haa6 nin4 dou6 sing1 zik1 zou6 Senior Coordinator ge3 san1 cing2.<br>Ngo5 soeng1 seon3 zi6 gei2 geoi6 bei6 daai3 ling5 gang3 daai6 tyun4 deoi2 tung4 sing4 daam1 gang3 do1 zaak3 jam6 ge3 nang4 lik6.",
        english: "At the Annual Performance Review meeting, I reported my work results over the past year to my supervisor.<br>This year I was responsible for following up on three large-scale construction projects, all of which were able to be delivered on schedule and under budget.<br>It is worth mentioning that, in the QKD Construction project, we encountered severe cross-departmental coordination problems in the early stages.<br>A bottleneck appeared in the communication between the design department and the engineering department, leading to continuous delays in floor plan approvals.<br>Seeing the situation, I proactively intervened, setting up a joint progress meeting every week to align the expectations of both parties.<br>I also helped the company optimize the internal document approval process, shortening the average wait time by 30 percent.<br>This change not only improved the working efficiency of the entire team, but also greatly reduced the chance of making mistakes.<br>Based on these concrete contributions and data support, I hope the company can consider my application for promotion to Senior Coordinator next year.<br>I believe I possess the ability to lead a larger team and bear more responsibilities.",
        quizzes: [
            { q: "作者今年跟進嘅項目表現如何？", e: "(How was the performance of the projects the author followed up on this year?)", options: [{c: "全部都能夠喺預算之內如期交付", e: "(All were able to be delivered on schedule within budget)", correct: true}, {c: "全部都嚴重超支同延期", e: "(All severely over budget and delayed)", correct: false}, {c: "中途取消晒", e: "(Cancelled halfway through)", correct: false}] },
            { q: "QKD 項目初期遇到咩最大困難？", e: "(What was the biggest difficulty the QKD project encountered early on?)", options: [{c: "跨部門溝通出現樽頸，導致圖則審批延誤", e: "(Cross-departmental communication bottleneck led to floor plan approval delays)", correct: true}, {c: "買錯咗建築材料", e: "(Bought the wrong construction materials)", correct: false}, {c: "冇人識畫圖", e: "(Nobody knew how to draw floor plans)", correct: false}] },
            { q: "作者點樣主動解決跨部門溝通嘅問題？", e: "(How did the author proactively solve the cross-departmental communication problem?)", options: [{c: "每個星期設立聯合進度會議，拉齊雙方期望", e: "(Set up a weekly joint progress meeting to align both sides' expectations)", correct: true}, {c: "投訴設計部同事", e: "(Complained about the design department colleagues)", correct: false}, {c: "自己一個畫晒啲圖", e: "(Drew all the plans by themselves)", correct: false}] },
            { q: "優化內部審批流程帶嚟咩具體嘅數據改善？", e: "(What concrete data improvement did optimizing the internal approval process bring?)", options: [{c: "將平均等待時間縮短咗三十個百分比", e: "(Shortened the average wait time by 30 percent)", correct: true}, {c: "慳咗公司一百萬", e: "(Saved the company 1 million dollars)", correct: false}, {c: "減少咗一半嘅員工", e: "(Reduced staff by half)", correct: false}] },
