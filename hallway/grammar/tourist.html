        jyutping: "Sing1 kei4 ng5 maan5, ngo5 dei6 heoi3 zo2 Lit6 zi6 mun4 je6 si5. Go2 dou6 ciu1 kap1 jit6 naau6, jau5 hou2 do1 hou2 je5 sik6, ngo5 maai5 zo2 gei2 cyun3 jau4 jyu2 cyun3 siu1.<br>Sik6 jyun4 je5 zi1 hau6 heoi3 haang4 gaai1, ngo5 tai2 zung3 zo2 jat1 go3 hou2 leng3 ge3 sau2 gei1 hok3, biu1 gaa3 saam1 sap6 man1 Gaa1 bai6.<br>Ngo5 si3 haa5 tung4 dong3 zyu2 gong2 gaa3: 「Lou5 baan2, ho2 m4 ho2 ji5 <span class='highlight'>peng4 di1 laa1</span>? Ji6 sap6 ng5 man1 maai6 m4 maai6?」<br>Dong3 zyu2 gin3 ngo5 gam3 jau5 sing4 ji3, zau6 waa6: 「Hou2 laa1, gaam2 ng5 man1 bei2 nei5, bat1 gwo3 jiu3 bei2 jin6 gam1.」 Zeoi3 hau6 seon6 lei6 sing4 gaau1!",
        english: "On Friday night, we went to the Richmond Night Market. It was super bustling there, with lots of good food; I bought a few squid skewers.<br>After eating, we went shopping, and I fancied a very pretty phone case priced at 30 CAD.<br>I tried bargaining with the stall owner: 'Boss, can it be a bit cheaper please? 25 dollars, will you sell?'<br>Seeing I was sincere, the owner said: 'Okay, discount 5 dollars for you, but you must pay cash.' Finally, a successful deal!",
        quizzes: [
            { q: "夜市嘅氣氛係點樣嘅？", e: "(How is the atmosphere at the night market?)", options: [{c: "超級熱鬧", e: "(Super bustling/lively)", correct: true}, {c: "非常安靜", e: "(Very quiet)", correct: false}, {c: "冇乜人行", e: "(Not many people walking around)", correct: false}] },
            { q: "作者喺夜市食咗咩嘢？", e: "(What did the author eat at the night market?)", options: [{c: "魷魚串燒", e: "(Squid skewers)", correct: true}, {c: "點心燒賣", e: "(Dim sum Siu Mai)", correct: false}, {c: "牛肉腸粉", e: "(Beef rice noodle rolls)", correct: false}] },
            { q: "手機殼原本標價幾多錢？", e: "(How much was the original price of the phone case?)", options: [{c: "三十蚊", e: "(Thirty dollars)", correct: true}, {c: "二十五蚊", e: "(Twenty-five dollars)", correct: false}, {c: "三十五蚊", e: "(Thirty-five dollars)", correct: false}] },
            { q: "作者用咩廣東話說話要求減價？", e: "(What Cantonese phrase did the author use to ask for a discount?)", options: [{c: "老闆，可唔可以平啲啦？", e: "(Boss, can it be cheaper please?)", correct: true}, {c: "唔該，我想退錢。", e: "(Excuse me, I want a refund.)", correct: false}, {c: "呢個太貴，我唔買喇。", e: "(This is too expensive, I'm not buying it.)", correct: false}] },

        grammarDesc: "<strong>Conditions:</strong> Stating rules or consequences.<br>如果 (jyu4 gwo2) ... 就 (zau6). In car rentals: If you crash, then...",

        ],
        story: "聽日我哋打算去 Whistler (惠斯勒) 滑雪，所以去咗租車公司租架 SUV。<br>職員同我解釋保險條款：「如果你淨係買基本保險，發生意外嗰陣就要自己賠錢。如果你買全保，就乜都唔使理。」<br>為咗安心，我決定買全保。<br>佢仲提醒我：「還車嗰陣記得要入滿油，如果唔係就會收好貴嘅手續費。」<br>攞車之前，我哋一齊檢查車身有冇花痕，然後先簽名出車。",
        jyutping: "Ting1 jat6 ngo5 dei6 daa2 syun3 heoi3 Whistler (Wai6 si1 lak6) waat6 syut3, so2 ji5 heoi3 zo2 zou1 ce1 gung1 si1 zou1 gaa3 SUV.<br>Zik1 jyun4 tung4 ngo5 gaai2 sik1 bou2 him2 tiu4 fun2: 「<span class='highlight'>Jyu4 gwo2</span> nei5 zing6 hai6 maai5 gei1 bun2 bou2 him2, faat3 sang1 ji3 ngoi6 go2 zan6 zau6 jiu3 zi6 gei2 pui4 cin2. <span class='highlight'>Jyu4 gwo2</span> nei5 maai5 cyun4 bou2, zau6 mat1 dou1 m4 sai2 lei5.」<br>Wai6 zo2 on1 sam1, ngo5 kyut3 ding6 maai5 cyun4 bou2.<br>Keoi5 zung6 tai4 sing2 ngo5: 「Waan4 ce1 go2 zan6 gei3 dak1 jiu3 jap6 mun5 jau4, jyu4 gwo2 m4 hai6 zau6 wui5 sau1 hou2 gwai3 ge3 sau2 zuk6 fai3.」<br>Lo2 ce1 zi1 cin4, ngo5 dei6 jat1 cai4 gim2 caa4 ce1 san1 jau5 mou5 faa1 han4, jin4 hau6 sin1 cim1 meng2 ceot1 ce1.",
        english: "Tomorrow we plan to go to Whistler to ski, so we went to the rental company to rent an SUV.<br>The staff explained the insurance terms to me: 'If you only buy basic insurance, when an accident happens you have to pay damages yourself. If you buy full coverage, you don't have to worry about anything.'<br>For peace of mind, I decided to buy full coverage.<br>They also reminded me: 'When returning the car, remember to fill up the gas, otherwise a very expensive processing fee will be charged.'<br>Before taking the car, we inspected the car body together for any scratches, and only then signed to drive off.",
        quizzes: [
            { q: "作者點解要去租車？", e: "(Why did the author go to rent a car?)", options: [{c: "打算去 Whistler 滑雪", e: "(Planning to go to Whistler to ski)", correct: true}, {c: "打算去 Banff 度蜜月", e: "(Planning to go to Banff for honeymoon)", correct: false}, {c: "因為自己部車壞咗", e: "(Because their own car broke down)", correct: false}] },
            { q: "租車公司職員對全保 (Full coverage) 嘅解釋係咩？", e: "(What is the staff's explanation of full coverage?)", options: [{c: "發生意外乜都唔使理", e: "(Don't have to worry about anything if an accident happens)", correct: true}, {c: "發生意外要自己賠一半", e: "(Have to pay half the damages oneself in an accident)", correct: false}, {c: "只包車頭玻璃損壞", e: "(Only covers windshield damage)", correct: false}] },

            { q: "「如果... 就」喺呢度表達咗咩？", e: "(What does 'if... then' express here?)", options: [{c: "違反規定會引致嘅後果", e: "(The consequence that results from violating the rule)", correct: true}, {c: "未來嘅美好願望", e: "(A beautiful wish for the future)", correct: false}, {c: "對某人嘅建議", e: "(Advice to someone)", correct: false}] },
            { q: "攞車走之前，作者同職員做咗咩步驟？", e: "(Before driving off, what step did the author and staff do?)", options: [{c: "檢查車身有冇花痕先簽名", e: "(Inspected car for scratches before signing)", correct: true}, {c: "測試冷氣夠唔夠凍", e: "(Tested if the AC is cold enough)", correct: false}, {c: "換咗四條新車胎", e: "(Changed four new tires)", correct: false}] }

        story: "臨返香港之前，我哋去咗市區買手信畀屋企人同朋友。<br>我哋買咗好多支楓糖漿同埋幾盒煙三文魚。<br>當我攞起個購物袋嗰陣，發現啲玻璃樽太重喇！我擔心個行李箱會裝唔落或者超重。<br>畀錢嗰陣，收銀員話買夠一百蚊有打折，不過要另外加百分之十二嘅消費稅。<br>加拿大買嘢要加稅呢樣嘢，我真係覺得太麻煩喇。",
        jyutping: "Lam4 faan1 hoeng1 gong2 zi1 cin4, ngo5 dei6 heoi3 zo2 si5 keoi1 maai5 sau2 seon3 bei2 uk1 kei2 jan4 tung4 pang4 jau5.<br>Ngo5 dei6 maai5 zo2 hou2 do1 zi1 fung1 tong4 zoeng1 tung4 maai4 gei2 hap6 jin1 saam1 man4 jyu2.<br>Dong1 ngo5 lo2 hei2 go3 gau3 mat6 doi2 go2 zan6, faat3 jin6 di1 bo1 lei1 zeon1 <span class='highlight'>taai3</span> cung5 <span class='highlight'>laa3</span>! Ngo5 daam1 sam1 go3 hang4 lei5 soeng1 wui5 zong1 m4 lok6 waak6 ze2 ciu1 cung5.<br>Bei2 cin2 go2 zan6, sau1 ngan4 jyun4 waa6 maai5 gau3 jat1 baak3 man1 jau5 daa2 zit3, bat1 gwo3 jiu3 ling6 ngoi6 gaa1 baak3 fan6 zi1 sap6 ji6 ge3 siu1 fai3 seoi3.<br>Gaa1 naa4 daai6 maai5 je5 jiu3 gaa1 seoi3 ni1 joeng6 je5, ngo5 zan1 hai6 gok3 dak1 <span class='highlight'>taai3</span> maa4 faan4 <span class='highlight'>laa3</span>.",
        english: "Before returning to Hong Kong, we went downtown to buy souvenirs for family and friends.<br>We bought many bottles of maple syrup and several boxes of smoked salmon.<br>When I picked up the shopping bag, I realized the glass bottles were too heavy! I'm worried the suitcase won't fit them or will be overweight.<br>When paying, the cashier said purchases over 100 dollars get a discount, but a 12 percent sales tax must be added on top.<br>Having to add tax when buying things in Canada, I really feel is too troublesome.",

    {
        level: 10, title: "Cycling in Stanley Park", topic: "Simultaneous Actions (一邊... 一邊 - While)",
        img: "https://images.unsplash.com/photo-1519225421980-715cb0215aed",
        grammarDesc: "<strong>Multitasking:</strong> Doing two things at once.<br>一邊 (jat1 bin1) [Action A] 一邊 [Action B] means doing A and B concurrently.",
        vocab: [
            {c: "史丹利公園", j: "si2 daan1 lei6 gung1 jyun2", e: "Stanley Park"}, {c: "租單車", j: "zou1 daan1 ce1", e: "Rent a bicycle"},
            {c: "海傍", j: "hoi2 pong4", e: "Seawall / Seaside"}, {c: "一邊...一邊", j: "jat1 bin1... jat1 bin1", e: "While... and..."},
            {c: "踩單車", j: "caai2 daan1 ce1", e: "Ride a bicycle"}, {c: "吹海風", j: "ceoi1 hoi2 fung1", e: "Feel the sea breeze"},
            {c: "獅門橋", j: "si1 mun4 kiu4", e: "Lions Gate Bridge"}, {c: "停低", j: "ting4 dai1", e: "Stop"},
            {c: "影相", j: "jing2 soeng2", e: "Take photos"}, {c: "打卡", j: "daa2 kaat1", e: "Check-in (social media)"}
        ],
        story: "嚟到溫哥華，點可以唔去史丹利公園 (Stanley Park)？我哋喺公園入口附近租咗兩架單車。<br>我哋一邊沿住海傍踩單車，一邊享受迎面吹嚟嘅海風，感覺非常寫意。<br>去到獅門橋 (Lions Gate Bridge) 嘅觀景台，我哋停低架車。<br>我搵咗個外國遊客幫手：「唔該，可唔可以幫我哋影張相？」<br>影完相打完卡，我哋又繼續向前踩，用咗兩個鐘頭先踩完一圈。",
        jyutping: "Lei4 dou3 Wan1 go1 waa4, dim2 ho2 ji5 m4 heoi3 si2 daan1 lei6 gung1 jyun2 (Stanley Park)? Ngo5 dei6 hai2 gung1 jyun2 jap6 hau2 fu6 gan6 zou1 zo2 loeng5 gaa3 daan1 ce1.<br>Ngo5 dei6 <span class='highlight'>jat1 bin1</span> jyun4 zyu6 hoi2 pong4 caai2 daan1 ce1, <span class='highlight'>jat1 bin1</span> hoeng2 sau6 jing4 min6 ceoi1 lei4 ge3 hoi2 fung1, gam2 gok3 fei1 soeng4 se2 ji3.<br>Heoi3 dou3 si1 mun4 kiu4 (Lions Gate Bridge) ge3 gun1 ging2 toi4, ngo5 dei6 ting4 dai1 gaa3 ce1.<br>Ngo5 wan2 zo2 go3 ngoi6 gwok3 jau4 haak3 bong1 sau2: 「M4 goi1, ho2 m4 ho2 ji5 bong1 ngo5 dei6 jing2 zoeng1 soeng2?」<br>Jing2 jyun4 soeng2 daa2 jyun4 kaat1, ngo5 dei6 jau6 gai3 zuk6 hoeng3 cin4 caai2, jung6 zo2 loeng5 go3 zung1 tau4 sin1 caai2 jyun4 jat1 hyun1.",
        english: "Coming to Vancouver, how can you not go to Stanley Park? We rented two bicycles near the park entrance.<br>We cycled along the seawall while enjoying the sea breeze blowing against our faces, feeling very relaxed.<br>Reaching the observation deck for the Lions Gate Bridge, we stopped our bikes.<br>I asked a foreign tourist for help: 'Excuse me, could you take a picture for us?'<br>After taking photos and checking in on social media, we continued cycling forward, taking two hours to finish one loop.",
        quizzes: [
            { q: "作者喺史丹利公園主要做咩活動？", e: "(What main activity did the author do at Stanley Park?)", options: [{c: "沿住海傍踩單車", e: "(Cycling along the seawall)", correct: true}, {c: "喺沙灘游水", e: "(Swimming at the beach)", correct: false}, {c: "去水族館睇魚", e: "(Going to the aquarium to see fish)", correct: false}] },
            { q: "踩單車嗰陣，作者「一邊... 一邊」做緊咩？", e: "(While cycling, what was the author doing concurrently?)", options: [{c: "一邊踩單車，一邊吹海風", e: "(Cycling while feeling the sea breeze)", correct: true}, {c: "一邊踩單車，一邊聽歌", e: "(Cycling while listening to music)", correct: false}, {c: "一邊踩單車，一邊食嘢", e: "(Cycling while eating)", correct: false}] },
            { q: "去到獅門橋觀景台，作者搵人幫手做咩？", e: "(At the Lions Gate Bridge viewpoint, what did the author ask someone to help with?)", options: [{c: "幫手影張相", e: "(Help take a photo)", correct: true}, {c: "幫手整單車", e: "(Help fix the bicycle)", correct: false}, {c: "問路點樣返市區", e: "(Ask for directions back downtown)", correct: false}] },
            { q: "「打卡」喺現代廣東話入面通常指咩意思？", e: "(What does 'daa kaat' usually mean in modern Cantonese?)", options: [{c: "去景點影相並放上社交媒體", e: "(Taking photos at attractions and posting on social media)", correct: true}, {c: "返工放工用張卡拍落部機度", e: "(Clocking in/out of work using a card)", correct: false}, {c: "打電話叫的士", e: "(Calling to order a taxi)", correct: false}] },
            { q: "佢哋踩完一圈公園用咗幾耐時間？", e: "(How long did it take them to cycle one loop of the park?)", options: [{c: "兩個鐘頭", e: "(Two hours)", correct: true}, {c: "一個鐘頭", e: "(One hour)", correct: false}, {c: "半日", e: "(Half a day)", correct: false}] }
        ]

    {
        level: 11, title: "Currency Exchange", topic: "Comparison in Actions (抵啲 - More worth it)",
        img: "https://images.unsplash.com/photo-1554224155-6726b3ff858f",
        grammarDesc: "<strong>Value Comparison:</strong> Expressing a better deal.<br>抵 (dai2) means 'worth it'. 抵啲 (dai2 di1) means 'more worth it / a better deal'.",
        vocab: [
            {c: "找換店", j: "zaau2 wun6 dim3", e: "Money exchange shop"}, {c: "兌換率", j: "deoi3 wun6 leot2", e: "Exchange rate"},
            {c: "港紙", j: "gong2 zi2", e: "Hong Kong Dollar (HKD)"}, {c: "加幣", j: "gaa1 bai6", e: "Canadian Dollar (CAD)"},
            {c: "手續費", j: "sau2 zuk6 fai3", e: "Handling fee"}, {c: "抵啲", j: "dai2 di1", e: "More worth it / Better deal"},
            {c: "提款機", j: "tai4 fun2 gei1", e: "ATM"}, {c: "撳錢", j: "gam6 cin2", e: "Withdraw money"},
            {c: "比較", j: "bei2 gaau3", e: "Compare"}, {c: "足夠", j: "zuk1 gau3", e: "Enough"}
        ],
        story: "我帶嚟加拿大嘅現金唔係好夠，所以要去市中心搵找換店。<br>我見到有兩間店，第一間嘅兌換率係 1 加幣兌 5.7 港紙，但要收手續費。<br>第二間就 1 兌 5.8，不過免手續費。我計過條數，發覺第二間其實抵啲。<br>後來 Jamie 話，其實直接用香港張提款卡喺當地嘅 ATM 撳錢可能仲抵，因為銀行嘅匯率有時仲靚。<br>不過算啦，換夠今次旅行用就算。",
        jyutping: "Ngo5 daai3 lei4 Gaa1 naa4 daai6 ge3 jin6 gam1 m4 hai6 hou2 gau3, so2 ji5 jiu3 heoi3 si5 zung1 sam1 wan2 zaau2 wun6 dim3.<br>Ngo5 gin3 dou2 jau5 loeng5 gaan1 dim3, dai6 jat1 gaan1 ge3 deoi3 wun6 leot2 hai6 1 Gaa1 bai6 deoi3 5.7 Gong2 zi2, daan6 jiu3 sau1 sau2 zuk6 fai3.<br>Dai6 ji6 gaan1 zau6 1 deoi3 5.8, bat1 gwo3 min5 sau2 zuk6 fai3. Ngo5 gai3 gwo3 tiu4 sou3, faat3 jin6 dai6 ji6 gaan1 kei4 sat6 <span class='highlight'>dai2 di1</span>.<br>Hau6 loi4 Jamie waa6, kei4 sat6 zik6 zip3 jung6 Hoeng1 Gong2 zoeng1 tai4 fun2 kaat1 hai2 dong1 dei6 ge3 ATM gam6 cin2 ho2 nang4 zung6 dai2, jan1 wai6 ngan4 hong4 ge3 wui6 leot2 jau5 si4 zung6 leng3.<br>Bat1 gwo3 syun3 laa1, wun6 gau3 gam1 ci3 leoi5 hang4 jung6 zau6 syun3.",
        english: "The cash I brought to Canada is not quite enough, so I have to go downtown to find a money exchange shop.<br>I saw two shops; the first one's exchange rate is 1 CAD to 5.7 HKD, but charges a handling fee.<br>The second one is 1 to 5.8, but waives the handling fee. I calculated the math and realized the second one is actually a better deal.<br>Later Jamie said that actually directly using a Hong Kong ATM card to withdraw money at a local ATM might be an even better deal, because the bank's exchange rate is sometimes even better.<br>But whatever, exchanging enough for this trip's use is fine.",
        quizzes: [
            { q: "作者點解要去搵找換店？", e: "(Why did the author go look for a money exchange shop?)", options: [{c: "因為帶嚟嘅現金唔夠用", e: "(Because the cash brought was not enough)", correct: true}, {c: "想將加幣換返做港紙", e: "(Wanted to exchange CAD back to HKD)", correct: false}, {c: "想買彩票", e: "(Wanted to buy lottery tickets)", correct: false}] },
            { q: "第一間找換店同第二間有咩分別？", e: "(What is the difference between the 1st and 2nd exchange shop?)", options: [{c: "第一間匯率低啲但要手續費", e: "(1st has lower rate but charges handling fee)", correct: true}, {c: "第一間免手續費但匯率高啲", e: "(1st has no fee but higher rate)", correct: false}, {c: "兩間嘅兌換率完全一樣", e: "(Both exchange rates are exactly the same)", correct: false}] },
            { q: "作者計完數之後覺得邊個選擇「抵啲」？", e: "(After calculating, which choice did the author feel is 'more worth it'?)", options: [{c: "第二間免手續費嘅店", e: "(The second shop with no handling fee)", correct: true}, {c: "第一間要手續費嘅店", e: "(The first shop that charges a fee)", correct: false}, {c: "返機場先換錢", e: "(Wait to exchange at the airport)", correct: false}] },
            { q: "Jamie 提議咗咩另一個換錢方法？", e: "(What alternative method for getting money did Jamie suggest?)", options: [{c: "直接用香港卡喺當地 ATM 撳錢", e: "(Directly use HK card to withdraw at local ATM)", correct: true}, {c: "去賭場換籌碼", e: "(Go to casino to exchange chips)", correct: false}, {c: "碌信用卡", e: "(Swipe credit card)", correct: false}] },
            { q: "「匯率仲靚」即係代表匯率點樣？", e: "(What does 'exchange rate is even prettier' mean?)", options: [{c: "匯率對兌換者更加有利", e: "(The exchange rate is more favorable to the exchanger)", correct: true}, {c: "張銀紙設計得好靚", e: "(The banknote is designed beautifully)", correct: false}, {c: "匯率非常之差", e: "(The exchange rate is terrible)", correct: false}] }
        ]
    },
    {
        level: 12, title: "Seafood Allergy Warning", topic: "Prohibition (唔得 - Cannot / Not allowed)",
        img: "https://images.unsplash.com/photo-1563245372-f21724e3856d",
        grammarDesc: "<strong>Prohibition / Inability:</strong> Expressing that something cannot be done.<br>Verb + 唔得 (m4 dak1) means cannot do the action. e.g. 食唔得 (cannot eat).",
        vocab: [
            {c: "海鮮餐廳", j: "hoi2 sin1 caan1 teng1", e: "Seafood restaurant"}, {c: "皇帝蟹", j: "wong4 dai3 haai5", e: "King Crab"},
            {c: "訂位", j: "deng6 wai2", e: "Book a table"}, {c: "敏感", j: "man5 gam2", e: "Allergic"},
            {c: "花生", j: "faa1 sang1", e: "Peanut"}, {c: "唔食得", j: "m4 sik6 dak1", e: "Cannot eat"},
            {c: "千祈唔好", j: "cin1 kei4 m4 hou2", e: "Please make absolutely sure not to..."}, {c: "落", j: "lok6", e: "Put in / Add"},
            {c: "提醒", j: "tai4 sing2", e: "Remind"}, {c: "廚房", j: "cyu4 fong4", e: "Kitchen"}
        ],
        story: "溫哥華嘅海鮮好出名，所以我哋提早訂位去食阿拉斯加皇帝蟹。<br>點菜嗰陣，我同侍應講：「唔該，我對花生嚴重敏感，絕對唔食得花生。<br>麻煩你同廚房講，煮蟹嗰陣千祈唔好落花生油或者任何果仁。」<br>侍應好專業咁mark低咗，話會親自提醒大廚。<br>出外旅遊，如果有食物敏感，真係要講得好清楚，唔係就大件事喇。",
        jyutping: "Wan1 go1 waa4 ge3 hoi2 sin1 hou2 ceot1 meng2, so2 ji5 ngo5 dei6 tai4 zou2 deng6 wai2 heoi3 sik6 Aa1 laai1 si1 gaa1 wong4 dai3 haai5.<br>Dim2 coi3 go2 zan6, ngo5 tung4 si6 jing3 gong2: 「M4 goi1, ngo5 deoi3 faa1 sang1 jim4 zung6 man5 gam2, zyut6 deoi3 <span class='highlight'>m4 sik6 dak1</span> faa1 sang1.<br>Maa4 faan4 nei5 tung4 cyu4 fong4 gong2, zyu2 haai5 go2 zan6 cin1 kei4 m4 hou2 lok6 faa1 sang1 jau4 waak6 ze2 jam6 ho4 gwo2 jan4.」<br>Si6 jing3 hou2 zyun1 jip6 gam2 mark dai1 zo2, waa6 wui5 can1 zi6 tai4 sing2 daai6 cyu4.<br>Ceot1 ngoi6 leoi5 jau4, jyu4 gwo2 jau5 sik6 mat6 man5 gam2, zan1 hai6 jiu3 gong2 dak1 hou2 cing1 co2, m4 hai6 zau6 daai6 gin6 si6 laa3.",
        english: "Vancouver's seafood is very famous, so we booked a table in advance to eat Alaskan King Crab.<br>When ordering, I told the waiter: 'Excuse me, I am severely allergic to peanuts, absolutely cannot eat peanuts.<br>Please tell the kitchen, when cooking the crab, absolutely do not use peanut oil or any nuts.'<br>The waiter professionally wrote it down and said he would personally remind the head chef.<br>Traveling abroad, if you have food allergies, you really must explain it very clearly, otherwise it's a huge disaster.",
        quizzes: [
            { q: "作者去餐廳主要想食咩嘢？", e: "(What did the author mainly want to eat at the restaurant?)", options: [{c: "阿拉斯加皇帝蟹", e: "(Alaskan King Crab)", correct: true}, {c: "牛扒", e: "(Steak)", correct: false}, {c: "點心", e: "(Dim sum)", correct: false}] },
            { q: "點菜嗰陣，作者特別提醒侍應咩事？", e: "(When ordering, what did the author specially remind the waiter about?)", options: [{c: "對花生嚴重敏感，唔食得花生", e: "(Severely allergic to peanuts, cannot eat peanuts)", correct: true}, {c: "要少鹽少油", e: "(Wants less salt and less oil)", correct: false}, {c: "想菜式快啲上", e: "(Wants the dishes served quickly)", correct: false}] },
            { q: "作者要求廚房煮蟹嗰陣千祈唔好落咩？", e: "(What did the author ask the kitchen absolutely not to put in when cooking the crab?)", options: [{c: "花生油或者任何果仁", e: "(Peanut oil or any nuts)", correct: true}, {c: "辣椒同埋蒜頭", e: "(Chili and garlic)", correct: false}, {c: "味精", e: "(MSG)", correct: false}] },
            { q: "侍應嘅反應係點樣？", e: "(What was the waiter's reaction?)", options: [{c: "好專業咁mark低，話會提醒大廚", e: "(Professionally noted it down, said will remind head chef)", correct: true}, {c: "話廚房做唔到", e: "(Said the kitchen cannot do it)", correct: false}, {c: "冇理會作者嘅要求", e: "(Ignored the author's request)", correct: false}] },
            { q: "「唔係就大件事喇」喺呢度表達咩意思？", e: "(What does 'otherwise it's a huge disaster' express here?)", options: [{c: "如果不小心，後果會非常嚴重", e: "(If careless, the consequences will be very severe)", correct: true}, {c: "餐廳會發生火警", e: "(The restaurant will have a fire)", correct: false}, {c: "會被餐廳趕走", e: "(Will be kicked out of the restaurant)", correct: false}] }
        ]
    },
    {
        level: 13, title: "Rainy Day Plan B", topic: "Alternatives (或者 - Or)",
        img: "https://images.unsplash.com/photo-1515694346937-94d85e41e6f0",
        grammarDesc: "<strong>Alternatives:</strong> Offering a choice between options in a statement.<br>或者 (waak6 ze2) means 'or' (used in statements, not questions).",
        vocab: [
            {c: "原本", j: "jyun4 bun2", e: "Originally"}, {c: "行山", j: "haang4 saan1", e: "Hiking"},
            {c: "天氣預報", j: "tin1 hei3 jyu6 bou3", e: "Weather forecast"}, {c: "暴雨", j: "bou6 jyu5", e: "Rainstorm / Heavy rain"},
            {c: "取消", j: "ceoi2 siu1", e: "Cancel"}, {c: "或者", j: "waak6 ze2", e: "Or (in statements)"},
            {c: "水族館", j: "seoi2 zuk6 gun2", e: "Aquarium"}, {c: "美術館", j: "mei5 seot6 gun2", e: "Art gallery"},
            {c: "室內", j: "sat1 noi6", e: "Indoor"}, {c: "行程", j: "hing4 cing4", e: "Itinerary"}
        ],
        story: "我哋原本計劃今日去松雞山 (Grouse Mountain) 行山，但係朝早睇天氣預報話會有暴雨。<br>為咗安全起見，我哋唯有取消戶外嘅行程。<br>Jamie 提議：「不如我哋改去溫哥華水族館，或者去市中心嘅美術館睇展覽啦。」<br>我覺得呢兩個提議都唔錯，落雨天安排室內活動就最適合。<br>最後我哋揀咗去水族館睇海獺。",
        jyutping: "Ngo5 dei6 jyun4 bun2 gai3 waak6 gam1 jat6 heoi3 cung4 gai1 saan1 (Grouse Mountain) haang4 saan1, daan6 hai6 ziu1 zou2 tai2 tin1 hei3 jyu6 bou3 waa6 wui5 jau5 bou6 jyu5.<br>Wai6 zo2 on1 cyun4 hei2 gin3, ngo5 dei6 wai4 jau5 ceoi2 siu1 wu6 ngoi6 ge3 hing4 cing4.<br>Jamie tai4 ji5: 「Bat1 jyu4 ngo5 dei6 goi2 heoi3 Wan1 go1 waa4 seoi2 zuk6 gun2, <span class='highlight'>waak6 ze2</span> heoi3 si5 zung1 sam1 ge3 mei5 seot6 gun2 tai2 zin2 laam5 laa1.」<br>Ngo5 gok3 dak1 ni1 loeng5 go3 tai4 ji5 dou1 m4 co3, lok6 jyu5 tin1 on1 paai4 sat1 noi6 wut6 dung6 zau6 zeoi3 sik1 hap6.<br>Zeoi3 hau6 ngo5 dei6 gaan2 zo2 heoi3 seoi2 zuk6 gun2 tai2 hoi2 caat3.",
        english: "We originally planned to go hiking at Grouse Mountain today, but looking at the weather forecast in the morning, it said there would be heavy rain.<br>For safety's sake, we had to cancel our outdoor itinerary.<br>Jamie suggested: 'How about we change to going to the Vancouver Aquarium, or go to the downtown Art Gallery to see an exhibition.'<br>I feel these two suggestions are not bad; arranging indoor activities on a rainy day is most suitable.<br>Finally, we chose to go to the aquarium to see the sea otters.",
        quizzes: [
            { q: "作者原本今日計劃做咩？", e: "(What did the author originally plan to do today?)", options: [{c: "去松雞山行山", e: "(Go hiking at Grouse Mountain)", correct: true}, {c: "去海灘游水", e: "(Go swimming at the beach)", correct: false}, {c: "留喺酒店瞓覺", e: "(Stay in the hotel and sleep)", correct: false}] },

let currentLevel = 0;

function playText(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-HK';
        const voices = window.speechSynthesis.getVoices();
        const hkVoice = voices.find(voice => voice.lang.includes('zh-HK') || voice.lang.includes('yue'));
        if (hkVoice) utterance.voice = hkVoice;
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    }
}

function checkAnswer(buttonElement, isCorrect) {
    const optionsContainer = buttonElement.closest('.options');
    const allButtons = optionsContainer.querySelectorAll('.option-btn');
    allButtons.forEach(btn => btn.style.pointerEvents = 'none');

    if (isCorrect) {
        buttonElement.classList.add('correct');
        buttonElement.innerHTML = buttonElement.innerHTML.replace('</span>', ' ✅ </span>');
    } else {
        buttonElement.classList.add('wrong');
        buttonElement.innerHTML = buttonElement.innerHTML.replace('</span>', ' ❌ </span>');
        allButtons.forEach(btn => {
            if (btn.dataset.correct === "true") btn.classList.add('correct');
        });
    }
}

function loadMission(index) {
    if(index < 0 || index >= missionsData.length) return;
    currentLevel = index;
    const m = missionsData[index];
    const app = document.getElementById('app');

    let vocabHtml = m.vocab.map((v, i) => `
        <button class="vocab-item" onclick="playText('${v.c}')">
            <span class="icon">🔊</span>
            <div><strong>${i+1}. ${v.c}</strong> (${v.j}) - ${v.e}</div>
        </button>
    `).join('');

    let quizHtml = m.quizzes.map((q, qIndex) => `
        <div class="quiz-question">
            <div class="question-text">
                ${qIndex + 1}. ${q.q}
                <button class="play-btn-small" onclick="playText('${q.q}')">🔊</button>
                <span class="eng-trans">${q.e}</span>
            </div>
            <div class="options">
                ${q.options.map((opt, oIndex) => `
                    <div class="option-row">
                        <button class="play-btn-option" onclick="playText('${opt.c}')">🔊</button>
                        <button class="option-btn" data-correct="${opt.correct}" onclick="checkAnswer(this, ${opt.correct})">
                            ${String.fromCharCode(65 + oIndex)}. ${opt.c} <span class="eng-trans">${opt.e}</span>
                        </button>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');

    app.innerHTML = `
        <div class="header">
            <h1>✈️ Tourist Mission ${m.level} / 15</h1>
            <p>${m.title} (${m.topic})</p>
        </div>

        <img src="${m.img}" class="news-image">

        <div class="prep-section">
            <h3>📚 Grammar & Vocabulary Prep</h3>
            <p>${m.grammarDesc}</p>
            <p><strong>10 Key Vocabulary Words:</strong></p>
            <div class="vocab-grid">${vocabHtml}</div>
        </div>

        <button class="action-btn" onclick="playText('${m.story.replace(/<[^>]*>?/gm, '')}')">
            🔊 Play Full Story Audio
        </button>

        <div class="script-box">
            <div class="cantonese-text">${m.story}</div>
            <div class="jyutping">${m.jyutping}</div>
        </div>

        <div class="quiz-section">
            <h3>📝 Knowledge Check</h3>
            ${quizHtml}
        </div>

        <div class="translation-box">
            <strong>English Translation:</strong><br>
            ${m.english}
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" ${currentLevel === 0 ? 'disabled' : ''} onclick="loadMission(currentLevel - 1)">⬅️ Previous</button>
             <button class="nav-btn" onclick="window.location.href='grammar.html'">Home</button>
            <button class="nav-btn" ${currentLevel === missionsData.length - 1 ? 'disabled' : ''} onclick="loadMission(currentLevel + 1)">Next ➡️</button>
        </div>
    `;
    window.scrollTo(0, 0);
}


// THIS IS THE MODIFIED SECTION
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

window.onload = () => {
    // Force voices to initialize
    window.speechSynthesis.getVoices();

    // 1. Get the level from the URL (e.g., beginner.html?level=2)
    const urlParams = new URLSearchParams(window.location.search);
    const levelParam = urlParams.get('level');
    
    // 2. Convert that to a number
    if (levelParam) {
        const targetMissionIndex = parseInt(levelParam) - 1; // Level 2 is Index 1
        
        // 3. Check if that mission exists in your missionsData array
        if (targetMissionIndex >= 0 && targetMissionIndex < missionsData.length) {
            loadMission(targetMissionIndex);
        } else {
            loadMission(0); // Default to first mission if number is wrong
        }
    } else {
        loadMission(0); // Default if no number is in URL
    }
};
