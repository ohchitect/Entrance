<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantonese Mission Generator</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 40px;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            width: 100%;
            max-width: 680px;
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.4);
            padding: 28px 24px;
        }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 { font-size: 1.7rem; margin: 0 0 6px 0; color: #1a1a1a; }
        .header p { color: #777; font-size: 0.9rem; margin: 0; }
        .step-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #999; margin: 0 0 10px 0; }
        .section { margin-bottom: 22px; }

        .difficulty-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; }
        .diff-card {
            border: 2px solid #e8e8e8; border-radius: 14px; padding: 12px 10px;
            cursor: pointer; transition: all 0.18s; text-align: center; background: white; user-select: none;
        }
        .diff-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.1); }
        .diff-card.selected { border-color: var(--c); background: var(--bg); box-shadow: 0 4px 14px rgba(0,0,0,0.12); }
        .diff-card .di { font-size: 1.5rem; display: block; margin-bottom: 4px; }
        .diff-card .dn { font-weight: 700; font-size: 0.88rem; color: #1a1a1a; }
        .diff-card .dd { font-size: 0.73rem; color: #999; margin-top: 2px; }

        .level-section { display: none; }
        .level-section.visible { display: block; }
        .level-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
        .lvl-btn {
            border: 2px solid #e8e8e8; border-radius: 10px; padding: 9px 0;
            cursor: pointer; background: white; font-weight: 700; font-size: 0.95rem; color: #666; transition: all 0.18s;
        }
        .lvl-btn:hover { border-color: #bbb; background: #f5f5f5; }
        .lvl-btn.selected { background: var(--diff-color, #667eea); border-color: var(--diff-color, #667eea); color: white; }

        .topic-section { display: none; }
        .topic-section.visible { display: block; }
        .suggested-topic {
            background: #f0f4ff; border: 2px solid #c5d3f7; border-radius: 12px;
            padding: 11px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-size: 0.9rem;
        }
        .suggested-topic .label { color: #888; font-size: 0.78rem; white-space: nowrap; }
        .suggested-topic .value { font-weight: 600; color: #2d3f8f; flex: 1; }
        .topic-row { display: flex; gap: 8px; align-items: center; }
        .topic-input {
            flex: 1; border: 2px solid #e8e8e8; border-radius: 12px; padding: 11px 14px;
            font-size: 0.92rem; font-family: inherit; outline: none; transition: border-color 0.2s; color: #333;
        }
        .topic-input:focus { border-color: #667eea; }
        .use-suggested {
            background: #f0f4ff; border: 2px solid #c5d3f7; border-radius: 10px;
            padding: 10px 14px; font-size: 0.82rem; font-weight: 700; color: #2d3f8f;
            cursor: pointer; white-space: nowrap; transition: background 0.2s;
        }
        .use-suggested:hover { background: #dce6ff; }

        .divider { height: 1px; background: #f0f0f0; margin: 20px 0; }

        .gen-btn {
            width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 14px; padding: 16px;
            font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px;
        }
        .gen-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(102,126,234,0.45); }
        .gen-btn:active:not(:disabled) { transform: scale(0.98); }
        .gen-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .loading { display: none; text-align: center; padding: 28px; color: #777; }
        .spinner {
            width: 38px; height: 38px; border: 4px solid #e8e8e8; border-top-color: #667eea;
            border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { font-size: 0.9rem; margin: 0; }

        .error-msg {
            display: none; background: #fff0f0; border: 1px solid #f5c6c6;
            border-radius: 10px; padding: 12px 14px; color: #c62828; font-size: 0.88rem; margin-bottom: 12px;
        }

        .preview-section { display: none; margin-top: 4px; }
        .preview-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .preview-bar h3 { margin: 0; font-size: 0.95rem; color: #555; }
        .preview-actions { display: flex; gap: 8px; }
        .pbtn {
            border: none; border-radius: 9px; padding: 8px 14px; font-size: 0.82rem;
            font-weight: 700; cursor: pointer; transition: background 0.2s; background: #f0f0f0; color: #444;
        }
        .pbtn:hover { background: #e0e0e0; }
        .pbtn.pri { background: #667eea; color: white; }
        .pbtn.pri:hover { background: #5a6fd6; }
        iframe.preview { width: 100%; height: 580px; border: 2px solid #e8e8e8; border-radius: 14px; background: #f0f2f5; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🀄 Mission Generator</h1>
        <p>Create Cantonese learning missions for any level</p>
    </div>

    <div class="section">
        <p class="step-label">Step 1 — Choose Difficulty</p>
        <div class="difficulty-grid" id="diffGrid"></div>
    </div>

    <div class="level-section" id="levelSection">
        <div class="section">
            <p class="step-label">Step 2 — Choose Level</p>
            <div class="level-grid" id="levelGrid"></div>
        </div>
    </div>

    <div class="topic-section" id="topicSection">
        <div class="section">
            <p class="step-label">Step 3 — Topic</p>
            <div class="suggested-topic">
                <span class="label">Suggested:</span>
                <span class="value" id="suggestedTopicText">—</span>
            </div>
            <div class="topic-row">
                <input class="topic-input" id="topicInput" type="text" placeholder="Or type your own topic…" />
                <button class="use-suggested" onclick="useSuggested()">Use ↑</button>
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="gen-btn" id="genBtn" onclick="generate()">
        ✨ Generate Mission
    </button>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Generating your mission… (this takes ~15 seconds)</p>
    </div>

    <div class="preview-section" id="previewSection">
        <div class="preview-bar">
            <h3>📋 Mission Preview</h3>
            <div class="preview-actions">
                <button class="pbtn" onclick="downloadMission()">⬇ Download</button>
                <button class="pbtn pri" onclick="openMission()">↗ Open</button>
            </div>
        </div>
        <iframe class="preview" id="previewFrame"></iframe>
    </div>
</div>

<script>
const PROXY = 'https://entrance-ten.vercel.app/api/generate';

const DIFFICULTIES = [
    { id:'beginner',    name:'Beginner',      icon:'🌱', desc:'Daily basics',          color:'#388e3c', bg:'#e8f5e9' },
    { id:'intermediate',name:'Intermediate',  icon:'📚', desc:'Expanding skills',      color:'#1976d2', bg:'#e3f2fd' },
    { id:'hard',        name:'Hard',          icon:'🔥', desc:'Advanced mastery',      color:'#d32f2f', bg:'#ffebee' },
    { id:'tourist',     name:'Tourist',       icon:'✈️', desc:'HK visitor scenarios',  color:'#f57c00', bg:'#fff3e0' },
    { id:'child',       name:'Child',         icon:'🧸', desc:'Young learners',        color:'#c2185b', bg:'#fce4ec' },
    { id:'elementary',  name:'Elementary',    icon:'🏫', desc:'School age basics',     color:'#e64a19', bg:'#fbe9e7' },
    { id:'middle',      name:'Middle School', icon:'🎒', desc:'Teen topics',           color:'#7b1fa2', bg:'#f3e5f5' },
    { id:'high',        name:'High School',   icon:'🎓', desc:'Pre-adult life',        color:'#00695c', bg:'#e0f2f1' },
    { id:'university',  name:'University',    icon:'🏛️', desc:'Academic level',        color:'#1565c0', bg:'#e8eaf6' },
    { id:'business',    name:'Business',      icon:'💼', desc:'Professional Cantonese', color:'#37474f', bg:'#eceff1' },
];

const TOPICS = {
    beginner:     ['Greetings & Introductions','Ordering Coffee at Tim Hortons','Numbers, Time & Dates','Family Members','Colors & Basic Clothes','Food & Drinks at a Restaurant','Weather Conversation','Morning Daily Routine','Asking for Directions','Shopping at a Supermarket','Taking the Bus','Visiting a Friend\'s Home','Making a Phone Call','Talking About Hobbies','Planning a Weekend Trip'],
    intermediate: ['Describing Emotions & Feelings','Talking About the Past','Making Comparisons','At the Doctor\'s Office','Basic Job Interview','Describing People\'s Appearances','Making Future Plans','Expressing Opinions','At the Bank','Discussing Local News','Renting an Apartment','Following a Recipe','Social Media Discussions','Describing Your Neighborhood','Planning a Vacation'],
    hard:         ['Formal Speech Registers','Business Negotiation Language','Legal & Administrative Terms','Complex Medical Consultations','Academic Debate & Discussion','Political & Social Commentary','Advanced Conditional Structures','Cantonese Idiomatic Expressions','Classical Cantonese Phrases','News Broadcast Style','Debate Strategies & Argumentation','Technical Process Descriptions','Cultural Nuances & Social Taboos','Slang, Colloquialisms & Internet Language','Poetry, Proverbs & Four-Character Idioms'],
    tourist:      ['Arriving at Hong Kong International Airport','Navigating the MTR System','Ordering Dim Sum at a Restaurant','Shopping in Mong Kok','Temple Street Night Market','Visiting Victoria Peak','Taking a Star Ferry','Ocean Park & Attractions','Checking into a Hotel','Currency Exchange & Banking','Buying Medicine at a Pharmacy','Asking for Tourist Information','Ordering Street Food in Causeway Bay','Taking a Taxi or Minibus','Museum & Cultural Site Visits'],
    child:        ['Saying Hello to Friends & Family','Counting & Basic Numbers with Toys','Animal Names & Sounds','My Favourite Fruits & Snacks','School Bag & Supplies','Playing at the Playground','Bedtime Routine with Parents','Asking a Teacher for Help','Parts of the Body','Classroom Instructions','Weather & Seasons','A Simple Fairy Tale','Fun Nursery Rhymes','My Pet at Home','Chinese New Year Celebration'],
    elementary:   ['School Subjects I Like','Things in the Classroom','After-school Activities & Clubs','Talking About Best Friends','Helping with Home Chores','My Weekly Schedule','Science Class Vocabulary','Learning About Maps & Geography','Cantonese History Stories','Math Problems in Cantonese','Art Class & Music','Sports Day at School','Visiting the School Library','My Birthday Party','Class Field Trip'],
    middle:       ['Social Media & Smartphone Habits','Joining a Sports Team','School Club Activities & Competitions','Writing a Movie Review','Talking About Favourite Music','Group School Project','Friendships & Peer Pressure','Better Study Habits','Exploring Career Options','Environment & Recycling','Mid-Autumn Festival Preparations','Online Gaming Conversations','Fashion Trends & School Uniform','Family Reunion Dinner','Volunteering in the Community'],
    high:         ['University Application Stress','My First Part-time Job','Navigating Relationships','Discussing Current Events','Five-Year Career Plan','Preparing for Study Abroad','Social Issues in Hong Kong','Personal Finance & Budgeting','Mental Health & Self-care','Cultural Identity as a Young Person','DSE Exam Pressure','Dream Travel Destination','Evaluating Online Information','Community Service Project','Vision for the Future'],
    university:   ['Discussing a University Lecture','Explaining Research Methodology','Campus Life & Orientation','Forming a Study Group','Meeting with a Professor','Joining a Student Society','Thesis Defense Preparation','Laboratory Work Discussion','Exchange Program Application','Graduate Job Hunting','Internship Performance Review','Alumni Networking Event','Applying for Graduate School','Submitting an Academic Paper','Academic Conference Presentation'],
    business:     ['Professional Job Interview','Introducing Yourself at the Office','Preparing for a Client Meeting','Business Email & Phone Etiquette','Negotiating a Deal','Delivering a Business Presentation','Weekly Team Stand-up Meeting','Managing a Project Timeline','Reviewing the Budget Report','Pitching a Marketing Campaign','Handling Customer Complaints','Reviewing a Service Contract','Business Trip to Guangzhou','Industry Networking Cocktail Event','Presenting the Annual Report'],
};

const COMPLEXITY = {
    beginner:     'Use very simple vocabulary (CEFR A1). Short sentences, 2-5 words each. Focus on one basic grammar pattern.',
    intermediate: 'Use moderate vocabulary (CEFR A2-B1). 5-8 word sentences. Introduce 2 connected grammar patterns.',
    hard:         'Use advanced vocabulary (CEFR B2-C1). Complex multi-clause sentences. Formal register. Multiple grammar patterns.',
    tourist:      'Focus on practical survival Cantonese for Hong Kong tourists. Polite phrases with location-specific vocabulary.',
    child:        'Use extremely simple, playful vocabulary. Very short sentences. Fun, relatable scenarios.',
    elementary:   'Use primary school-level vocabulary. Simple but complete sentences. School and family scenarios.',
    middle:       'Use youth-friendly vocabulary including mild slang. Conversational tone. Peer and social scenarios.',
    high:         'Use teenage/young adult vocabulary. Mix formal and casual registers. Contemporary social topics.',
    university:   'Use academic and semi-formal vocabulary. Longer analytical sentences. Intellectual discourse register.',
    business:     'Use formal professional vocabulary. Polished, concise sentences. Business etiquette focus.',
};

let selectedDiff = null, selectedLevel = null, generatedHTML = null;

const diffGrid = document.getElementById('diffGrid');
DIFFICULTIES.forEach(d => {
    const card = document.createElement('div');
    card.className = 'diff-card';
    card.style.setProperty('--c', d.color);
    card.style.setProperty('--bg', d.bg);
    card.dataset.id = d.id;
    card.innerHTML = `<span class="di">${d.icon}</span><div class="dn">${d.name}</div><div class="dd">${d.desc}</div>`;
    card.onclick = () => selectDiff(d.id);
    diffGrid.appendChild(card);
});

function selectDiff(id) {
    selectedDiff = id; selectedLevel = null;
    document.querySelectorAll('.diff-card').forEach(c => c.classList.remove('selected'));
    document.querySelector(`.diff-card[data-id="${id}"]`).classList.add('selected');
    const diff = DIFFICULTIES.find(d => d.id === id);
    document.documentElement.style.setProperty('--diff-color', diff.color);

    const levelGrid = document.getElementById('levelGrid');
    levelGrid.innerHTML = '';
    for (let i = 1; i <= 15; i++) {
        const btn = document.createElement('button');
        btn.className = 'lvl-btn';
        btn.textContent = i;
        btn.onclick = () => selectLevel(i, btn);
        levelGrid.appendChild(btn);
    }
    document.getElementById('levelSection').classList.add('visible');
    document.getElementById('topicSection').classList.remove('visible');
    document.getElementById('topicInput').value = '';
    document.getElementById('previewSection').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
    levelGrid.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function selectLevel(level, btn) {
    selectedLevel = level;
    document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('suggestedTopicText').textContent = TOPICS[selectedDiff][level - 1];
    document.getElementById('topicInput').value = '';
    document.getElementById('topicSection').classList.add('visible');
    document.getElementById('previewSection').style.display = 'none';
    document.getElementById('topicSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function useSuggested() {
    if (selectedDiff && selectedLevel)
        document.getElementById('topicInput').value = TOPICS[selectedDiff][selectedLevel - 1];
}

async function generate() {
    const topic = document.getElementById('topicInput').value.trim() ||
                  (selectedDiff && selectedLevel ? TOPICS[selectedDiff][selectedLevel - 1] : '');

    if (!selectedDiff || !selectedLevel) { showError('Please select a difficulty and level first.'); return; }
    if (!topic) { showError('Please enter or select a topic.'); return; }

    const diff = DIFFICULTIES.find(d => d.id === selectedDiff);
    showLoading(true);
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('previewSection').style.display = 'none';

    try {
        const resp = await fetch(PROXY, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: buildPrompt(diff.name, selectedLevel, topic) })
        });

        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error?.message || `Server error ${resp.status}`);
        }

        const data = await resp.json();
        generatedHTML = data.content[0].text.trim().replace(/^```[a-z]*\n?/, '').replace(/\n?```$/, '').trim();
        showPreview(generatedHTML);
    } catch (e) {
        showError('Generation failed: ' + e.message);
    } finally {
        showLoading(false);
    }
}

function buildPrompt(difficulty, level, topic) {
    const complexityNote = COMPLEXITY[selectedDiff];
    return `Generate a complete, standalone Cantonese language learning mission HTML page.

MISSION DETAILS:
- Difficulty: ${difficulty} (Level ${level} of 15)
- Topic: ${topic}
- Complexity: ${complexityNote}

Return ONLY a complete HTML document — no markdown, no explanation, no code fences. Match this exact structure:

1. DOCTYPE html with embedded CSS
2. Body: gray background #f0f2f5, centered
3. White .container card (max-width 500px, border-radius 20px, padding 30px 20px, box-shadow 0 8px 24px rgba(0,0,0,0.08))
4. .header: <h1> "${difficulty} Mission ${level}" with emoji, <p> topic subtitle
5. <img class="news-image"> using a real Unsplash URL relevant to the topic
6. .prep-section (background #e3f2fd, border-left 4px solid #1976d2):
   - <h3> "📚 Grammar & Vocabulary Prep"
   - Explain the key grammar/vocabulary pattern
   - .vocab-grid: 10 .vocab-item buttons with onclick="playText('[word]')", icon 🔊, Cantonese + (jyutping) - English
7. .action-btn (background #d32f2f, full story in onclick="playText('...')"): "🔊 Play Full Story Audio"
8. .script-box (background #f8f9fa, border-left 4px solid #d32f2f):
   - .cantonese-text: 8-12 sentence story, key patterns in <span class="preposition">
   - .jyutping: full romanization
9. .quiz-section "📝 Knowledge Check": 4 questions, each with .question-text + 🔊 + .eng-trans, 3 .option-row each with play button + .option-btn onclick="checkAnswer(this, true/false)"
10. .translation-box: full English translation

CSS (copy exactly):
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background-color:#f0f2f5;display:flex;justify-content:center;padding:20px;margin:0;color:#333}
.container{background-color:white;width:100%;max-width:500px;border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08);padding:30px 20px;box-sizing:border-box}
.header{text-align:center;margin-bottom:20px}.header h1{font-size:1.5rem;margin:0 0 5px 0;color:#1a1a1a}.header p{font-size:0.9rem;color:#666;margin:0}
.news-image{width:100%;height:200px;border-radius:12px;object-fit:cover;margin-bottom:20px;background-color:#ddd}
.action-btn{background:#d32f2f;color:white;border:none;border-radius:12px;padding:16px;width:100%;font-weight:600;font-size:1.1rem;cursor:pointer;display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:20px}
.prep-section{background-color:#e3f2fd;border-left:4px solid #1976d2;padding:15px;margin-bottom:20px;border-radius:0 8px 8px 0}
.prep-section h3{margin-top:0;color:#1565c0;font-size:1.1rem;margin-bottom:10px}
.vocab-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.vocab-item{background:white;padding:10px 8px;border-radius:8px;font-size:0.9rem;border:2px solid #bbdefb;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:4px}
.script-box{background-color:#f8f9fa;border-left:4px solid #d32f2f;padding:15px;margin-bottom:30px;border-radius:0 8px 8px 0}
.cantonese-text{font-weight:700;font-size:1.2rem;line-height:1.8;margin-bottom:10px;color:#1a1a1a}
.jyutping{color:#666;font-size:0.9rem;line-height:1.6}
.preposition{color:#1976d2;text-decoration:underline;background-color:#e3f2fd;padding:0 4px;border-radius:4px}
.quiz-section{border-top:2px dashed #ddd;padding-top:20px}.quiz-question{margin-bottom:25px}
.question-text{font-weight:700;margin-bottom:10px;font-size:1.1rem;color:#1a1a1a;display:flex;align-items:center;flex-wrap:wrap;gap:5px}
.eng-trans{font-size:0.85rem;color:#666;font-weight:normal;display:block;width:100%;margin-top:4px}
.options{display:flex;flex-direction:column;gap:10px}.option-row{display:flex;gap:10px;align-items:stretch}
.play-btn-option{background:#f8f9fa;border:2px solid #ddd;border-radius:8px;cursor:pointer;font-size:1.2rem;padding:0 15px}
.play-btn-small{background:none;border:none;cursor:pointer;font-size:1.2rem;padding:0 5px}
.option-btn{background-color:#fff;border:2px solid #ddd;border-radius:8px;padding:12px;font-size:1rem;font-weight:bold;cursor:pointer;text-align:left;color:#333;flex-grow:1}
.option-btn.correct{background-color:#e8f5e9;border-color:#4caf50;color:#2e7d32}
.option-btn.wrong{background-color:#ffebee;border-color:#f44336;color:#c62828}
.translation-box{margin-top:30px;font-size:0.9rem;color:#555;background:#eee;padding:15px;border-radius:8px;line-height:1.5}

JavaScript (copy exactly):
function playText(text){if('speechSynthesis'in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='zh-HK';const v=window.speechSynthesis.getVoices();const hk=v.find(x=>x.lang.includes('zh-HK')||x.lang.includes('yue'));if(hk)u.voice=hk;else{const zh=v.find(x=>x.lang.includes('zh'));if(zh)u.voice=zh;}u.rate=0.85;window.speechSynthesis.speak(u);}}
window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
function checkAnswer(btn,isCorrect){const all=btn.closest('.options').querySelectorAll('.option-btn');all.forEach(b=>b.style.pointerEvents='none');if(isCorrect){btn.classList.add('correct');}else{btn.classList.add('wrong');all.forEach(b=>{if(b.getAttribute('onclick')&&b.getAttribute('onclick').includes('true'))b.classList.add('correct');});}}

Adapt ALL content for ${difficulty} Level ${level} about: ${topic}`;
}

function showLoading(on) {
    document.getElementById('loading').style.display = on ? 'block' : 'none';
    document.getElementById('genBtn').disabled = on;
}
function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
    showLoading(false);
}
function showPreview(html) {
    const section = document.getElementById('previewSection');
    document.getElementById('previewFrame').srcdoc = html;
    section.style.display = 'block';
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function openMission() {
    if (!generatedHTML) return;
    window.open(URL.createObjectURL(new Blob([generatedHTML], { type: 'text/html' })), '_blank');
}
function downloadMission() {
    if (!generatedHTML) return;
    const diff = DIFFICULTIES.find(d => d.id === selectedDiff);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([generatedHTML], { type: 'text/html' }));
    a.download = `${diff.id}-mission-${selectedLevel}.html`;
    a.click();
}
</script>
</body>
</html>
